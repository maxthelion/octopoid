# Declarative scheduler job definitions.
#
# Each job runs on a fixed interval (seconds). The launchd tick is 10s;
# jobs only run when their interval has elapsed since last run.
#
# Fields:
#   name     — job name, must match a @register_job function in jobs.py
#   interval — minimum seconds between runs
#   type     — "script" (Python function) or "agent" (spawns a Claude agent)
#   group    — "local" (no API calls, runs before poll fetch)
#              "remote" (runs after poll fetch, ctx.poll_data is populated)
#
# For type: agent jobs, additional fields are supported:
#   blueprint    — pool blueprint name (defaults to job name)
#   max_instances — max concurrent agent instances (default: 1)
#
# Agent config (role, model, max_turns, spawn_mode, etc.) is loaded from
# .octopoid/agents/<name>/agent.yaml — the single source of truth.

jobs:

  # --------------------------------------------------------------------------
  # Local jobs — run before the poll fetch, no API calls needed
  # --------------------------------------------------------------------------

  # Fast PID check: detect finished agents and process their results.
  # Runs every 10s (local PID checks only — no network I/O).
  - name: check_and_update_finished_agents
    interval: 10
    type: script
    group: local

  # --------------------------------------------------------------------------
  # Remote jobs — run after the poll fetch, ctx.poll_data is populated
  # --------------------------------------------------------------------------

  # Register this orchestrator with the server (idempotent).
  # Uses poll_data.orchestrator_registered to skip the POST when not needed.
  - name: _register_orchestrator
    interval: 300
    type: script
    group: remote

  # Send a heartbeat to the server so queue-status shows a recent "Last tick".
  - name: send_heartbeat
    interval: 60
    type: script
    group: remote

  # Proactively extend leases for tasks with live agent processes.
  # Runs BEFORE check_and_requeue_expired_leases so that post-sleep wake events
  # renew active leases before the expiry check kills the agent process.
  # Handles laptop sleep: process survives sleep but lease expires while suspended.
  - name: renew_active_leases
    interval: 60
    type: script
    group: remote

  # Requeue tasks whose claim lease has expired (server-side fallback).
  - name: check_and_requeue_expired_leases
    interval: 60
    type: script
    group: remote

  # Detect projects whose children are all done and run flow transitions.
  - name: check_project_completion
    interval: 60
    type: script
    group: remote

  # Check queue health (already self-throttled internally at 30 min).
  - name: _check_queue_health_throttled
    interval: 1800
    type: script
    group: remote

  # Main agent evaluation and spawning loop.
  # Uses poll_data.queue_counts for backpressure without per-agent API calls.
  - name: agent_evaluation_loop
    interval: 60
    type: script
    group: remote

  # Archive logs and delete worktrees/branches for old done/failed tasks.
  - name: sweep_stale_resources
    interval: 1800
    type: script
    group: remote

  # Poll GitHub issues and create tasks for new ones.
  # Rate budget: 1 gh issue list call per run = 4 calls/hour (< 0.1% of 5000/hour limit).
  # Issues labelled 'server' are forwarded to maxthelion/octopoid-server instead.
  - name: poll_github_issues
    interval: 900
    type: script
    group: local

  # Message dispatcher: poll action_command messages and spawn action agents.
  # Processes one message per tick (serial). Runs every 30s so unprocessed
  # messages are handled promptly. Agent runs synchronously (max 3 minutes).
  - name: dispatch_action_messages
    interval: 30
    type: script
    group: remote

  # Testing analyst: scans for test coverage gaps using a custom scanner that checks
  # recently completed tasks for missing test files. Proposes specific outside-in tests.
  # Hard pre_check guard (exit code) enforced by scheduler before spawn.
  # Agent config loaded from .octopoid/agents/testing-analyst/agent.yaml.
  - name: testing_analyst
    interval: 600
    type: agent
    group: remote
    max_instances: 1

  # Complexity analyst: runs Lizard to find high-CCN functions and proposes concrete
  # refactorings using named design patterns. Hard pre_check guard enforced by scheduler.
  # Agent config loaded from .octopoid/agents/complexity-analyst/agent.yaml.
  - name: complexity_analyst
    interval: 600
    type: agent
    group: remote
    max_instances: 1

  # Duplication analyst: runs jscpd to find copy-paste blocks and proposes shared utility
  # extractions. Hard pre_check guard enforced by scheduler.
  # Agent config loaded from .octopoid/agents/duplication-analyst/agent.yaml.
  - name: duplication_analyst
    interval: 600
    type: agent
    group: remote
    max_instances: 1

  # Coverage analyst: runs pytest-cov to find files with lowest test coverage and proposes
  # specific outside-in tests. Hard pre_check guard enforced by scheduler.
  # Agent config loaded from .octopoid/agents/coverage-analyst/agent.yaml.
  - name: coverage_analyst
    interval: 600
    type: agent
    group: remote
    max_instances: 1

  # Dead code analyst: runs vulture to find unused symbols. Enqueues mechanical cleanup
  # tasks directly for unambiguous findings; drafts ambiguous ones for human review.
  # Hard pre_check guard enforced by scheduler.
  # Agent config loaded from .octopoid/agents/dead-code-analyst/agent.yaml.
  - name: dead_code_analyst
    interval: 600
    type: agent
    group: remote
    max_instances: 1

  # Maintainability analyst: runs wily to find files with the worst Maintainability Index
  # and proposes structural improvements (module splits, responsibility extraction).
  # Hard pre_check guard enforced by scheduler.
  # Agent config loaded from .octopoid/agents/maintainability-analyst/agent.yaml.
  - name: maintainability_analyst
    interval: 600
    type: agent
    group: remote
    max_instances: 1
