title: Agent Actions
description: 'Agents can propose actions (e.g. run a command, create a task) that
  require human approval before execution. The action system separates proposal
  from execution, keeping humans in control of side effects.

  '
invariants:
- id: actions-require-approval
  description: Agent-proposed actions (create task, run command, modify configuration)
    require explicit human approval before execution. The action system separates
    proposal from execution.
  rationale: Agents should not have unsupervised side effects beyond their task
    scope. The approval step keeps humans in control of system-level changes.
  source: draft-050
  status: aspirational
  test: null
