title: Pull Request Lifecycle
description: 'PRs are created by the create_pr flow step, reviewed by the gatekeeper,
  and merged by the merge_pr step. PR metadata (pr_number, pr_url) is stored on
  the task. Branches are never deleted on merge.

  '
invariants:
- id: pr-created-by-flow-step
  description: Pull requests are created by the create_pr flow step, not by agents.
    The PR number and URL are stored on the task record via execution_notes.
  rationale: Agent-created PRs leave orphaned state if the agent crashes after creating
    the PR but before recording the number. Flow steps are idempotent and record
    metadata atomically.
  source: draft-031
  status: aspirational
  test: null
- id: pr-metadata-stored-on-task
  description: After PR creation, pr_number and pr_url are stored in the task's
    execution_notes. Downstream steps (gatekeeper review, merge) read PR metadata
    from the task, not from git.
  rationale: Without stored metadata, downstream steps must search GitHub for the
    PR, which is fragile and rate-limit-prone.
  source: draft-180
  status: aspirational
  test: null
