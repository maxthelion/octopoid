<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Spec — Octopoid</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar-w: 280px;
  --sidebar-bg: #1a1d2e;
  --sidebar-hover: #252840;
  --sidebar-active: #2e3354;
  --sidebar-border: #2a2d42;
  --sidebar-text: #c9cdd6;
  --sidebar-muted: #6b7280;
  --sidebar-accent: #818cf8;
  --main-bg: #f9fafb;
  --main-text: #111827;
  --main-muted: #6b7280;
  --main-border: #e5e7eb;
  --badge-enforced-bg: #dcfce7;
  --badge-enforced-text: #166534;
  --badge-aspirational-bg: #fef3c7;
  --badge-aspirational-text: #92400e;
  --inv-bg: #ffffff;
  --inv-border: #e5e7eb;
  --inv-hover: #f0f4ff;
  --highlight-bg: #fef9c3;
  --toolbar-bg: #ffffff;
  --toolbar-border: #e5e7eb;
  --btn-active-bg: #4f46e5;
  --btn-active-text: #ffffff;
  --btn-bg: #f3f4f6;
  --btn-text: #374151;
  --btn-hover: #e5e7eb;
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 14px;
  color: var(--main-text);
  background: var(--main-bg);
}

#app {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── Sidebar ─────────────────────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid var(--sidebar-border);
}

#sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--sidebar-border);
  flex-shrink: 0;
}

#sidebar-header h1 {
  font-size: 15px;
  font-weight: 700;
  color: #e2e8f0;
  letter-spacing: 0.02em;
  margin-bottom: 10px;
}

#sidebar-header .subtitle {
  font-size: 11px;
  color: var(--sidebar-muted);
  margin-bottom: 10px;
}

.stats-pills {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.stats-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 99px;
  font-weight: 600;
}
.stats-pill.enforced { background: #14532d; color: #bbf7d0; }
.stats-pill.aspirational { background: #78350f; color: #fde68a; }
.stats-pill.total { background: #1e3a5f; color: #bfdbfe; }

#tree {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

#tree::-webkit-scrollbar { width: 4px; }
#tree::-webkit-scrollbar-track { background: transparent; }
#tree::-webkit-scrollbar-thumb { background: var(--sidebar-border); border-radius: 2px; }

.tree-section { }

.tree-section-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  cursor: pointer;
  color: var(--sidebar-text);
  font-size: 13px;
  font-weight: 600;
  user-select: none;
  border-radius: 0;
  transition: background 0.1s;
}
.tree-section-header:hover { background: var(--sidebar-hover); }
.tree-section-header.active { background: var(--sidebar-active); color: #fff; }

.tree-toggle {
  display: inline-block;
  width: 14px;
  text-align: center;
  font-size: 9px;
  color: var(--sidebar-muted);
  transition: transform 0.15s;
  flex-shrink: 0;
}
.tree-section.open > .tree-section-header > .tree-toggle {
  transform: rotate(90deg);
}

.tree-section-title { flex: 1; }

.tree-count {
  font-size: 11px;
  color: var(--sidebar-muted);
  font-weight: 400;
  flex-shrink: 0;
}

.tree-leaves {
  display: none;
  padding-left: 8px;
}
.tree-section.open > .tree-leaves { display: block; }

.tree-leaf {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 16px 5px 26px;
  cursor: pointer;
  color: var(--sidebar-muted);
  font-size: 12px;
  transition: background 0.1s, color 0.1s;
  border-radius: 0;
}
.tree-leaf:hover { background: var(--sidebar-hover); color: var(--sidebar-text); }
.tree-leaf.active { background: var(--sidebar-active); color: var(--sidebar-accent); }

/* ── Main panel ──────────────────────────────────────────────────────── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  background: var(--toolbar-bg);
  border-bottom: 1px solid var(--toolbar-border);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.filter-group {
  display: flex;
  gap: 4px;
}

.filter-btn {
  padding: 5px 12px;
  border: 1px solid var(--main-border);
  background: var(--btn-bg);
  color: var(--btn-text);
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
}
.filter-btn:hover { background: var(--btn-hover); }
.filter-btn.active {
  background: var(--btn-active-bg);
  color: var(--btn-active-text);
  border-color: var(--btn-active-bg);
}

#search {
  flex: 1;
  min-width: 160px;
  max-width: 320px;
  padding: 5px 10px;
  border: 1px solid var(--main-border);
  border-radius: 6px;
  font-size: 13px;
  color: var(--main-text);
  outline: none;
  background: #fff;
}
#search:focus { border-color: #818cf8; box-shadow: 0 0 0 2px rgba(129,140,248,0.2); }

.result-count {
  margin-left: auto;
  font-size: 12px;
  color: var(--main-muted);
  white-space: nowrap;
}

#content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

#content::-webkit-scrollbar { width: 6px; }
#content::-webkit-scrollbar-track { background: transparent; }
#content::-webkit-scrollbar-thumb { background: var(--main-border); border-radius: 3px; }

/* ── Section/leaf heading ────────────────────────────────────────────── */
.content-header {
  margin-bottom: 20px;
}

.content-header h2 {
  font-size: 20px;
  font-weight: 700;
  color: var(--main-text);
  margin-bottom: 6px;
}

.content-principle {
  font-size: 14px;
  font-weight: 600;
  color: #4f46e5;
  margin-bottom: 8px;
  font-style: italic;
}

.content-desc {
  font-size: 13px;
  color: var(--main-muted);
  line-height: 1.6;
  max-width: 680px;
}

/* ── Invariant cards ─────────────────────────────────────────────────── */
.invariants-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-width: 820px;
}

.invariant-card {
  background: var(--inv-bg);
  border: 1px solid var(--inv-border);
  border-radius: 8px;
  padding: 14px 16px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.invariant-card:hover {
  border-color: #c7d2fe;
  box-shadow: 0 1px 6px rgba(79,70,229,0.08);
}

.inv-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}

.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.03em;
  text-transform: lowercase;
  flex-shrink: 0;
}
.badge.enforced { background: var(--badge-enforced-bg); color: var(--badge-enforced-text); }
.badge.aspirational { background: var(--badge-aspirational-bg); color: var(--badge-aspirational-text); }

.inv-id {
  font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  font-size: 12px;
  font-weight: 600;
  color: #374151;
}

.breadcrumb {
  font-size: 11px;
  color: var(--main-muted);
  margin-left: auto;
}

.inv-desc {
  font-size: 13px;
  color: var(--main-text);
  line-height: 1.65;
  margin-bottom: 8px;
}

.inv-rationale {
  font-size: 12px;
  color: #4b5563;
  line-height: 1.6;
  padding: 8px 10px;
  background: #f9fafb;
  border-left: 3px solid #e5e7eb;
  border-radius: 0 4px 4px 0;
  margin-bottom: 8px;
}

.inv-meta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  font-size: 11px;
  color: var(--main-muted);
}

.inv-meta a { color: #4f46e5; text-decoration: none; }
.inv-meta a:hover { text-decoration: underline; }

.inv-test {
  font-family: "SFMono-Regular", Consolas, monospace;
  font-size: 10.5px;
  background: #f3f4f6;
  padding: 1px 5px;
  border-radius: 3px;
}

mark {
  background: var(--highlight-bg);
  padding: 0 1px;
  border-radius: 2px;
}

/* ── Empty / welcome state ───────────────────────────────────────────── */
.empty-state {
  padding: 40px 0;
  color: var(--main-muted);
  text-align: center;
  font-size: 13px;
}

.welcome-state {
  padding: 20px 0;
  max-width: 680px;
}

.welcome-state h2 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 8px;
}

.welcome-state p {
  color: var(--main-muted);
  line-height: 1.6;
  margin-bottom: 16px;
  font-size: 13px;
}

.section-overview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
  margin-top: 20px;
}

.section-card {
  background: #fff;
  border: 1px solid var(--main-border);
  border-radius: 8px;
  padding: 14px;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.section-card:hover {
  border-color: #818cf8;
  box-shadow: 0 2px 8px rgba(79,70,229,0.1);
}
.section-card h3 {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 4px;
  color: var(--main-text);
}
.section-card .principle {
  font-size: 12px;
  color: #6366f1;
  font-style: italic;
  margin-bottom: 8px;
  line-height: 1.5;
}
.section-card .section-counts {
  display: flex;
  gap: 6px;
}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>&#9670; System Spec</h1>
      <div class="subtitle">Octopoid behavioural invariants</div>
      <div class="stats-pills" id="stats-pills">
        <!-- filled by JS -->
      </div>
    </div>
    <div id="tree">
      <!-- filled by JS -->
    </div>
  </div>

  <div id="main">
    <div id="toolbar">
      <div class="filter-group">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="enforced">Enforced</button>
        <button class="filter-btn" data-filter="aspirational">Aspirational</button>
      </div>
      <input id="search" type="search" placeholder="Search invariants..." autocomplete="off">
      <span class="result-count" id="result-count"></span>
    </div>
    <div id="content">
      <!-- filled by JS -->
    </div>
  </div>
</div>

<!-- SPEC_DATA_START -->
<script>const SPEC_DATA = {"meta":{"format_version":2,"last_updated":"2026-03-01","description":"Behavioural invariants for the Octopoid orchestrator, organised as a hierarchical directory tree. Each top-level directory represents a subsystem. _section.yaml files state the governing principle. Leaf YAML files contain verifiable invariants.\nInvariants enter the spec when a draft's invariant has been verified as met in the code. See draft #182 for the lifecycle.\n","invariant_statuses":{"aspirational":"Intent is agreed; code does not yet fully satisfy it.","enforced":"Code satisfies it AND a test verifies it."}},"sections":[{"id":"architecture","title":"Architecture","principle":"Architectural principles that govern all components","description":"Cross-cutting principles that apply to every component: agents are pure functions with no side-channel state, components communicate through messages, complexity is kept to the minimum needed. These principles guide decisions when specific rules don't apply.","leaves":[{"id":"architecture/actors","title":"Actor Model","description":"Components communicate through messages, not shared state or file conventions. The message system is the backbone of coordination: agents signal outcomes, humans send instructions, the scheduler broadcasts completions.","invariants":[{"id":"communication-via-messages","description":"Components communicate through the message system, not shared files, environment variables, or direct function calls across boundaries. Messages are typed, timestamped, and auditable.","rationale":"Shared state creates invisible coupling. Messages create an audit trail and decouple components — the sender doesn't need to know who reads the message or when.","source":"draft-031","status":"aspirational","test":null,"section":"architecture","leaf":"actors"},{"id":"hub-and-spoke-topology","description":"Communication is strictly hub-and-spoke: orchestrator-to-agent and human-to-orchestrator. Agents never communicate directly with each other.","rationale":"Agent-to-agent messaging creates coordination complexity and race conditions. Hub-and-spoke keeps the orchestrator as the single coordinator.","source":"draft-031","status":"aspirational","test":null,"section":"architecture","leaf":"actors"}]},{"id":"architecture/complexity","title":"Complexity Management","description":"The system prefers simple over clever. Three similar lines of code is better than a premature abstraction. Complexity is only added when the current task requires it.","invariants":[{"id":"no-premature-abstraction","description":"Code is not abstracted until the pattern repeats. Three similar lines of code is preferred over a premature helper. Complexity is only added when the current task requires it, not for hypothetical future needs.","rationale":"Premature abstractions create indirection that makes code harder to understand and change. The system grows by accretion — abstractions emerge when justified by real repetition.","source":"bootstrap","status":"aspirational","test":null,"section":"architecture","leaf":"complexity"}]},{"id":"architecture/pure-functions","title":"Agents as Pure Functions","description":"Agents have no persistent state between runs. Given the same task context, they produce the same outputs. The scheduler owns all mechanics (spawning, monitoring, result processing). Agents are workers, not coordinators.","invariants":[{"id":"agents-never-call-server","description":"Agents do not call the server API, push branches, create PRs, or transition task state. Their only output is commits in the worktree and stdout. The scheduler handles all mechanics after the agent exits.","rationale":"If agents drive their own lifecycle, any mid-flight failure leaves orphaned state (pushed branch but no PR, API call but no local record). Pure functions with filesystem-only output let the scheduler be the single point of control.","source":"draft-031","status":"aspirational","test":null,"section":"architecture","leaf":"pure-functions"},{"id":"agents-stateless-between-runs","description":"Agents have no persistent state between invocations. They do not read from previous runs, maintain caches, or depend on anything outside the task context provided at spawn time.","rationale":"Stateful agents create hidden dependencies. A stateless agent given the same task context produces the same outputs, making failures reproducible and retries safe.","source":"draft-031","status":"aspirational","test":null,"section":"architecture","leaf":"pure-functions"}]}]},{"id":"tasks","title":"Tasks","principle":"Tasks are the unit of work","description":"A task is an atomic piece of work with a clear lifecycle. Tasks flow through declarative state machines (flows), are worked on by agents, reviewed by gatekeepers, and either completed or surfaced for human attention. Everything the system does is organised around tasks.","leaves":[{"id":"tasks/flows","title":"Task Flows","description":"Declarative state machine transitions that govern how tasks move through the system. Flows define the steps run during each transition, the conditions that trigger them, and the agents that execute them.","invariants":[{"id":"flow-sync-preserves-steps","description":"When the scheduler syncs flow definitions to the server, it includes the full transition data (runs, conditions, checks, agent) — not just from/to states. Steps like create_pr are never silently dropped.","rationale":"Stripped transitions cause steps to be skipped silently, leading to ghost completions (tasks in done with no PR), missing PR numbers, and unmerged work. This was the root cause of a multi-hour outage.","source":"postmortem-2026-02-28-ghost-completion","status":"enforced","test":null,"section":"tasks","leaf":"flows"}]},{"id":"tasks/lifecycle","title":"Task Lifecycle","description":"Task states, transitions, and terminal conditions. A task moves through queues (incoming → claimed → submitted → done or failed) via declarative flow transitions.","invariants":[{"id":"task-flows-through-queues","description":"A task moves through queues via declarative flow transitions: incoming → claimed → submitted → done (or failed). Each transition can have conditions, steps, and an assigned agent. The flow YAML is the source of truth for what happens at each transition.","rationale":"Hardcoded transition logic is scattered and hard to audit. Declarative flows make the full lifecycle visible in one file and extensible via configuration.","source":"draft-059","status":"aspirational","test":null,"section":"tasks","leaf":"lifecycle"},{"id":"terminal-steps-auto-injected","description":"Terminal steps (rebase_on_base, merge_pr) are automatically injected by flow.py for any transition targeting done. Flow YAMLs don't need to include them explicitly.","rationale":"Forgetting terminal steps in a flow YAML causes tasks to reach done without their PR being merged. Auto-injection makes this impossible.","source":"bootstrap","status":"enforced","test":null,"section":"tasks","leaf":"lifecycle"}]},{"id":"tasks/quality-gate","title":"Quality Gate","description":"The gatekeeper agent reviews submitted work before it transitions to done. CI must pass before gatekeeper review. Rejection includes actionable feedback posted to the PR.","invariants":[{"id":"gatekeeper-reviews-before-done","description":"No task reaches done without passing through gatekeeper review. The gatekeeper is a mandatory quality gate in the flow from submitted to done.","rationale":"Without a quality gate, agent work lands on main unchecked. The gatekeeper catches bugs, style issues, and scope violations before merge.","source":"draft-007","status":"aspirational","test":null,"section":"tasks","leaf":"quality-gate"},{"id":"ci-before-gatekeeper","description":"CI must pass before the gatekeeper reviews. CI failure bounces the task back to the implementer without wasting a gatekeeper turn.","rationale":"Running CI after gatekeeper approval wastes expensive LLM calls on code that may not even build.","source":"draft-185","status":"aspirational","test":null,"section":"tasks","leaf":"quality-gate"}]},{"id":"tasks/resilience","title":"Task Resilience","description":"How the system handles task failures, intervention, and recovery. Every failure goes through intervention before reaching the failed queue. The fixer agent handles most failures autonomously.","invariants":[{"id":"self-correcting-failure","description":"Every task failure goes through intervention before reaching the failed queue. A task only reaches failed after at least one intervention attempt. Direct routing to failed without intervention is a bug.","rationale":"The fixer agent can handle many failures autonomously (retry with more turns, identify missing prerequisites, fix git conflicts, simplify scope). failed should mean \"the system tried to self-correct and couldn't\", not \"the first attempt didn't work\".","source":"draft-181","status":"enforced","test":"tests/test_requires_intervention.py::TestHandleFailOutcomeRouting::test_agent_failure_routes_to_requires_intervention","section":"tasks","leaf":"resilience"},{"id":"fail-task-single-path","description":"All code paths that move a task to the failed queue must go through fail_task(). No code should call sdk.tasks.update(queue='failed') directly except fail_task() itself.","rationale":"fail_task() implements the intervention-first logic. Bypassing it creates paths where tasks skip intervention, violating self-correcting-failure.","source":"draft-181","status":"enforced","test":"tests/test_requires_intervention.py::TestNoDirectFailedCalls","section":"tasks","leaf":"resilience"},{"id":"fixer-agent-handles-failures","description":"When a task has needs_intervention set, the scheduler spawns a fixer agent. The fixer diagnoses the problem, applies a fix, and resumes the task flow from where it failed. Direct human intervention is not the first resort.","rationale":"Most task failures are mundane (git conflicts, stale state, transient errors) and can be resolved automatically. The fixer agent handles these, reserving human attention for genuinely stuck tasks.","source":"draft-170","status":"aspirational","test":null,"section":"tasks","leaf":"resilience"},{"id":"fixer-circuit-breaker","description":"The fixer is limited to a maximum number of attempts per task (currently 3). After exhausting attempts, the task moves to terminal failed and a message is posted to the human inbox. The fixer never loops indefinitely.","rationale":"Without a circuit breaker, a fixer that reports \"fixed\" but whose resume always fails will cycle indefinitely, wasting agent resources. A cap ensures stuck tasks reach human attention in bounded time.","source":"postmortem-2026-02-28-fixer-loop","status":"enforced","test":null,"section":"tasks","leaf":"resilience"},{"id":"requires-intervention-not-terminal","description":"The requires-intervention state is not a graveyard. Tasks in it have an associated fixer agent attempt. Only if the fixer also fails does the task move to failed and need human attention.","rationale":"Without this guarantee, requires-intervention becomes a second failed queue. The point is that intervention is active and time-bounded, not passive accumulation.","source":"draft-170","status":"aspirational","test":null,"section":"tasks","leaf":"resilience"},{"id":"unknown-outcome-routes-to-intervention","description":"When a task's outcome cannot be determined (inference failure, empty stdout, unrecognized response), the task routes to intervention for review — not automatically to failed. An unknown outcome is ambiguous, not an automatic failure.","rationale":"A task with unknown outcome may be perfectly fine (e.g. agent completed work but inference failed). Routing to failed discards potentially completed work. Routing to intervention preserves it for review.","source":"draft-174","status":"aspirational","test":null,"section":"tasks","leaf":"resilience"},{"id":"failure-reason-always-recorded","description":"Every path that moves a task to failed records the reason in execution_notes and appends a FAILED entry to the task log. It is always possible to answer \"why did this task fail?\" without forensic investigation.","rationale":"Without recorded reasons, diagnosing failures requires reading scheduler logs, agent stdout, and git state. A recorded reason makes triage instant.","source":"draft-164","status":"aspirational","test":null,"section":"tasks","leaf":"resilience"},{"id":"failed-task-has-recovery-path","description":"Every task in the failed queue can be moved to an actionable state (e.g. incoming for retry) without bypassing the state machine. There is a defined flow transition or API action that handles recovery.","rationale":"Without a recovery path, tasks in failed require manual hacks to recover. This is fragile, error-prone, and undocumented.","source":"draft-169","status":"aspirational","test":null,"section":"tasks","leaf":"resilience"},{"id":"intervention-no-queue-transition","description":"Requesting intervention for a task never requires a queue transition. The task stays in its current queue. Intervention is a flag plus a message, not a state change.","rationale":"Queue transitions for intervention get blocked by the server's state machine validation. A task can need intervention from any queue. Making intervention a flag avoids whack-a-mole transition additions.","source":"draft-176","status":"aspirational","test":null,"section":"tasks","leaf":"resilience"}]},{"id":"tasks/steps","title":"Task Steps","description":"The step protocol for flow steps: pre_check/execute/verify pattern, idempotency requirements, and error classification. Steps are the atomic units of work within a flow transition.","invariants":[{"id":"step-verification","description":"Flow steps are only marked as completed in step_progress.json after verification that the action durably took effect (e.g. branch exists on remote after push, PR exists after create_pr).","rationale":"Without verification, steps can ghost-complete — the function returns without exception but the action didn't happen. This causes tasks to be marked done when their work never landed.","source":"draft-180","status":"aspirational","test":null,"section":"tasks","leaf":"steps"},{"id":"step-idempotency","description":"Flow steps can be safely retried. Each step checks whether its work is already done before executing, and skips if so.","rationale":"When the fixer resumes a failed flow, it re-runs from the failed step. If the step partially succeeded (e.g. branch pushed), the retry must not fail because the work already exists.","source":"draft-180","status":"aspirational","test":null,"section":"tasks","leaf":"steps"},{"id":"step-error-classification","description":"Step failures are classified by exception type — RetryableStepError (transient, retry), StepVerificationError (execute ran but verify failed), PermanentStepError (intervention needed). Routing is determined by exception type, not by message parsing.","rationale":"Without typed exceptions, all step failures hit the same catch-all. Transient errors are treated the same as permanent errors. Typed classification enables correct routing.","source":"draft-180","status":"aspirational","test":null,"section":"tasks","leaf":"steps"}]}]},{"id":"scheduler","title":"Scheduler","principle":"The scheduler is the only component that spawns agents","description":"The scheduler is a long-running Python process that drives the entire orchestration loop. It claims tasks from the server, spawns agents in worktrees, monitors completion, and runs periodic background jobs. Nothing else spawns agents. The scheduler's tick loop is the heartbeat of the system.","leaves":[{"id":"scheduler/claiming","title":"Task Claiming","description":"How the scheduler claims tasks from the server. Claims are atomic and lease-based. The server is the source of truth for what is claimed. Claim results distinguish between \"no tasks\", \"at capacity\", and \"claimed successfully\".","invariants":[{"id":"expired-lease-cleared","description":"Tasks with expired leases are detected and their lease state is cleared by the scheduler's housekeeping job within one cycle. A task cannot remain indefinitely blocked by a stale lease_expires_at value.","rationale":"Stale leases block tasks from being reclaimed. If lease recovery misses a task, that task is stuck forever with no agent working on it and no way to reclaim it.","source":"draft-145","status":"aspirational","test":null,"section":"scheduler","leaf":"claiming"},{"id":"claim-limit","description":"The scheduler never claims more tasks than max_claimed allows for any agent blueprint.","rationale":"Overclaiming wastes resources and can cause contention. Each blueprint defines its capacity and the scheduler respects it.","source":"bootstrap","status":"aspirational","test":null,"section":"scheduler","leaf":"claiming"},{"id":"claim-returns-typed-result","description":"tasks.claim() returns an explicit typed result that distinguishes between: task claimed successfully, queue empty, and at-capacity. Callers can determine the specific reason without interpreting None.","rationale":"The current claim() returns None for both \"no tasks\" and \"at capacity\", making it impossible to distinguish. This causes the scheduler to silently stop claiming with no log entry explaining why.","source":"draft-156","status":"aspirational","test":null,"section":"scheduler","leaf":"claiming"}]},{"id":"scheduler/jobs","title":"Scheduler Jobs","description":"Background jobs registered with the scheduler. Jobs run at intervals, are idempotent, and don't pile up (if a job is already running, the next trigger is skipped). Jobs are distinct from agents — they are programmatic, not LLM-driven.","invariants":[{"id":"jobs-declared-in-yaml","description":"Scheduler background jobs are declared in jobs.yaml and dispatched by a generic runner. Adding a new job means adding a YAML entry and a registered Python function, not modifying the scheduler's core loop.","rationale":"Hardcoded job dispatch creates coupling between the scheduler and every background task. Declarative YAML makes jobs discoverable and configurable without code changes.","source":"draft-061","status":"enforced","test":null,"section":"scheduler","leaf":"jobs"},{"id":"jobs-are-idempotent","description":"Background jobs are idempotent — running them twice produces the same result. If a job is already running when the next trigger fires, the trigger is skipped.","rationale":"Jobs run at intervals and the scheduler may restart mid-job. Idempotency ensures partial runs don't corrupt state, and skip-if-running prevents pile-up.","source":"draft-061","status":"aspirational","test":null,"section":"scheduler","leaf":"jobs"}]},{"id":"scheduler/multi-machine","title":"Multi-Machine Scheduling","description":"Multiple schedulers can run simultaneously on different machines. Scope-based isolation ensures they don't interfere. The server's atomic claim prevents duplicate task assignment.","invariants":[{"id":"scope-based-isolation","description":"Multiple schedulers can run simultaneously by registering with different scopes. Tasks, queues, and messages in one scope are invisible to another. The server's atomic claim prevents duplicate assignment within a scope.","rationale":"Without scope isolation, multiple schedulers would claim each other's tasks and interfere with each other's state.","source":"bootstrap","status":"aspirational","test":null,"section":"scheduler","leaf":"multi-machine"}]},{"id":"scheduler/programmatic-first","title":"Programmatic First","description":"LLM agents are only spawned when programmatic logic cannot handle the task. Guard scripts run before agents. CI failure handling is programmatic. The system prefers cheap deterministic logic over expensive LLM calls.","invariants":[{"id":"guard-before-agent","description":"Guard scripts and programmatic checks run before spawning an LLM agent. If the guard can handle the situation (e.g. CI failure is a known pattern), no agent is spawned.","rationale":"LLM agents are expensive and slow. Programmatic logic handles routine cases (binary pass/fail, pattern matching) at near-zero cost.","source":"draft-059","status":"aspirational","test":null,"section":"scheduler","leaf":"programmatic-first"}]},{"id":"scheduler/tick-loop","title":"Scheduler Tick Loop","description":"The scheduler runs a tick loop at a regular frequency. Each tick processes pending jobs, claims tasks, checks on running agents, and runs housekeeping. The tick loop is the heartbeat of the system.","invariants":[{"id":"tick-loop-is-heartbeat","description":"The scheduler runs a tick loop at a regular frequency. Each tick runs due jobs, claims tasks, checks running agents, and sends a heartbeat to the server. The tick loop is the single entry point for all scheduler activity.","rationale":"A single loop makes the scheduler's behaviour predictable and debuggable. All activity traces back to a tick.","source":"draft-059","status":"aspirational","test":null,"section":"scheduler","leaf":"tick-loop"}]}]},{"id":"agents","title":"Agents","principle":"Agents are stateless workers spawned by the scheduler","description":"Agents are Claude AI processes spawned by the scheduler to work on tasks. They are pure functions: given a task context, they produce commits and stdout. They do not retain state between runs. The scheduler controls when they run, how many run in parallel, and what they work on. Agent roles are flow-driven: implementer, gatekeeper, fixer, and background analysts.","leaves":[{"id":"agents/background","title":"Background Agents","description":"Background agents (analysts) run on a schedule without backpressure. They observe the system and suggest improvements via drafts, but do not block task processing. Manual triggers bypass the interval guard for development and debugging.","invariants":[{"id":"manual-trigger-bypasses-guard","description":"A manual trigger command can force a background agent to run immediately, regardless of its interval timer or pending work.","rationale":"During development and debugging, waiting for the next scheduled interval is too slow. A manual trigger enables rapid iteration.","source":"draft-183","status":"aspirational","test":null,"section":"agents","leaf":"background"},{"id":"analyst-uses-quantitative-tools","description":"The codebase analyst runs code quality measurement tools (pytest-cov, vulture, wily) before proposing drafts. Proposals include quantitative data supporting the recommendation.","rationale":"Without quantitative data, analyst recommendations are subjective and hard to prioritise. Tools provide objective signals that make the case for each recommendation.","source":"draft-178","status":"aspirational","test":null,"section":"agents","leaf":"background"}]},{"id":"agents/core-roles","title":"Core Agent Roles","description":"The three core agent roles: implementer (writes code), gatekeeper (reviews PRs), and fixer (resolves failures). Roles are determined by the flow transition's agent field, not by hardcoded logic.","invariants":[{"id":"roles-are-flow-driven","description":"Agent roles (implementer, gatekeeper, fixer) are determined by the flow transition's agent field, not by hardcoded logic in the scheduler. Adding a new role means adding a flow transition, not modifying scheduler code.","rationale":"Hardcoded role dispatch creates a coupling between the scheduler and every agent type. Flow-driven roles make the system extensible via configuration.","source":"draft-031","status":"aspirational","test":null,"section":"agents","leaf":"core-roles"},{"id":"implementer-output-is-commits","description":"The implementer agent's output is commits on the task branch. It does not create PRs, push branches, or call server APIs. Success is determined by the scheduler reading the agent's stdout.","rationale":"Keeping the implementer's scope narrow (write code, commit) makes it reliable and retryable. All post-work mechanics are handled by flow steps.","source":"draft-031","status":"aspirational","test":null,"section":"agents","leaf":"core-roles"},{"id":"gatekeeper-returns-decision","description":"The gatekeeper agent returns an approve/reject decision with a review comment. It does not merge PRs, move tasks between queues, or modify code.","rationale":"The gatekeeper is a reviewer, not an actor. Separating the decision from the action lets the orchestrator control what happens on approval or rejection.","source":"draft-029","status":"aspirational","test":null,"section":"agents","leaf":"core-roles"}]},{"id":"agents/spawning","title":"Agent Spawning","description":"The scheduler spawns agents in isolated worktrees. Spawning is conditions-based (flow conditions must be met). Maximum concurrent instances are enforced per agent blueprint.","invariants":[{"id":"one-spawn-path","description":"All agents are spawned through a single code path. There are no separate spawn functions per agent type. Differences between agent types are expressed as configuration, not code branches.","rationale":"Multiple spawn paths (spawn_implementer, spawn_lightweight, spawn_worktree) share 80% of logic and diverge in surprising ways. A single path with config-driven variation eliminates this.","source":"draft-030","status":"aspirational","test":null,"section":"agents","leaf":"spawning"},{"id":"spawn-respects-capacity","description":"The scheduler never spawns more agents than the configured max_concurrent for a given agent blueprint. Capacity is checked before every spawn attempt.","rationale":"Overspawning wastes resources and can cause contention for shared resources (disk, API rate limits, CPU).","source":"bootstrap","status":"aspirational","test":null,"section":"agents","leaf":"spawning"}]}]},{"id":"git","title":"Git","principle":"Git isolates agent work and delivers it via PRs","description":"Each task gets its own git worktree. Agents commit to task branches without interfering with each other or with main. Work is delivered via pull requests. The system has strong opinions about git hygiene: worktrees stay on detached HEAD, never stash, worktrees are preserved on requeue, and failed worktrees are retained for investigation.","leaves":[{"id":"git/branches","title":"Git Branches","description":"Task branches are created at push time, not claim time. Worktrees stay on detached HEAD until a branch is needed. Project branches are shared across child tasks. Base branch is configurable per project.","invariants":[{"id":"branch-created-at-push","description":"Task branches are created at push time (in the push_branch flow step), not at claim time. Worktrees stay on detached HEAD until a branch is needed.","rationale":"Creating branches at claim time causes git to refuse checkout in other worktrees (branch already checked out). Detached HEAD avoids this and defers naming until the work is ready to push.","source":"draft-022","status":"aspirational","test":null,"section":"git","leaf":"branches"},{"id":"branch-never-deleted-on-merge","description":"When merging a PR, the branch is never deleted. We may need to go back and check the branch later for forensics or recovery.","rationale":"Deleted branches destroy the ability to investigate what was merged and when. Branches are cheap; forensic capability is not.","source":"bootstrap","status":"aspirational","test":null,"section":"git","leaf":"branches"}]},{"id":"git/conflict-reduction","title":"Conflict Reduction","description":"Strategies to minimise merge conflicts: small atomic tasks, late rebasing (just before merge), no long-lived feature branches (except projects), CHANGELOG via changes.md instead of direct edits, agents avoiding shared files unnecessarily.","invariants":[{"id":"changelog-via-changes-md","description":"Agents write changelog entries to a changes.md file in the task runtime directory, not directly to CHANGELOG.md. The update_changelog flow step reads changes.md after merge and prepends it to CHANGELOG.md on main.","rationale":"Direct CHANGELOG.md edits by parallel agents cause rebase conflicts on every task. Writing to a per-task file eliminates the contention.","source":"bootstrap","status":"enforced","test":null,"section":"git","leaf":"conflict-reduction"},{"id":"small-atomic-tasks","description":"Tasks are scoped to be small and atomic — touching few files, completing quickly. Small tasks reduce the window for conflicts and make rebasing trivial.","rationale":"Large tasks that touch many files conflict with everything. Small tasks are independently mergeable and reduce rebase failures.","source":"bootstrap","status":"aspirational","test":null,"section":"git","leaf":"conflict-reduction"}]},{"id":"git/rebasing","title":"Git Rebasing","description":"Rebasing happens at specific points in the task lifecycle: just before merge (rebase_on_base, auto-injected terminal step) and before child task submission. Rebase conflicts abort cleanly without leaving dirty state.","invariants":[{"id":"rebase-before-merge","description":"Tasks are rebased onto the base branch immediately before merge (via the rebase_on_base terminal step, auto-injected by flow.py). Rebasing happens late, not at claim time.","rationale":"Early rebasing creates unnecessary conflicts as other tasks merge between claim and completion. Late rebasing minimises the conflict window to the moment before merge.","source":"bootstrap","status":"enforced","test":null,"section":"git","leaf":"rebasing"},{"id":"rebase-failure-aborts-cleanly","description":"When a rebase fails (conflicts that can't be auto-resolved), the step raises an error and the task routes to intervention. The rebase does not leave dirty state in the worktree.","rationale":"A half-applied rebase with conflict markers left in files causes the next agent to see broken code. Clean abort preserves the pre-rebase state.","source":"bootstrap","status":"aspirational","test":null,"section":"git","leaf":"rebasing"}]},{"id":"git/worktrees","title":"Git Worktrees","description":"Each task gets its own git worktree. Worktrees stay on detached HEAD until branch creation at push time. Existing worktrees are reused on requeue — never destroyed. Failed worktrees are retained for post-mortem investigation.","invariants":[{"id":"worktree-preservation","description":"When a task is requeued after an agent has worked on it, the existing worktree and commits are preserved. The agent resumes from existing work, not from scratch.","rationale":"Destroying completed work wastes agent turns and creates loops where agents redo work that was already done.","source":"draft-175","status":"aspirational","test":null,"section":"git","leaf":"worktrees"},{"id":"worktree-reuse-over-recreate","description":"A fresh worktree is only created when no previous worktree exists for the task. Infrastructure failures, gatekeeper rejection, and manual requeue must all attempt to reuse the existing worktree.","rationale":"Creating a fresh worktree when one already exists destroys completed work. Agents then redo work that was already committed, wasting turns and resources.","source":"draft-175","status":"aspirational","test":null,"section":"git","leaf":"worktrees"},{"id":"failed-worktree-retention","description":"Failed task worktrees are retained for at least 24 hours after the task enters the failed queue, giving humans time to investigate before cleanup. Done task worktrees may be cleaned up after 1 hour.","rationale":"Premature cleanup of failed worktrees destroys evidence needed for debugging. A grace period ensures humans can inspect git state, logs, and partial work before the worktree is swept.","source":"draft-134","status":"aspirational","test":null,"section":"git","leaf":"worktrees"}]}]},{"id":"github","title":"GitHub","principle":"GitHub PRs are the delivery mechanism for completed work","description":"Pull requests are how agent work lands on main. The system creates PRs automatically as part of the task flow, runs CI before gatekeeper review, and merges via the orchestrator (never manually). PRs carry metadata (pr_number, pr_url) stored on the task. Branches are never deleted on merge.","leaves":[{"id":"github/ci","title":"Continuous Integration","description":"CI runs before gatekeeper review. CI failures are handled programmatically — no LLM involvement needed to process a binary pass/fail signal.","invariants":[{"id":"ci-before-gatekeeper","description":"The gatekeeper never reviews a task whose CI has not passed. CI is a prerequisite for gatekeeper review, not a parallel or post-review check.","rationale":"Running CI after gatekeeper approval wastes gatekeeper turns on code that may not even build. CI failures should bounce back to the implementer directly, without LLM involvement.","source":"draft-185","status":"aspirational","test":null,"section":"github","leaf":"ci"},{"id":"ci-failure-is-programmatic","description":"When CI fails, the task is returned to the implementer without LLM gatekeeper involvement. The failure context (which tests failed, output) is included in the requeued task.","rationale":"CI failures are mechanical — the code doesn't compile or tests fail. The implementer can fix these without gatekeeper review. Involving the gatekeeper wastes an expensive LLM call on a binary signal.","source":"draft-185","status":"aspirational","test":null,"section":"github","leaf":"ci"}]},{"id":"github/pr-lifecycle","title":"Pull Request Lifecycle","description":"PRs are created by the create_pr flow step, reviewed by the gatekeeper, and merged by the merge_pr step. PR metadata (pr_number, pr_url) is stored on the task. Branches are never deleted on merge.","invariants":[{"id":"pr-created-by-flow-step","description":"Pull requests are created by the create_pr flow step, not by agents. The PR number and URL are stored on the task record via execution_notes.","rationale":"Agent-created PRs leave orphaned state if the agent crashes after creating the PR but before recording the number. Flow steps are idempotent and record metadata atomically.","source":"draft-031","status":"aspirational","test":null,"section":"github","leaf":"pr-lifecycle"},{"id":"pr-metadata-stored-on-task","description":"After PR creation, pr_number and pr_url are stored in the task's execution_notes. Downstream steps (gatekeeper review, merge) read PR metadata from the task, not from git.","rationale":"Without stored metadata, downstream steps must search GitHub for the PR, which is fragile and rate-limit-prone.","source":"draft-180","status":"aspirational","test":null,"section":"github","leaf":"pr-lifecycle"}]},{"id":"github/reviews","title":"PR Reviews","description":"The gatekeeper posts its review as a PR comment. Rejection feedback is on the PR (visible to the next implementer). Approval includes a summary comment before merge.","invariants":[{"id":"rejection-feedback-on-pr","description":"When rejecting a task, the gatekeeper posts rejection feedback as a comment on the PR. The feedback is visible to the next implementer who picks up the task.","rationale":"Feedback buried in task bodies or server messages is invisible to the agent working in the worktree. PR comments are visible alongside the code diff.","source":"bootstrap","status":"aspirational","test":null,"section":"github","leaf":"reviews"},{"id":"approval-comment-before-merge","description":"When approving a task, a review summary comment is posted on the PR before merging. This creates an audit trail of what was reviewed and why it was approved.","rationale":"Without an approval comment, merged PRs have no record of what the gatekeeper checked. The comment is the audit trail.","source":"bootstrap","status":"aspirational","test":null,"section":"github","leaf":"reviews"}]}]},{"id":"communication","title":"Communication","principle":"Components communicate through messages, not files","description":"The system uses an actor-model message system. Agents signal completion via stdout. Results are inferred from stdout content, not from result files. Messages are the communication channel for intervention, announcements, and agent proposals. Communication is append-only and auditable.","leaves":[{"id":"communication/actions","title":"Agent Actions","description":"Agents can propose actions (e.g. run a command, create a task) that require human approval before execution. The action system separates proposal from execution, keeping humans in control of side effects.","invariants":[{"id":"actions-require-approval","description":"Agent-proposed actions (create task, run command, modify configuration) require explicit human approval before execution. The action system separates proposal from execution.","rationale":"Agents should not have unsupervised side effects beyond their task scope. The approval step keeps humans in control of system-level changes.","source":"draft-050","status":"aspirational","test":null,"section":"communication","leaf":"actions"}]},{"id":"communication/announcements","title":"Completion Announcements","description":"When a task transitions to done, the scheduler posts a completion announcement message. Announcements are self-contained — they include enough context for follow-up agents to act without re-fetching task data.","invariants":[{"id":"completion-announced","description":"Every task that transitions to done has a corresponding task_completed message posted by the scheduler.","rationale":"Without completion announcements, follow-up work relies on a human noticing and running commands manually. Announcements enable automated post-completion workflows.","source":"draft-192","status":"aspirational","test":null,"section":"communication","leaf":"announcements"},{"id":"announcement-has-context","description":"The completion announcement message includes the task ID, title, linked draft ID (if any), and PR number (if any) — enough for follow-up agents to act without re-fetching.","rationale":"Follow-up agents that receive an announcement should not need additional API calls to determine basic task metadata. The announcement should be self-contained.","source":"draft-192","status":"aspirational","test":null,"section":"communication","leaf":"announcements"}]},{"id":"communication/messages","title":"Messages","description":"The actor-model message system used by agents, the scheduler, and humans to communicate. Messages are append-only, typed, and auditable. They carry intervention context, completion announcements, and human-to-agent instructions.","invariants":[{"id":"agents-communicate-via-messages","description":"Agents communicate their completion state to the orchestrator via messages or stdout, not by writing files to disk. The scheduler does not need to poll the filesystem to detect agent results.","rationale":"File-based result passing (result.json) is fragile — stale files can be misread, there is no acknowledgement, and it couples the scheduler to the agent's filesystem. Messages are timestamped and auditable.","source":"draft-171","status":"aspirational","test":null,"section":"communication","leaf":"messages"},{"id":"intervention-context-in-messages","description":"All intervention context (error source, failed step, error message) is communicated via task messages with to_actor=fixer, not via local files. The fixer reads messages, not intervention_context.json.","rationale":"Messages are the existing communication channel. Using a separate file creates a parallel system that must be kept in sync.","source":"draft-176","status":"aspirational","test":null,"section":"communication","leaf":"messages"},{"id":"intervention-resolution-via-reply","description":"Intervention is resolved when the fixer posts a reply message (via parent_message_id). The scheduler processes the reply and clears the flag. No separate resolved column or status field.","rationale":"Using message replies for resolution reuses existing infrastructure and creates a clear audit trail. The message thread shows the full intervention lifecycle.","source":"draft-176","status":"aspirational","test":null,"section":"communication","leaf":"messages"}]},{"id":"communication/result-inference","title":"Result Inference","description":"How the scheduler determines the outcome of an agent run. Results are inferred from stdout content using the claude CLI, not from structured result files. Agents communicate via natural language.","invariants":[{"id":"results-inferred-from-stdout","description":"The scheduler infers the agent's outcome from its stdout rather than requiring the agent to write a result.json file. Agents that complete work but omit mechanical file-writing are not erroneously failed.","rationale":"LLMs communicate through natural language. Requiring structured file output after a long creative session is fighting what they're good at. The system should interpret natural language output.","source":"draft-172","status":"aspirational","test":null,"section":"communication","leaf":"result-inference"},{"id":"result-inference-uses-cli-auth","description":"The result handler infers outcomes using claude -p subprocess invocation, using the same auth mechanism as spawned agents. It does not require a separate ANTHROPIC_API_KEY environment variable.","rationale":"The scheduler runs via launchd which does not have ANTHROPIC_API_KEY. Using the anthropic Python SDK causes auth failures. The claude CLI uses its own OAuth/session auth which is always available.","source":"draft-174","status":"aspirational","test":null,"section":"communication","leaf":"result-inference"},{"id":"result-json-references-removed","description":"Agent prompts do not instruct agents to write result.json. Agents signal completion via stdout only; the orchestrator infers the outcome from stdout content.","rationale":"Leftover result.json instructions cause confusion — agents may write a file nothing reads, or stale files cause incorrect processing.","source":"draft-174","status":"aspirational","test":null,"section":"communication","leaf":"result-inference"}]}]},{"id":"observability","title":"Observability","principle":"The system surfaces problems proactively","description":"The system logs all activity to a single unified log file. Background analysts measure health and post scores with justifications. Agent runs are visible in the dashboard. Queue health is monitored for stuck tasks. The goal is that any problem can be diagnosed from logs and metrics without forensic investigation.","leaves":[{"id":"observability/agent-visibility","title":"Agent Visibility","description":"Background agent runs are visible in the dashboard. Every run produces a log entry showing what was processed and the outcome.","invariants":[{"id":"background-agent-run-visibility","description":"Every background agent run produces a log entry visible in the dashboard agents tab, including what was processed and the outcome.","rationale":"Background agents are currently opaque — you cannot tell from the dashboard what they did or whether they are silently failing. Visibility enables monitoring and debugging.","source":"draft-183","status":"aspirational","test":null,"section":"observability","leaf":"agent-visibility"}]},{"id":"observability/health-scores","title":"Health Scores","description":"Background analysts produce numeric health scores for their domain. Scores are logged in append-only files with justifications, providing a longitudinal signal of whether the codebase is improving.","invariants":[{"id":"health-score-logged","description":"Every analyst draft includes a numeric health score (1-10) for the analyst's domain.","rationale":"A single numeric score provides a longitudinal signal — is the codebase getting better or worse over time?","source":"draft-191","status":"aspirational","test":null,"section":"observability","leaf":"health-scores"},{"id":"health-log-append-only","description":"Each analyst has a persistent log file that grows monotonically. Entries are never deleted or modified.","rationale":"Append-only ensures the historical trend is preserved. If entries could be modified, the trend becomes unreliable.","source":"draft-191","status":"aspirational","test":null,"section":"observability","leaf":"health-scores"},{"id":"score-has-justification","description":"Every health score entry includes a brief text summary explaining the rating.","rationale":"A bare number without context is useless. The justification explains what changed since the last score and why the rating went up or down.","source":"draft-191","status":"aspirational","test":null,"section":"observability","leaf":"health-scores"}]},{"id":"observability/logging","title":"Logging","description":"All system activity is written to a single unified log file. Structured entries allow grep-based investigation without knowing which component logged what.","invariants":[{"id":"unified-log-file","description":"All scheduler, agent, and hook activity is written to a single log file at .octopoid/runtime/logs/octopoid.log. Diagnosing any issue requires checking only one file.","rationale":"Scattered log files make diagnosis slow. A single log file with structured entries enables grep-based investigation without knowing which component logged what where.","source":"draft-168","status":"aspirational","test":null,"section":"observability","leaf":"logging"}]},{"id":"observability/queue-health","title":"Queue Health","description":"The scheduler monitors queue health: detecting stuck tasks, tasks with expired leases, and tasks that have been in the same state for too long. Health checks are throttled to avoid excessive API calls.","invariants":[{"id":"stuck-task-detection","description":"The scheduler detects tasks that have been in the same state for too long (e.g. claimed with expired lease, submitted but never reviewed) and takes corrective action or flags them for human attention.","rationale":"Without stuck detection, tasks can silently rot in a queue forever. The system must actively monitor for stalled work.","source":"bootstrap","status":"aspirational","test":null,"section":"observability","leaf":"queue-health"}]}]},{"id":"server","title":"Server","principle":"The server is the single source of truth","description":"The Octopoid server (Cloudflare Workers + D1) owns all persistent state: tasks, queues, projects, messages, flows, orchestrator registrations. No component caches state locally. If the server says a task is in a queue, it is in that queue. All mutations go through the server API.","leaves":[{"id":"server/api-contract","title":"API Contract","description":"The server exposes a REST API. All requests are scoped and authenticated. The API contract is stable: components can rely on endpoint shapes not changing without a version bump.","invariants":[{"id":"all-mutations-via-api","description":"All state mutations go through the server's REST API. No component writes directly to the database or bypasses the API. The API validates state transitions before applying them.","rationale":"Direct database writes bypass validation (state machine guards, lease checks, scope isolation). The API is the enforcement layer.","source":"draft-030","status":"aspirational","test":null,"section":"server","leaf":"api-contract"}]},{"id":"server/multi-tenant","title":"Multi-Tenancy","description":"Orchestrators register with a scope that isolates their data. Tasks, queues, and messages in one scope are not visible to another scope. Scopes enable multiple independent orchestration setups on one server.","invariants":[{"id":"orchestrator-registration-required","description":"Orchestrators must register with the server before claiming tasks. Registration establishes the scope and provides the orchestrator ID used for lease tracking.","rationale":"Without registration, the server cannot enforce scope isolation or track which orchestrator holds a lease.","source":"bootstrap","status":"enforced","test":null,"section":"server","leaf":"multi-tenant"}]},{"id":"server/state-ownership","title":"State Ownership","description":"The server owns all persistent state: task queues, task data, projects, messages, flow definitions, and orchestrator registrations. No component maintains a local cache that could diverge from the server.","invariants":[{"id":"server-owns-all-state","description":"The server owns all persistent state: task queues, task data, projects, messages, flow definitions, and orchestrator registrations. No component maintains a local cache that could diverge. If the server says a task is in a queue, it is in that queue.","rationale":"Local state files (state.json, result.json, claimed_task.json) create a distributed state problem on a single machine. The server as single source eliminates divergence.","source":"draft-030","status":"aspirational","test":null,"section":"server","leaf":"state-ownership"}]}]},{"id":"security","title":"Security","principle":"Secrets are never committed, access is scoped","description":"API keys are stored in gitignored files (.octopoid/.api_key) or environment variables, never in tracked files. Orchestrators register with a scope that isolates their data from other orchestrators. Key rotation is possible without code changes.","leaves":[{"id":"security/api-keys","title":"API Key Management","description":"API keys are stored in .octopoid/.api_key (gitignored), not in tracked files. The env var OCTOPOID_API_KEY overrides the file. Key rotation is possible without code changes.","invariants":[{"id":"keys-never-in-tracked-files","description":"API keys and secrets are stored in .octopoid/.api_key (gitignored) or environment variables, never in tracked files. .octopoid/config.yaml is tracked — no secrets there.","rationale":"A committed secret is a leaked secret. The gitignored file plus env var override provides secure storage with easy rotation.","source":"bootstrap","status":"enforced","test":null,"section":"security","leaf":"api-keys"}]},{"id":"security/scoping","title":"Orchestrator Scoping","description":"Each orchestrator registers with a scope. Tasks, queues, and messages are isolated by scope. Orchestrators cannot access data outside their scope.","invariants":[{"id":"scope-isolates-data","description":"Each orchestrator registers with a scope. All API requests are scoped. Tasks, messages, and projects in one scope cannot be accessed from another scope.","rationale":"Without scoping, a misconfigured orchestrator could read or modify another orchestrator's tasks. Scope isolation prevents cross-contamination.","source":"bootstrap","status":"aspirational","test":null,"section":"security","leaf":"scoping"}]}]},{"id":"configuration","title":"Configuration","principle":"Configuration is declarative and lives in .octopoid/","description":"All system configuration — agents, flows, jobs, server URL — lives in .octopoid/config.yaml as a single source of truth. No configuration is duplicated between files. Flows are defined as YAML, not code. Agent definitions are authoritative in one place.","leaves":[{"id":"configuration/single-source","title":"Single Source of Truth for Configuration","description":"Agent configuration exists in exactly one place. All tools, dashboards, and scheduler logic read from that single source.","invariants":[{"id":"single-agent-config","description":"An agent's configuration exists in exactly one place. All tools, dashboards, and scheduler logic that need agent information read from that single source.","rationale":"Agent config currently exists in multiple places (per-agent dirs, agents.yaml, jobs.yaml). Duplicated config leads to contradictions and makes it impossible to know which source is authoritative.","source":"draft-184","status":"aspirational","test":null,"section":"configuration","leaf":"single-source"}]}]},{"id":"projects","title":"Projects","principle":"Projects group related tasks under a shared branch","description":"A project is a collection of related tasks that share a branch and lifecycle. Projects have their own state machine (draft → active → provisional → done), child tasks that don't create individual PRs, and aggregate changelogs. Projects are the mechanism for coordinating multi-task features.","leaves":[{"id":"projects/child-flows","title":"Child Task Flows","description":"Child tasks within a project share the project's branch. They don't create individual PRs; their work is delivered together when the project completes. Child flows differ from standalone task flows.","invariants":[{"id":"project-uses-child-flow","description":"Tasks with a project_id are dispatched through the project's child_flow transitions (defined in project.yaml), not the default flow. Project child tasks commit to the shared branch without creating individual PRs.","rationale":"Project tasks share a branch and lifecycle. Using the default flow would create individual PRs per task, defeating the purpose of project-level aggregation.","source":"draft-046","status":"aspirational","test":null,"section":"projects","leaf":"child-flows"},{"id":"project-tasks-inherit-branch","description":"When create_task(project_id=X) is called without an explicit branch, the task automatically inherits the project's branch.","rationale":"Requiring explicit branch specification for every child task is error-prone. Inheritance from the project ensures consistency.","source":"draft-046","status":"aspirational","test":null,"section":"projects","leaf":"child-flows"}]},{"id":"projects/completion","title":"Project Completion","description":"When all child tasks in a project are done, the project transitions. Changelogs are aggregated across all child tasks. The project's PR is the single delivery point.","invariants":[{"id":"project-completion-checks-children","description":"The check_project_completion job verifies all child tasks are done before transitioning the project. The project PR aggregates changelog entries from all children.","rationale":"A project marked done while children are still in progress creates an inconsistent state. The completion check ensures all work is landed.","source":"draft-046","status":"aspirational","test":null,"section":"projects","leaf":"completion"}]},{"id":"projects/lifecycle","title":"Project Lifecycle","description":"Projects move through states: draft → active → provisional → done. A project transitions to done when all child tasks complete.","invariants":[{"id":"project-state-machine","description":"Projects move through states: draft → active → provisional → done. State transitions are validated by the server. A project can only transition to done when all child tasks are complete.","rationale":"Without a state machine, project status is informal and can be inconsistent with child task status.","source":"draft-046","status":"aspirational","test":null,"section":"projects","leaf":"lifecycle"}]}]},{"id":"dashboard","title":"Dashboard","principle":"The dashboard shows work moving through the system","description":"The dashboard is the human window into the orchestrator. It shows tasks in every queue, agent activity, background analyst runs, draft statuses, and problems requiring attention. Humans interact with the system primarily through the dashboard: approving tasks, sending messages, and triggering actions.","leaves":[{"id":"dashboard/drafts-view","title":"Drafts View","description":"The dashboard shows draft statuses and linked work (tasks created from each draft). Humans can see which drafts are waiting for processing and which have already become tasks.","invariants":[{"id":"drafts-show-linked-work","description":"The dashboard drafts view shows each draft's status and any linked work (tasks created from the draft, projects it belongs to). Humans can see which drafts are pending, which have become tasks, and which are archived.","rationale":"Drafts are the starting point for all work. If you can't see whether a draft has been actioned, ideas get lost or duplicated.","source":"bootstrap","status":"aspirational","test":null,"section":"dashboard","leaf":"drafts-view"}]},{"id":"dashboard/user-actions","title":"User Actions","description":"Humans interact with the system through lightweight actions: approving tasks, sending messages to tasks or agents, and triggering manual runs. The dashboard is the primary interface for these actions.","invariants":[{"id":"human-actions-via-dashboard","description":"Humans interact with the system through the dashboard: approving tasks, sending messages, triggering manual agent runs. The dashboard is the primary interface for human intervention.","rationale":"Without a central interface, human intervention requires SSH, CLI commands, and manual API calls. The dashboard makes intervention accessible and auditable.","source":"draft-050","status":"aspirational","test":null,"section":"dashboard","leaf":"user-actions"}]},{"id":"dashboard/visibility","title":"System Visibility","description":"The dashboard shows tasks in every queue, agent activity (active runs, recent completions), and problems requiring attention (stuck tasks, repeated failures).","invariants":[{"id":"all-queues-visible","description":"The dashboard shows tasks in every queue (incoming, claimed, submitted, done, failed) with enough context to understand what's happening without clicking into each task.","rationale":"If any queue is hidden or hard to access, problems accumulate invisibly. The dashboard is the human's window into the system — it must show the full picture.","source":"bootstrap","status":"aspirational","test":null,"section":"dashboard","leaf":"visibility"}]}]},{"id":"testing","title":"Testing","principle":"Tests verify invariants against a real server","description":"The testing philosophy is outside-in: prefer end-to-end tests with a real local server over mocked unit tests. Integration tests use scoped_sdk for isolation. Each invariant in the system spec should have a corresponding test. Mocking is reserved for genuine edge cases that can't be triggered end-to-end.","leaves":[{"id":"testing/coverage","title":"Test Coverage","description":"Each invariant in the system spec should have a corresponding test. Invariants with test: null are gaps to be filled. The analyst tracks coverage as a health metric.","invariants":[{"id":"invariants-drive-test-backlog","description":"Each invariant in the system spec should have a corresponding test. Invariants with test: null are gaps. The coverage report (aspirational vs enforced) is the test-writing backlog.","rationale":"Without linking invariants to tests, there's no systematic way to know what's verified and what's assumed. The spec-to-test mapping makes coverage visible.","source":"draft-204","status":"aspirational","test":null,"section":"testing","leaf":"coverage"}]},{"id":"testing/infrastructure","title":"Test Infrastructure","description":"Integration tests run against a local server on port 9787. The scoped_sdk fixture provides test isolation. Each test gets its own scope. The test server is started via bin/start-test-server.sh.","invariants":[{"id":"test-server-on-dedicated-port","description":"Integration tests run against a local server on port 9787, separate from the dev server (8787). Tests never hit production.","rationale":"Hitting production from tests creates real state and wastes API quota. A dedicated test port ensures isolation.","source":"draft-028","status":"enforced","test":null,"section":"testing","leaf":"infrastructure"},{"id":"scoped-sdk-for-isolation","description":"Each test gets its own scope via the scoped_sdk fixture. Tests do not share state. Parallel test runs cannot interfere with each other.","rationale":"Shared test state causes flaky tests and ordering dependencies. Scoped isolation makes each test independent.","source":"draft-028","status":"enforced","test":null,"section":"testing","leaf":"infrastructure"}]},{"id":"testing/philosophy","title":"Testing Philosophy","description":"Outside-in: prefer end-to-end tests with a real local server over mocked unit tests. Integration tests use scoped_sdk for isolation. Mocking is reserved for genuine edge cases that can't be triggered end-to-end.","invariants":[{"id":"outside-in-preferred","description":"End-to-end tests with a real local server are preferred over mocked unit tests. The testing pyramid prioritises: (1) end-to-end, (2) integration, (3) unit. Mocking is reserved for genuine edge cases.","rationale":"Mocked tests hide real bugs — server schema changes, API validation changes, and lifecycle issues are invisible to mocked tests. Real server tests catch what mocks miss.","source":"draft-028","status":"aspirational","test":null,"section":"testing","leaf":"philosophy"}]}]},{"id":"drafts","title":"Drafts","principle":"Drafts are the starting point for change","description":"A draft is a proposal for a change to the system — an idea, a problem statement, or a design sketch. Drafts are processed into tasks via the draft pipeline. Every draft that proposes a behaviour change has an Invariants section. Drafts are archived once their invariants are verified as met.","leaves":[{"id":"drafts/authorship","title":"Draft Authorship","description":"Drafts can be authored by agents (via background analysts) or humans. Draft statuses are tracked. Agent-authored drafts are proposals, not decisions — they require human approval to proceed.","invariants":[{"id":"agent-drafts-are-proposals","description":"Drafts authored by agents (e.g. background analysts) are proposals, not decisions. They require human review before becoming tasks. Agent-authored drafts are clearly labelled with their source agent.","rationale":"Agents can identify issues but shouldn't unilaterally decide what work to do. Human review ensures agent proposals are relevant and correctly scoped.","source":"draft-081","status":"aspirational","test":null,"section":"drafts","leaf":"authorship"}]},{"id":"drafts/invariants","title":"Draft Invariants","description":"Invariants about the system spec itself: that it exists, that drafts propose invariants, and that process-draft verifies them before archiving.","invariants":[{"id":"system-spec-exists","description":"A project-management/system-spec.yaml file exists and documents the system's behavioural invariants. Agents read this file before making changes, so they know what guarantees to preserve.","rationale":"Without a centralised store, invariants live scattered across drafts. When a draft is archived, its invariants are archived with it. No agent can answer \"what does this system guarantee?\"","source":"draft-181","status":"enforced","test":null,"section":"drafts","leaf":"invariants"},{"id":"drafts-have-invariants","description":"Every draft that proposes a change to system behaviour has an Invariants section stating what should be true after the work is complete. If a draft has no invariants, that is surfaced for discussion rather than silently skipped.","rationale":"Without explicit invariants, intent evaporates during the draft-to-task translation. The implementer follows mechanical acceptance criteria and the broader intent is lost.","source":"draft-182","status":"aspirational","test":null,"section":"drafts","leaf":"invariants"},{"id":"process-draft-checks-invariants","description":"A draft cannot be archived until its invariants are verified as met in the code and added to the system spec. process-draft checks invariant satisfaction, not just task completion.","rationale":"Without this check, drafts get archived when their tasks are done, even if the invariant they described isn't actually met. The accountability loop is broken.","source":"draft-182","status":"aspirational","test":null,"section":"drafts","leaf":"invariants"}]},{"id":"drafts/lifecycle","title":"Draft Lifecycle","description":"Drafts move from idea to discussion to processing to enqueued work. Drafts are archived once their invariants are verified as met in code.","invariants":[{"id":"draft-status-on-server","description":"Draft status (idea, in_progress, complete, superseded) is stored on the server, not in the local markdown file. The server is the source of truth for draft status.","rationale":"Local file edits can diverge from the server. A single source of truth prevents status contradictions.","source":"bootstrap","status":"aspirational","test":null,"section":"drafts","leaf":"lifecycle"},{"id":"draft-to-task-traceability","description":"When a draft becomes a task, the draft's linked_task_id is set on the server. The chain from idea to implementation is traceable: draft → task → PR → merge.","rationale":"Without traceability, you can't answer 'why did we do this work?' or 'what happened to that idea?' The link preserves the decision chain.","source":"draft-182","status":"aspirational","test":null,"section":"drafts","leaf":"lifecycle"}]}]}]};</script>
<!-- SPEC_DATA_END -->

<script>
(function () {
  "use strict";

  // ── State ────────────────────────────────────────────────────────────
  let currentFilter = "all";
  let currentSearch = "";
  let selectedSection = null; // section id or null
  let selectedLeaf = null;    // leaf id or null

  // ── Data helpers ─────────────────────────────────────────────────────
  function allInvariants() {
    return SPEC_DATA.sections.flatMap(s => s.leaves.flatMap(l => l.invariants));
  }

  function findSection(id) {
    return SPEC_DATA.sections.find(s => s.id === id);
  }

  function findLeaf(id) {
    for (const s of SPEC_DATA.sections) {
      const l = s.leaves.find(l => l.id === id);
      if (l) return { section: s, leaf: l };
    }
    return null;
  }

  function getContextInvariants() {
    if (selectedLeaf) {
      const found = findLeaf(selectedLeaf);
      return found ? found.leaf.invariants : [];
    }
    if (selectedSection) {
      const s = findSection(selectedSection);
      return s ? s.leaves.flatMap(l => l.invariants) : [];
    }
    return allInvariants();
  }

  function applyFilters(invariants) {
    let result = invariants;
    if (currentFilter !== "all") {
      result = result.filter(i => i.status === currentFilter);
    }
    if (currentSearch.trim()) {
      const q = currentSearch.toLowerCase();
      result = result.filter(i =>
        i.description.toLowerCase().includes(q) ||
        i.id.toLowerCase().includes(q) ||
        (i.rationale && i.rationale.toLowerCase().includes(q)) ||
        (i.source && i.source.toLowerCase().includes(q))
      );
    }
    return result;
  }

  // ── Stats ────────────────────────────────────────────────────────────
  function renderStats() {
    const all = allInvariants();
    const enforced = all.filter(i => i.status === "enforced").length;
    const aspirational = all.filter(i => i.status === "aspirational").length;
    const pills = document.getElementById("stats-pills");
    pills.innerHTML =
      `<span class="stats-pill enforced">${enforced} enforced</span>` +
      `<span class="stats-pill aspirational">${aspirational} aspirational</span>` +
      `<span class="stats-pill total">${all.length} total</span>`;
  }

  // ── Tree sidebar ─────────────────────────────────────────────────────
  function renderTree() {
    const tree = document.getElementById("tree");
    tree.innerHTML = SPEC_DATA.sections.map(section => {
      const total = section.leaves.reduce((n, l) => n + l.invariants.length, 0);
      const leaves = section.leaves.map(leaf => {
        const count = leaf.invariants.length;
        return `<div class="tree-leaf" data-leaf="${leaf.id}" title="${esc(leaf.title)}">
          <span style="flex:1">${esc(leaf.title)}</span>
          <span class="tree-count">${count}</span>
        </div>`;
      }).join("");

      return `<div class="tree-section" data-section="${section.id}">
        <div class="tree-section-header">
          <span class="tree-toggle">&#9654;</span>
          <span class="tree-section-title">${esc(section.title)}</span>
          <span class="tree-count">${total}</span>
        </div>
        <div class="tree-leaves">${leaves}</div>
      </div>`;
    }).join("");

    // Section header clicks: toggle + select section
    tree.querySelectorAll(".tree-section-header").forEach(el => {
      el.addEventListener("click", () => {
        const sectionEl = el.closest(".tree-section");
        const sectionId = sectionEl.dataset.section;
        // Toggle open/close
        sectionEl.classList.toggle("open");
        selectSection(sectionId, el);
      });
    });

    // Leaf clicks
    tree.querySelectorAll(".tree-leaf").forEach(el => {
      el.addEventListener("click", e => {
        e.stopPropagation();
        selectLeaf(el.dataset.leaf);
      });
    });
  }

  function selectSection(sectionId, headerEl) {
    selectedSection = sectionId;
    selectedLeaf = null;
    // Update active states
    document.querySelectorAll(".tree-section-header").forEach(h => h.classList.remove("active"));
    document.querySelectorAll(".tree-leaf").forEach(l => l.classList.remove("active"));
    if (headerEl) headerEl.classList.add("active");
    else {
      const h = document.querySelector(`[data-section="${sectionId}"] .tree-section-header`);
      if (h) h.classList.add("active");
    }
    renderContent();
  }

  function selectLeaf(leafId) {
    selectedLeaf = leafId;
    // Determine section for tree highlighting
    const found = findLeaf(leafId);
    selectedSection = found ? found.section.id : null;
    // Update active states
    document.querySelectorAll(".tree-section-header").forEach(h => h.classList.remove("active"));
    document.querySelectorAll(".tree-leaf").forEach(l => {
      l.classList.toggle("active", l.dataset.leaf === leafId);
    });
    // Ensure section is open
    if (found) {
      const sectionEl = document.querySelector(`[data-section="${found.section.id}"]`);
      if (sectionEl) sectionEl.classList.add("open");
    }
    renderContent();
  }

  // ── Content area ─────────────────────────────────────────────────────
  function renderContent() {
