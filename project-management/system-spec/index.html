<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Spec — Octopoid</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar-w: 280px;
  --sidebar-bg: #1a1d2e;
  --sidebar-hover: #252840;
  --sidebar-active: #2e3354;
  --sidebar-border: #2a2d42;
  --sidebar-text: #c9cdd6;
  --sidebar-muted: #6b7280;
  --sidebar-accent: #818cf8;
  --main-bg: #f9fafb;
  --main-text: #111827;
  --main-muted: #6b7280;
  --main-border: #e5e7eb;
  --badge-tested-bg: #dcfce7;
  --badge-tested-text: #166534;
  --badge-implemented-bg: #dbeafe;
  --badge-implemented-text: #1e40af;
  --badge-aspirational-bg: #fef3c7;
  --badge-aspirational-text: #92400e;
  --inv-bg: #ffffff;
  --inv-border: #e5e7eb;
  --inv-hover: #f0f4ff;
  --highlight-bg: #fef9c3;
  --toolbar-bg: #ffffff;
  --toolbar-border: #e5e7eb;
  --btn-active-bg: #4f46e5;
  --btn-active-text: #ffffff;
  --btn-bg: #f3f4f6;
  --btn-text: #374151;
  --btn-hover: #e5e7eb;
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 14px;
  color: var(--main-text);
  background: var(--main-bg);
}

#app {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── Sidebar ─────────────────────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid var(--sidebar-border);
}

#sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--sidebar-border);
  flex-shrink: 0;
}

#sidebar-header h1 {
  font-size: 15px;
  font-weight: 700;
  color: #e2e8f0;
  letter-spacing: 0.02em;
  margin-bottom: 10px;
}

#sidebar-header .subtitle {
  font-size: 11px;
  color: var(--sidebar-muted);
  margin-bottom: 10px;
}

.stats-pills {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.stats-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 99px;
  font-weight: 600;
}
.stats-pill.tested { background: #14532d; color: #bbf7d0; }
.stats-pill.implemented { background: #1e3a5f; color: #bfdbfe; }
.stats-pill.aspirational { background: #78350f; color: #fde68a; }
.stats-pill.total { background: #374151; color: #d1d5db; }

#tree {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

#tree::-webkit-scrollbar { width: 4px; }
#tree::-webkit-scrollbar-track { background: transparent; }
#tree::-webkit-scrollbar-thumb { background: var(--sidebar-border); border-radius: 2px; }

/* ── Category headers ───────────────────────────────────────────── */
.tree-category {
  margin-top: 4px;
}

.tree-category-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px 4px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--sidebar-muted);
  user-select: none;
  cursor: pointer;
}
.tree-category-header:hover { color: var(--sidebar-text); }

.tree-category-sections {
  display: none;
}
.tree-category.open > .tree-category-sections { display: block; }

/* ── Section headers ────────────────────────────────────────────── */
.tree-section { }

.tree-section-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px 7px 20px;
  cursor: pointer;
  color: var(--sidebar-text);
  font-size: 12px;
  font-weight: 600;
  user-select: none;
  border-radius: 0;
  transition: background 0.1s;
}
.tree-section-header:hover { background: var(--sidebar-hover); }
.tree-section-header.active { background: var(--sidebar-active); color: #fff; }

.tree-toggle {
  display: inline-block;
  width: 14px;
  text-align: center;
  font-size: 9px;
  color: var(--sidebar-muted);
  transition: transform 0.15s;
  flex-shrink: 0;
}
.tree-section.open > .tree-section-header > .tree-toggle {
  transform: rotate(90deg);
}
.tree-category.open > .tree-category-header > .tree-toggle {
  transform: rotate(90deg);
}

.tree-section-title { flex: 1; }

.tree-count {
  font-size: 11px;
  color: var(--sidebar-muted);
  font-weight: 400;
  flex-shrink: 0;
}

.tree-leaves {
  display: none;
  padding-left: 8px;
}
.tree-section.open > .tree-leaves { display: block; }

.tree-leaf {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 16px 5px 34px;
  cursor: pointer;
  color: var(--sidebar-muted);
  font-size: 12px;
  transition: background 0.1s, color 0.1s;
  border-radius: 0;
}
.tree-leaf:hover { background: var(--sidebar-hover); color: var(--sidebar-text); }
.tree-leaf.active { background: var(--sidebar-active); color: var(--sidebar-accent); }

/* ── Main panel ──────────────────────────────────────────────────────── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  background: var(--toolbar-bg);
  border-bottom: 1px solid var(--toolbar-border);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.filter-group {
  display: flex;
  gap: 4px;
}

.filter-btn {
  padding: 5px 12px;
  border: 1px solid var(--main-border);
  background: var(--btn-bg);
  color: var(--btn-text);
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
}
.filter-btn:hover { background: var(--btn-hover); }
.filter-btn.active {
  background: var(--btn-active-bg);
  color: var(--btn-active-text);
  border-color: var(--btn-active-bg);
}

#search {
  flex: 1;
  min-width: 160px;
  max-width: 320px;
  padding: 5px 10px;
  border: 1px solid var(--main-border);
  border-radius: 6px;
  font-size: 13px;
  color: var(--main-text);
  outline: none;
  background: #fff;
}
#search:focus { border-color: #818cf8; box-shadow: 0 0 0 2px rgba(129,140,248,0.2); }

.result-count {
  margin-left: auto;
  font-size: 12px;
  color: var(--main-muted);
  white-space: nowrap;
}

#content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

#content::-webkit-scrollbar { width: 6px; }
#content::-webkit-scrollbar-track { background: transparent; }
#content::-webkit-scrollbar-thumb { background: var(--main-border); border-radius: 3px; }

/* ── Section/leaf heading ────────────────────────────────────────────── */
.content-header {
  margin-bottom: 20px;
}

.content-header h2 {
  font-size: 20px;
  font-weight: 700;
  color: var(--main-text);
  margin-bottom: 6px;
}

.content-principle {
  font-size: 14px;
  font-weight: 600;
  color: #4f46e5;
  margin-bottom: 8px;
  font-style: italic;
}

.content-desc {
  font-size: 13px;
  color: var(--main-muted);
  line-height: 1.6;
  max-width: 680px;
}

/* ── Invariant cards ─────────────────────────────────────────────────── */
.invariants-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-width: 820px;
}

.invariant-card {
  background: var(--inv-bg);
  border: 1px solid var(--inv-border);
  border-radius: 8px;
  padding: 14px 16px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.invariant-card:hover {
  border-color: #c7d2fe;
  box-shadow: 0 1px 6px rgba(79,70,229,0.08);
}

.inv-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}

.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.03em;
  text-transform: lowercase;
  flex-shrink: 0;
}
.badge.tested { background: var(--badge-tested-bg); color: var(--badge-tested-text); }
.badge.not-tested { background: var(--badge-aspirational-bg); color: var(--badge-aspirational-text); }
.badge.implemented { background: var(--badge-implemented-bg); color: var(--badge-implemented-text); }
.badge.not-implemented { background: var(--badge-aspirational-bg); color: var(--badge-aspirational-text); }

.inv-id {
  font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  font-size: 12px;
  font-weight: 600;
  color: #374151;
}

.breadcrumb {
  font-size: 11px;
  color: var(--main-muted);
  margin-left: auto;
}

.inv-desc {
  font-size: 13px;
  color: var(--main-text);
  line-height: 1.65;
  margin-bottom: 8px;
}

.inv-rationale {
  font-size: 12px;
  color: #4b5563;
  line-height: 1.6;
  padding: 8px 10px;
  background: #f9fafb;
  border-left: 3px solid #e5e7eb;
  border-radius: 0 4px 4px 0;
  margin-bottom: 8px;
}

.inv-meta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  font-size: 11px;
  color: var(--main-muted);
}

.inv-meta a { color: #4f46e5; text-decoration: none; }
.inv-meta a:hover { text-decoration: underline; }

.inv-test {
  font-family: "SFMono-Regular", Consolas, monospace;
  font-size: 10.5px;
  background: #f3f4f6;
  padding: 1px 5px;
  border-radius: 3px;
}

mark {
  background: var(--highlight-bg);
  padding: 0 1px;
  border-radius: 2px;
}

/* ── Empty / welcome state ───────────────────────────────────────────── */
.empty-state {
  padding: 40px 0;
  color: var(--main-muted);
  text-align: center;
  font-size: 13px;
}

.welcome-state {
  padding: 20px 0;
  max-width: 680px;
}

.welcome-state h2 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 8px;
}

.welcome-state p {
  color: var(--main-muted);
  line-height: 1.6;
  margin-bottom: 16px;
  font-size: 13px;
}

.section-overview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
  margin-top: 20px;
}

.section-card {
  background: #fff;
  border: 1px solid var(--main-border);
  border-radius: 8px;
  padding: 14px;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.section-card:hover {
  border-color: #818cf8;
  box-shadow: 0 2px 8px rgba(79,70,229,0.1);
}
.section-card h3 {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 4px;
  color: var(--main-text);
}
.section-card .principle {
  font-size: 12px;
  color: #6366f1;
  font-style: italic;
  margin-bottom: 8px;
  line-height: 1.5;
}
.section-card .section-counts {
  display: flex;
  gap: 6px;
}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>&#9670; System Spec</h1>
      <div class="subtitle">Octopoid behavioural invariants</div>
      <div class="stats-pills" id="stats-pills">
        <!-- filled by JS -->
      </div>
    </div>
    <div id="tree">
      <!-- filled by JS -->
    </div>
  </div>

  <div id="main">
    <div id="toolbar">
      <div class="filter-group">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="tested">Tested</button>
        <button class="filter-btn" data-filter="implemented">Implemented</button>
        <button class="filter-btn" data-filter="aspirational">Aspirational</button>
      </div>
      <input id="search" type="search" placeholder="Search invariants..." autocomplete="off">
      <span class="result-count" id="result-count"></span>
    </div>
    <div id="content">
      <!-- filled by JS -->
    </div>
  </div>
</div>

<script>const SPEC_DATA = {"meta":{"format_version":3,"last_updated":"2026-03-01","description":"Behavioural invariants for the Octopoid orchestrator, organised as an identity-oriented tree. Top-level directories are categories of knowledge (functionality, architecture, testing, observability). Sections within each category are identity statements — what the system IS — that resolve into increasingly specific invariants.\nThis is a narrative, not a reference manual. Read top-down to understand the system's nature, then drill into specifics.\n","invariant_fields":{"implemented":"Boolean. True if the code currently satisfies this invariant.","tested":"Boolean. True if a test exists that verifies this invariant."},"categories":{"functionality":"What the system is designed to do.","architecture":"How the code is built to meet the functional need.","testing":"How we verify the system matches its description.","observability":"How we keep it running and surface problems."}},"categories":[{"id":"functionality","number":"1","title":"Functionality","sections":[{"id":"functionality/01-drafts-describe-changes","number":"1.1","title":"Drafts describe changes to the system","principle":"All changes to the system begin as drafts that capture intent, invariants, and status before any implementation work starts.","description":"Drafts are the entry point for all system changes. A draft captures what should change and why, along with testable invariants that define success. Both humans and background agents can author drafts. Once a draft is approved, it is processed into concrete tasks whose acceptance criteria derive from the draft's invariants.","category":"functionality","leaves":[{"id":"functionality/01-drafts-describe-changes/invariants","number":"1.1.1","title":"Draft lifecycle invariants","description":"Invariants governing how drafts are created, tracked, and processed into actionable work.","invariants":[{"id":"drafts-carry-invariants","number":"1.1.1.1","description":"Every draft has an invariants section stating testable behavioural guarantees about what should be true after the work is complete.","rationale":"Without testable invariants, there is no objective way to verify that a draft's intent was achieved. Invariants turn vague goals into verifiable outcomes.","source":"draft-182","implemented":true,"tested":false,"test":null,"category":"functionality","section":"01-drafts-describe-changes","leaf":"invariants"},{"id":"drafts-have-statuses","number":"1.1.1.2","description":"Every draft has a status field (idea, in_progress, complete) tracked on the server.","rationale":"Status tracking lets the scheduler and humans see where each draft sits in the pipeline without reading its full content.","source":"draft-016","implemented":true,"tested":false,"test":null,"category":"functionality","section":"01-drafts-describe-changes","leaf":"invariants"},{"id":"agents-can-author-drafts","number":"1.1.1.3","description":"Background agents can create drafts via the SDK; the author field distinguishes human from agent drafts.","rationale":"Agents discover improvement opportunities continuously. Letting them author drafts feeds those discoveries into the same review pipeline as human ideas.","source":"draft-016","implemented":true,"tested":false,"test":null,"category":"functionality","section":"01-drafts-describe-changes","leaf":"invariants"},{"id":"drafts-are-processed-into-tasks","number":"1.1.1.4","description":"A draft can be processed into tasks via /process-draft, with acceptance criteria derived from the draft's invariants.","rationale":"The draft-to-task pipeline ensures that every task traces back to a stated intent and has measurable acceptance criteria.","source":"draft-182","implemented":true,"tested":false,"test":null,"category":"functionality","section":"01-drafts-describe-changes","leaf":"invariants"}]}]},{"id":"functionality/02-work-via-tasks-and-projects","number":"1.2","title":"Work is done via tasks and projects","principle":"All implementation work is represented as tasks created through the API, optionally grouped into projects that share a base branch.","description":"Tasks are the atomic unit of work in the system. Each task has an ID, title, content with acceptance criteria, a role, and a flow that governs its lifecycle. Tasks must always be created through create_task() to ensure content is stored on the server and branches are correctly defaulted. Projects group related tasks that are worked on sequentially against a shared branch.","category":"functionality","leaves":[{"id":"functionality/02-work-via-tasks-and-projects/invariants","number":"1.2.1","title":"Task and project invariants","description":"Invariants governing how tasks and projects are created and structured.","invariants":[{"id":"tasks-are-unit-of-work","number":"1.2.1.1","description":"Tasks are the atomic unit of work. Each has an ID, title, content with acceptance criteria, a role (implement/review), and a flow that defines its lifecycle.","rationale":"A uniform task structure lets the scheduler, agents, and humans all reason about work the same way. Without it, different parts of the system would need special-case logic for different work types.","source":"core-architecture","implemented":true,"tested":false,"test":null,"category":"functionality","section":"02-work-via-tasks-and-projects","leaf":"invariants"},{"id":"tasks-created-through-api","number":"1.2.1.2","description":"Tasks are always created through create_task() which stores content on the server and handles branch defaulting. Never raw SDK or API calls.","rationale":"Bypassing create_task() causes task content to be missing from the server, which makes agents fail when they try to read the task.","source":"CLAUDE.md","implemented":true,"tested":false,"test":null,"category":"functionality","section":"02-work-via-tasks-and-projects","leaf":"invariants"},{"id":"projects-group-related-tasks","number":"1.2.1.3","description":"Projects group related tasks that share a base branch. Tasks within a project are worked on sequentially against the project branch.","rationale":"Related changes that target the same branch need to be sequenced to avoid merge conflicts. Projects enforce this ordering.","source":"draft-089","implemented":true,"tested":false,"test":null,"category":"functionality","section":"02-work-via-tasks-and-projects","leaf":"invariants"}]}]},{"id":"functionality/03-work-progresses-through-stages","number":"1.3","title":"Work progresses through defined stages","principle":"Every task's lifecycle is governed by a declarative flow YAML that is the single source of truth for transitions, conditions, and steps.","description":"Flow YAMLs define the complete path a task takes from creation to completion. There is no parallel hook system or imperative lifecycle manager — flows are the only transition path. The flow engine automatically injects terminal steps for transitions targeting done, so flow authors cannot accidentally omit merge logic.","category":"functionality","leaves":[{"id":"functionality/03-work-progresses-through-stages/invariants","number":"1.3.1","title":"Flow-driven lifecycle invariants","description":"Invariants governing how tasks progress through their lifecycle via declarative flows.","invariants":[{"id":"flow-is-source-of-truth","number":"1.3.1.1","description":"The flow YAML is the single source of truth for what happens to a task between creation and completion. When the scheduler syncs flow definitions to the server, it includes the full transition data — runs, conditions, checks, agent — not just from/to states.","rationale":"Stripped transitions cause steps to be skipped silently, leading to ghost completions (tasks in done with no PR). This was the root cause of a multi-hour outage.","source":"draft-010, postmortem-2026-02-28-ghost-completion","implemented":true,"tested":false,"test":null,"category":"functionality","section":"03-work-progresses-through-stages","leaf":"invariants"},{"id":"no-parallel-hook-system","number":"1.3.1.2","description":"There is no hook manager or imperative hook system running alongside flows. Flows are the only transition path. All lifecycle behaviour is expressed as flow transitions, conditions, and steps.","rationale":"Two parallel systems (flows + hooks) make it impossible to reason about what happens to a task by reading one place.","source":"draft-041","implemented":true,"tested":false,"test":null,"category":"functionality","section":"03-work-progresses-through-stages","leaf":"invariants"},{"id":"terminal-steps-auto-injected","number":"1.3.1.3","description":"Terminal steps (rebase_on_base, merge_pr) are automatically injected for any transition targeting done. Flow YAMLs don't need to include them — they are appended if missing.","rationale":"Forgetting terminal steps causes PRs to never merge despite tasks reaching done.","source":"flow.py","implemented":true,"tested":false,"test":null,"category":"functionality","section":"03-work-progresses-through-stages","leaf":"invariants"}]}]},{"id":"functionality/04-scheduler-drives-work","number":"1.4","title":"A scheduler drives work through the system","principle":"The scheduler is the central orchestrator that exhausts all programmatic checks before invoking expensive LLM agents.","description":"The scheduler runs on a tick loop, evaluating conditions, dispatching jobs, and spawning agents only when mechanically necessary. Jobs are defined declaratively in YAML, not hardcoded in the scheduler. Jobs are system-level periodic functions (sync flows, check leases) that operate on the system as a whole, distinct from flow steps that operate on individual tasks.","category":"functionality","leaves":[{"id":"functionality/04-scheduler-drives-work/invariants","number":"1.4.1","title":"Scheduler operation invariants","description":"Invariants governing how the scheduler drives work through the system.","invariants":[{"id":"programmatic-before-llm","number":"1.4.1.1","description":"The scheduler exhausts all programmatic checks before invoking an LLM. Guard chains, condition evaluation, job dispatch — all run as pure Python. Agents (LLM processes) are only spawned when the scheduler has mechanically confirmed they're needed.","rationale":"LLM calls are expensive and slow. Programmatic checks are free and instant. The scheduler should do everything it can without an LLM before spending tokens.","source":"draft-009, draft-205","implemented":true,"tested":false,"test":null,"category":"functionality","section":"04-scheduler-drives-work","leaf":"invariants"},{"id":"jobs-in-yaml","number":"1.4.1.2","description":"Scheduler jobs are defined in .octopoid/jobs.yaml with an interval, type (script or agent), and a reference to the function or prompt that runs them. Adding a new job means adding a YAML entry, not modifying scheduler.py.","rationale":"Hardcoded jobs in a 2300-line scheduler file meant touching 4 places to add a new job. Declarative config makes jobs visible and extensible.","source":"draft-060, draft-061","implemented":true,"tested":false,"test":null,"category":"functionality","section":"04-scheduler-drives-work","leaf":"invariants"},{"id":"jobs-are-not-flow-steps","number":"1.4.1.3","description":"Jobs are system-level periodic functions, not task transitions. They don't operate on a specific task — they operate on the system (check leases, sync flows, register the orchestrator). They share the declarative pattern but have a separate registry.","rationale":"Conflating jobs with task steps would overload the flow system with concerns that have nothing to do with task lifecycle.","source":"draft-061","implemented":true,"tested":false,"test":null,"category":"functionality","section":"04-scheduler-drives-work","leaf":"invariants"}]}]},{"id":"functionality/05-claims-and-assigns-implementers","number":"1.5","title":"It makes claims on available work and assigns implementers","principle":"The scheduler atomically claims tasks from the server and spawns the appropriate agent process for each claimed task.","description":"When tasks arrive in the incoming queue, the scheduler claims them using the server's atomic claim API, which prevents two schedulers from claiming the same task. Once claimed, the scheduler determines the correct agent type from the task's role and flow transition, then spawns the agent in the task's worktree.","category":"functionality","leaves":[{"id":"functionality/05-claims-and-assigns-implementers/invariants","number":"1.5.1","title":"Claiming and assignment invariants","description":"Invariants governing how the scheduler claims tasks and assigns agents to work on them.","invariants":[{"id":"atomic-claims-prevent-conflicts","number":"1.5.1.1","description":"Task claiming uses the server's atomic claim API so no two schedulers can claim the same task. The server rejects the claim if the task is already claimed.","rationale":"Without atomic claims, two schedulers could claim the same task and spawn duplicate agents.","source":"core-architecture","implemented":true,"tested":false,"test":null,"category":"functionality","section":"05-claims-and-assigns-implementers","leaf":"invariants"},{"id":"scheduler-claims-incoming-tasks","number":"1.5.1.2","description":"The scheduler polls the server for tasks in the incoming queue and claims them using the atomic claim API. Claiming sets claimed_by and starts a lease timer.","rationale":"Polling with atomic claims is the simplest mechanism that prevents duplicate work across multiple scheduler instances.","source":"core-architecture","implemented":true,"tested":false,"test":null,"category":"functionality","section":"05-claims-and-assigns-implementers","leaf":"invariants"},{"id":"claimed-task-gets-agent","number":"1.5.1.3","description":"After claiming a task, the scheduler spawns an agent process in the task's worktree. The agent type is determined by the task's role and the flow's current transition.","rationale":"The flow transition determines what kind of work is needed. The scheduler matches agent type to transition so the right tool is used for the right job.","source":"core-architecture","implemented":true,"tested":false,"test":null,"category":"functionality","section":"05-claims-and-assigns-implementers","leaf":"invariants"}]}]},{"id":"functionality/06-checks-status-after-implementation","number":"1.6","title":"After implementation, the scheduler checks status and prepares for review","principle":"The scheduler reads agent results, evaluates conditions, and drives tasks through post-implementation transitions toward review.","description":"When an agent process exits, the scheduler reads its result.json to determine the outcome. A successful implementation triggers the submit transition, moving the task to provisional and running pre-review steps like pushing the branch and creating a PR. Flow conditions gate transitions so they only fire when all prerequisites are satisfied.","category":"functionality","leaves":[{"id":"functionality/06-checks-status-after-implementation/invariants","number":"1.6.1","title":"Post-implementation check invariants","description":"Invariants governing how the scheduler processes agent results and prepares tasks for review.","invariants":[{"id":"result-collection-after-agent","number":"1.6.1.1","description":"When an agent process exits, the scheduler reads its result.json to determine the outcome (done, failed, error). The result drives the next flow transition.","rationale":"A structured result file decouples the agent process from the scheduler. The agent writes its outcome; the scheduler reads it on its own tick cycle.","source":"core-architecture","implemented":true,"tested":false,"test":null,"category":"functionality","section":"06-checks-status-after-implementation","leaf":"invariants"},{"id":"submit-moves-to-provisional","number":"1.6.1.2","description":"An implementer reporting outcome=done triggers the submit transition, moving the task from claimed to provisional. The scheduler then runs pre-review steps (push branch, create PR).","rationale":"Separating implementation from review with an explicit provisional state lets the scheduler run preparatory steps (branch push, PR creation) before involving a reviewer.","source":"flow-definition","implemented":true,"tested":false,"test":null,"category":"functionality","section":"06-checks-status-after-implementation","leaf":"invariants"},{"id":"conditions-gate-transitions","number":"1.6.1.3","description":"Flow conditions (like CI checks passing) are evaluated as pure functions on every tick. A transition only fires when all its conditions are satisfied.","rationale":"Conditions prevent premature transitions. Evaluating them as pure functions on every tick means no callbacks or webhooks are needed — the scheduler converges to the correct state by polling.","source":"draft-condition-system","implemented":false,"tested":false,"test":null,"category":"functionality","section":"06-checks-status-after-implementation","leaf":"invariants"}]}]},{"id":"functionality/07-gatekeepers-check-completed-work","number":"1.7","title":"Completed work is checked by gatekeepers","principle":"Gatekeepers are pure review functions that receive context and return a decision, never mutating system state themselves.","description":"When a task reaches the review stage, the scheduler dispatches a gatekeeper agent that receives the task description and PR diff as input. The gatekeeper returns a structured decision (approve or reject) via result.json. It never calls the server API or moves tasks between queues — state mutation is exclusively the scheduler's responsibility. CI checks run before the gatekeeper to avoid wasting tokens on code that doesn't compile or pass tests.","category":"functionality","leaves":[{"id":"functionality/07-gatekeepers-check-completed-work/invariants","number":"1.7.1","title":"Gatekeeper review invariants","description":"Invariants governing how gatekeepers review completed work.","invariants":[{"id":"gatekeeper-is-pure-function","number":"1.7.1.1","description":"The gatekeeper receives the task description and PR diff as input and returns result.json with a decision (approve/reject). It never calls the server API or moves tasks between queues — that's the scheduler's job.","rationale":"The gatekeeper is a reviewer, not an operator. Mixing review judgement with state mutation creates coupling and race conditions.","source":"draft-041","implemented":true,"tested":false,"test":null,"category":"functionality","section":"07-gatekeepers-check-completed-work","leaf":"invariants"},{"id":"ci-before-gatekeeper","number":"1.7.1.2","description":"CI checks run before the gatekeeper review. The scheduler polls check status as pure functions and only proceeds to dispatch the gatekeeper when all checks pass.","rationale":"Running the gatekeeper before CI wastes tokens reviewing code that doesn't even compile or pass tests.","source":"draft-condition-system","implemented":false,"tested":false,"test":null,"category":"functionality","section":"07-gatekeepers-check-completed-work","leaf":"invariants"}]}]},{"id":"functionality/08-rejections-send-work-back","number":"1.8","title":"Rejections from gatekeepers send work back to be redone","principle":"Rejected tasks return to the implementation queue with full context preserved so the next agent can fix the specific issues identified.","description":"When a gatekeeper rejects work, the task moves back to incoming (or a configured on_fail target) with its rejection count incremented. The rejection feedback is posted as a PR comment and stored as a message, giving the next implementer clear guidance on what to fix. The existing worktree is preserved so the next agent continues from the current state rather than starting over.","category":"functionality","leaves":[{"id":"functionality/08-rejections-send-work-back/invariants","number":"1.8.1","title":"Rejection handling invariants","description":"Invariants governing how rejected tasks are recycled back through the implementation pipeline.","invariants":[{"id":"rejection-requeues-task","number":"1.8.1.1","description":"When a gatekeeper rejects work, the task is moved back to incoming (or a configured on_fail target). The rejection count is incremented.","rationale":"Tracking rejection count enables the scheduler to apply escalation policies (e.g. flag for human review after N rejections) and prevents infinite loops.","source":"flow-definition","implemented":true,"tested":false,"test":null,"category":"functionality","section":"08-rejections-send-work-back","leaf":"invariants"},{"id":"rejection-feedback-preserved","number":"1.8.1.2","description":"Rejection feedback is posted as a PR comment and stored as a message, so the next implementer knows exactly what to fix.","rationale":"Without preserved feedback, the next agent would repeat the same mistakes. PR comments make feedback visible to both agents and humans.","source":"draft-051","implemented":true,"tested":false,"test":null,"category":"functionality","section":"08-rejections-send-work-back","leaf":"invariants"},{"id":"rejection-preserves-worktree","number":"1.8.1.3","description":"On rejection, the existing worktree is preserved. The next agent picks up where the previous one left off rather than starting from scratch.","rationale":"Destroying the worktree on rejection wastes all prior work. The fix is usually small relative to the total implementation, so preserving state is far more efficient.","source":"draft-051","implemented":true,"tested":false,"test":null,"category":"functionality","section":"08-rejections-send-work-back","leaf":"invariants"}]}]},{"id":"functionality/09-successful-work-is-merged","number":"1.9","title":"Successfully completed work is merged into the codebase","principle":"Approved tasks are automatically rebased and merged via terminal flow steps, with failures routed back for resolution rather than dropped.","description":"When a gatekeeper approves work, the flow engine's auto-injected terminal steps rebase the task branch onto the base branch and merge the PR. If rebase or merge fails due to conflicts, the task is rejected back to incoming with conflict details so the next agent can resolve them. After all terminal steps succeed, the task transitions to done.","category":"functionality","leaves":[{"id":"functionality/09-successful-work-is-merged/invariants","number":"1.9.1","title":"Merge workflow invariants","description":"Invariants governing how approved work is merged into the codebase.","invariants":[{"id":"approve-triggers-merge-flow","number":"1.9.1.1","description":"When a gatekeeper approves, the scheduler runs terminal steps: rebase onto base branch, then merge the PR. These steps are auto-injected by the flow engine.","rationale":"Auto-injecting terminal steps ensures every approval path includes merge logic. Without this, flow authors could accidentally omit rebase or merge and tasks would be marked done with unmerged PRs.","source":"flow.py","implemented":true,"tested":false,"test":null,"category":"functionality","section":"09-successful-work-is-merged","leaf":"invariants"},{"id":"merge-failures-are-recoverable","number":"1.9.1.2","description":"If rebase or merge fails (e.g. conflicts), the task is rejected back to incoming with the conflict details. The next agent resolves the conflict rather than re-implementing.","rationale":"Merge conflicts are a normal part of concurrent development. Treating them as recoverable rejections rather than fatal errors keeps the pipeline moving.","source":"result_handler.py","implemented":true,"tested":false,"test":null,"category":"functionality","section":"09-successful-work-is-merged","leaf":"invariants"},{"id":"approve-performs-transition","number":"1.9.1.3","description":"After all terminal steps succeed, the scheduler performs the state transition moving the task to done. [BUG: This is currently broken — see postmortem 2026-03-01-gatekeeper-approve-no-transition.md]","rationale":"The final transition to done is the completion signal. Without it, approved and merged tasks remain in a limbo state and are never cleaned up.","source":"postmortem","implemented":false,"tested":false,"test":null,"category":"functionality","section":"09-successful-work-is-merged","leaf":"invariants"}]}]},{"id":"functionality/10-intent-canonised-after-merge","number":"1.10","title":"The intent behind the work is canonised after it is done","principle":"After work is merged, the system updates its own specification to reflect what was built and why. This is not optional — multiple workers ensure completed work is properly recorded.","description":"In the same way that the changelog is written after a task completes, the specification itself should be updated. When work is merged, the system should have workers that ensure the intent, invariants, and capabilities are recorded in the spec. This closes the loop: drafts define intent, tasks implement it, and the spec records what was actually built. Without this, the spec drifts from reality.","category":"functionality","leaves":[{"id":"functionality/10-intent-canonised-after-merge/invariants","number":"1.10.1","title":"Post-merge canonisation invariants","description":"Invariants governing how the system records completed work in the specification and changelog after merge.","invariants":[{"id":"changelog-updated-after-merge","number":"1.10.1.1","description":"After a task's PR is merged, the update_changelog step reads the agent's changes.md file and prepends it to CHANGELOG.md on main. Agents write to changes.md, never directly to CHANGELOG.md.","rationale":"Direct CHANGELOG.md writes by agents cause constant rebase conflicts because every task touches the same file. Writing to changes.md isolates each task's changelog entry until merge time.","source":"CLAUDE.md","implemented":true,"tested":false,"test":null,"category":"functionality","section":"10-intent-canonised-after-merge","leaf":"invariants"},{"id":"spec-updated-after-merge","number":"1.10.1.2","description":"After work is merged, workers update the system spec to reflect what was built. New invariants are added, existing invariants are updated (e.g. implemented flipped to true), and the spec stays current with the actual system.","rationale":"Without automatic spec updates, the spec drifts from reality. The spec was built by reading drafts and code — it should be maintained the same way, as an ongoing process not a one-off.","source":"draft-208","implemented":false,"tested":false,"test":null,"category":"functionality","section":"10-intent-canonised-after-merge","leaf":"invariants"},{"id":"process-draft-checks-invariants","number":"1.10.1.3","description":"/process-draft checks whether the draft's invariants actually hold in the code before archiving the draft — not just whether tasks completed, but whether the intent was achieved.","rationale":"A draft isn't done when its tasks are done. It's done when the invariants it defined actually hold.","source":"draft-182","implemented":false,"tested":false,"test":null,"category":"functionality","section":"10-intent-canonised-after-merge","leaf":"invariants"}]}]},{"id":"functionality/11-background-agents-fight-complexity","number":"1.11","title":"Background agents fight against increasing complexity and regressions","principle":"Background analyst agents continuously examine the system and feed improvement suggestions into the same review pipeline as human ideas.","description":"Analyst agents (codebase, testing, architecture) run on scheduled jobs, using static analysis tools to gather structured data and LLMs to interpret findings and propose specific improvements. Their output takes the form of drafts created via the SDK, entering the standard review pipeline. Each analyst run produces at most one draft — the single most impactful improvement — to keep signal-to-noise high.","category":"functionality","leaves":[{"id":"functionality/11-background-agents-fight-complexity/invariants","number":"1.11.1","title":"Background analyst invariants","description":"Invariants governing how background agents monitor and improve the system.","invariants":[{"id":"analysts-produce-drafts","number":"1.11.1.1","description":"Background analyst agents (codebase, testing, architecture) examine the system and produce output as drafts via the SDK. Their suggestions enter the same pipeline as human ideas — reviewed, processed into tasks, implemented.","rationale":"Agents shouldn't push changes directly. Their suggestions go through the same review pipeline as human ideas, maintaining quality control.","source":"draft-087","implemented":true,"tested":false,"test":null,"category":"functionality","section":"11-background-agents-fight-complexity","leaf":"invariants"},{"id":"analysts-use-tools-not-just-llm","number":"1.11.1.2","description":"Analysts use static analysis tools (lizard for complexity, jscpd for duplication, vulture for dead code) to gather structured data, then use the LLM to interpret findings and propose specific improvements.","rationale":"Pure LLM analysis misses quantitative signals. Static tools provide objective measurements that ground the LLM's suggestions in data.","source":"draft-087","implemented":false,"tested":false,"test":null,"category":"functionality","section":"11-background-agents-fight-complexity","leaf":"invariants"},{"id":"one-suggestion-per-run","number":"1.11.1.3","description":"Each analyst run produces at most one draft — the single most impactful improvement found. This keeps signal-to-noise high and prevents suggestion fatigue.","rationale":"Multiple suggestions per run creates noise. The analyst should pick the best one and present it clearly.","source":"draft-087","implemented":true,"tested":false,"test":null,"category":"functionality","section":"11-background-agents-fight-complexity","leaf":"invariants"}]}]},{"id":"functionality/12-testing-alongside-implementation","number":"1.12","title":"Testing is done alongside implementation, particularly against intent","principle":"If invariants are changing, start with a failing integration test and then build the functionality to make it pass. Test-driven, but against the spec's own invariants.","description":"We currently test as and when we remember. Instead, when work is enqueued it should either add new invariants to the spec tree, replace existing invariants, or be a solution to an existing invariant. If the invariants are changing, the implementer starts with a failing integration test derived from the invariant and then builds the functionality to make it pass. A single implementer does both — it's part of their instructions, not a separate task.","category":"functionality","leaves":[{"id":"functionality/12-testing-alongside-implementation/invariants","number":"1.12.1","title":"Test-driven implementation invariants","description":"Rules ensuring that testing is driven by the spec and integral to implementation, not an afterthought.","invariants":[{"id":"work-relates-to-invariants","number":"1.12.1.1","description":"Every enqueued task either adds new invariants to the spec tree, replaces existing invariants, or is a solution to an existing invariant. There is no work that exists outside the spec's knowledge of the system.","rationale":"Work that doesn't relate to invariants is invisible to the spec. If we can't say which invariant a task serves, we can't verify whether the work achieved its intent.","source":"draft-208","implemented":false,"tested":false,"test":null,"category":"functionality","section":"12-testing-alongside-implementation","leaf":"invariants"},{"id":"changing-invariants-start-with-failing-test","number":"1.12.1.2","description":"When work changes or adds invariants, the implementer starts by writing a failing integration test derived from the invariant, then builds the functionality to make it pass. The test and the code ship together in the same PR.","rationale":"Writing the test first forces the invariant to be concrete and testable. It also guarantees the test actually fails before the implementation — preventing tests that pass regardless.","source":"draft-208","implemented":false,"tested":false,"test":null,"category":"functionality","section":"12-testing-alongside-implementation","leaf":"invariants"},{"id":"single-implementer-does-both","number":"1.12.1.3","description":"The implementer writes both the integration test and the implementation. This is part of their task instructions, not a separate follow-up task assigned to someone else.","rationale":"Splitting test-writing from implementation creates a backlog of unverified work. The person writing the code understands what to test. Keeping it in one task ensures it actually gets done.","source":"draft-208","implemented":false,"tested":false,"test":null,"category":"functionality","section":"12-testing-alongside-implementation","leaf":"invariants"}]}]},{"id":"functionality/13-failure-surfaces-early-and-heals","number":"1.13","title":"Failure is surfaced early and noisily and automatically heals","principle":"A diagnostic agent performs post-mortems on failures, reads previous results to spot patterns, and schedules work to improve the system. Humans are the last resort.","description":"Currently we babysit the failed queue ourselves and manually intervene. The system should instead have a diagnostic agent that handles failed tasks: performing a post-mortem on what went wrong, reading previous results to see patterns, and scheduling work to improve the system. It should resolve failed tasks by taking appropriate action — force it through, cancel it, re-enqueue with or without worktrees. The circuit breaker stops infinite loops, but what happens after a task reaches failed should be agentic, not manual.","category":"functionality","leaves":[{"id":"functionality/13-failure-surfaces-early-and-heals/invariants","number":"1.13.1","title":"Failure handling invariants","description":"Rules governing how failures are detected, diagnosed, and resolved by the system rather than by manual human intervention.","invariants":[{"id":"intervention-before-failed","number":"1.13.1.1","description":"When a task hits an error, it enters requires-intervention before it can reach failed. A fixer agent is spawned to diagnose and fix the problem. Only if the fixer cannot resolve it does the task reach failed — meaning genuinely stuck.","rationale":"Most task failures are mundane (git conflicts, stale state, transient errors). A fixer agent can resolve them automatically. The failed queue had 14 tasks, most with outcome=done — the work was done but post-processing broke.","source":"draft-170","implemented":false,"tested":false,"test":null,"category":"functionality","section":"13-failure-surfaces-early-and-heals","leaf":"invariants"},{"id":"diagnostic-agent-handles-failed","number":"1.13.1.2","description":"A diagnostic agent monitors the failed queue. For each failed task it performs a post-mortem: reads the task history, error context, and previous results to diagnose the root cause. It then takes action — re-enqueue (with or without worktree), force through, or cancel — rather than leaving it for a human.","rationale":"Currently humans babysit the failed queue. Most failed tasks have patterns: the same step fails repeatedly, or the work was done but a post-processing step broke. An agent can diagnose these and take appropriate action.","source":"draft-208","implemented":false,"tested":false,"test":null,"category":"functionality","section":"13-failure-surfaces-early-and-heals","leaf":"invariants"},{"id":"diagnostic-agent-spots-patterns","number":"1.13.1.3","description":"The diagnostic agent reads previous failure results across tasks to identify recurring patterns. When it spots a systemic issue (e.g. the same flow step failing for multiple tasks), it schedules work to fix the root cause rather than patching individual tasks.","rationale":"Fixing individual tasks is treating symptoms. Reading across failures to find patterns is treating causes. The agent should propose drafts for systemic fixes.","source":"draft-208","implemented":false,"tested":false,"test":null,"category":"functionality","section":"13-failure-surfaces-early-and-heals","leaf":"invariants"},{"id":"failures-have-recorded-reasons","number":"1.13.1.4","description":"Every task that enters requires-intervention or failed has a recorded diagnosis: what went wrong, which step failed, what the fixer attempted, why it couldn't be resolved.","rationale":"Without recorded reasons, debugging requires manual investigation of each stuck task.","source":"draft-170","implemented":false,"tested":false,"test":null,"category":"functionality","section":"13-failure-surfaces-early-and-heals","leaf":"invariants"},{"id":"circuit-breaker-stops-loops","number":"1.13.1.5","description":"Circuit breaker detects tasks in retry loops (same step failing repeatedly, or fixer reporting fixed but task not advancing) and escalates to failed after a configurable number of attempts.","rationale":"Without a circuit breaker, a task that always fails the same step would loop indefinitely between fixer and retry, consuming resources and producing no progress.","source":"postmortem-fixer-loop","implemented":true,"tested":false,"test":null,"category":"functionality","section":"13-failure-surfaces-early-and-heals","leaf":"invariants"}]}]},{"id":"functionality/14-agents-assigned-via-messages","number":"1.14","title":"Agents are assigned work primarily through messages","principle":"All agent-orchestrator communication is persisted as messages in a single queryable source of truth.","description":"Rather than scattering communication across result files, PR comments, task rewrites, and logs, the system uses a messages table as the canonical record of all agent interactions. Instructions, results, rejections, and test feedback are all persisted as messages. Agents communicate their completion state via messages or stdout-captured results rather than writing files to disk, eliminating the fragility of filesystem-based communication.","category":"functionality","leaves":[{"id":"functionality/14-agents-assigned-via-messages/invariants","number":"1.14.1","title":"Invariants","description":"Rules governing how agents receive instructions and report results via the message system.","invariants":[{"id":"messages-as-audit-trail","number":"1.14.1.1","description":"All agent-orchestrator communication for a task is persisted as messages in the server's messages table. The complete history (instructions given, results returned, rejections, test feedback) is queryable from one source of truth.","rationale":"Before messages, communication was scattered across result.json files (ephemeral), PR comments (GitHub), task file rewrites (lossy), and stderr logs. Five places to look, none complete.","source":"draft-034","implemented":false,"tested":false,"test":null,"category":"functionality","section":"14-agents-assigned-via-messages","leaf":"invariants"},{"id":"actors-communicate-via-messages","number":"1.14.1.2","description":"Agents communicate their completion state to the orchestrator via messages (or stdout-captured result), not by writing files to disk. The scheduler does not need to poll the filesystem to detect agent results.","rationale":"File-based communication is fragile — stale files cause bugs, deleted files lose data, and there's no ordering guarantee.","source":"draft-034, draft-171","implemented":false,"tested":false,"test":null,"category":"functionality","section":"14-agents-assigned-via-messages","leaf":"invariants"}]}]},{"id":"functionality/15-agents-are-stateless-and-fungible","number":"1.15","title":"Agents are stateless and mostly fungible","principle":"Agents are pure functions that read task content, produce results, and never mutate system state.","description":"Agents operate only within their worktree — they read task content, write code, and produce a result.json file. They do not import the SDK, call the server API, push code, create PRs, or move tasks between queues. All mechanical operations are performed by the scheduler after reading the agent's result. This makes agents replaceable, testable, and free from distributed state management problems.","category":"functionality","leaves":[{"id":"functionality/15-agents-are-stateless-and-fungible/invariants","number":"1.15.1","title":"Invariants","description":"Rules ensuring agents remain stateless, isolated, and free from side effects.","invariants":[{"id":"agents-write-result-json","number":"1.15.1.1","description":"Every agent writes result.json with an outcome field; this is the only communication channel from agent to orchestrator.","rationale":"A single, structured output format makes agent results predictable and parseable. The scheduler knows exactly where to look and what to expect.","source":"core-architecture","implemented":true,"tested":false,"test":null,"category":"functionality","section":"15-agents-are-stateless-and-fungible","leaf":"invariants"},{"id":"agents-never-call-server","number":"1.15.1.2","description":"Agents do not import the SDK, call the server API, or modify system state. They operate only within their worktree — reading task content, writing code, producing result.json.","rationale":"If agents could mutate server state, you'd have distributed state management with race conditions. Keeping agents pure makes them replaceable and testable.","source":"core-architecture","implemented":true,"tested":false,"test":null,"category":"functionality","section":"15-agents-are-stateless-and-fungible","leaf":"invariants"},{"id":"orchestrator-handles-mechanics","number":"1.15.1.3","description":"All mechanical operations (push, PR, rebase, merge, state transitions) are performed by the scheduler after reading agent result. Agents never push, create PRs, or move tasks.","rationale":"Agents that push their own code or create PRs create ordering problems and race conditions. The scheduler serialises these operations.","source":"core-architecture","implemented":true,"tested":false,"test":null,"category":"functionality","section":"15-agents-are-stateless-and-fungible","leaf":"invariants"}]}]},{"id":"functionality/16-work-specified-by-higher-class-llm","number":"1.16","title":"Work is specified and broken down by higher classes of LLM","principle":"Architectural decisions and task specifications come from opus-class models; implementation comes from cheaper sonnet-class models.","description":"The system uses a tiered LLM strategy. The human-interactive Claude session (opus-class) writes task content, acceptance criteria, and architectural decisions. Implementing agents are sonnet-class models — cheaper and faster — that follow specific instructions rather than making design choices. The quality of the specification determines the quality of the output, so task content must be complete enough for the implementer to work without asking questions.","category":"functionality","leaves":[{"id":"functionality/16-work-specified-by-higher-class-llm/invariants","number":"1.16.1","title":"Invariants","description":"Rules governing the division of cognitive labour between LLM tiers.","invariants":[{"id":"interactive-claude-writes-tasks","number":"1.16.1.1","description":"Task content and acceptance criteria are written by the human-interactive Claude session (opus-class), not by the implementing agent. The implementer receives a fully specified task.","rationale":"Opus-class models have the context and judgement to make architectural decisions. Delegating specification to cheaper models produces vague or incorrect task definitions.","source":"core-workflow","implemented":true,"tested":false,"test":null,"category":"functionality","section":"16-work-specified-by-higher-class-llm","leaf":"invariants"},{"id":"implementers-are-lower-cost","number":"1.16.1.2","description":"Implementing agents are typically sonnet-class models — cheaper and faster. They follow specific instructions rather than making architectural decisions.","rationale":"Most implementation work is straightforward code writing that doesn't require the reasoning capacity of opus-class models. Using cheaper models for execution keeps costs proportional to complexity.","source":"core-workflow","implemented":true,"tested":false,"test":null,"category":"functionality","section":"16-work-specified-by-higher-class-llm","leaf":"invariants"},{"id":"task-content-is-complete","number":"1.16.1.3","description":"Task content includes context, acceptance criteria, and enough detail for the implementer to work without asking questions. The quality of the specification determines the quality of the output.","rationale":"Agents cannot ask clarifying questions mid-task. Incomplete specifications lead to incorrect implementations, wasted compute, and rejection cycles.","source":"core-workflow","implemented":true,"tested":false,"test":null,"category":"functionality","section":"16-work-specified-by-higher-class-llm","leaf":"invariants"}]}]},{"id":"functionality/17-visibility-via-dashboard","number":"1.17","title":"Visibility of work is via agent scripts and a TUI dashboard","principle":"The human can see the full state of the system — tasks, agents, and drafts — through a dashboard and CLI skills.","description":"The system provides visibility through two channels: a TUI dashboard that shows tasks grouped by queue state, agent statuses, and draft suggestions with live updates; and CLI skills that are markdown files instructing Claude Code to perform ad-hoc operations using the SDK. Together these ensure the human always knows what the system is doing, what's stuck, and can intervene without diving into logs or database queries.","category":"functionality","leaves":[{"id":"functionality/17-visibility-via-dashboard/invariants","number":"1.17.1","title":"Invariants","description":"Rules ensuring the system's state is visible and controllable by the human operator.","invariants":[{"id":"tasks-visible-by-queue","number":"1.17.1.1","description":"The dashboard shows tasks grouped by queue state (incoming, claimed, provisional, done, failed) so the human can see at a glance where work is and what's stuck.","rationale":"Without visibility, you don't know if the system is working or silently stuck.","source":"draft-dashboard","implemented":true,"tested":false,"test":null,"category":"functionality","section":"17-visibility-via-dashboard","leaf":"invariants"},{"id":"agents-visible","number":"1.17.1.2","description":"The dashboard shows flow agents and job agents with their running/idle/errored status and last action, so you can see what's actively working.","rationale":"Knowing which agents are running and their status is essential for diagnosing slowdowns, stuck tasks, and resource usage.","source":"draft-dashboard","implemented":false,"tested":false,"test":null,"category":"functionality","section":"17-visibility-via-dashboard","leaf":"invariants"},{"id":"drafts-visible-with-status","number":"1.17.1.3","description":"The dashboard shows all drafts with their current status and author, live-updating so new agent suggestions appear without refresh.","rationale":"Drafts are the primary output of analyst agents. Making them visible with status ensures the human sees new suggestions promptly and can act on them.","source":"draft-dashboard","implemented":true,"tested":false,"test":null,"category":"functionality","section":"17-visibility-via-dashboard","leaf":"invariants"},{"id":"skills-are-human-interface","number":"1.17.1.4","description":"Skills are markdown files instructing Claude Code to perform operations using the SDK. They are the human's primary interface for ad-hoc operations (enqueue, approve, pause).","rationale":"A skill-based interface means operations are documented, repeatable, and don't require the human to remember API calls or SDK methods.","source":"core-workflow","implemented":true,"tested":false,"test":null,"category":"functionality","section":"17-visibility-via-dashboard","leaf":"invariants"}]}]},{"id":"functionality/18-server-is-source-of-truth","number":"1.18","title":"The source of truth for status and claims on work is the server","principle":"All durable state lives in the server's database, and every component reads from it rather than caching locally.","description":"The server's D1 database is the single source of truth for task state, claims, and transitions. The scheduler reads all state from the server on every tick without caching between ticks, ensuring multiple schedulers see a consistent view. The server enforces valid state transitions, uses lease-based locking for crash recovery, and all programmatic access goes through the SDK to ensure consistent error handling and API versioning.","category":"functionality","leaves":[{"id":"functionality/18-server-is-source-of-truth/invariants","number":"1.18.1","title":"Invariants","description":"Rules ensuring the server is the authoritative source for all system state.","invariants":[{"id":"server-is-source-of-truth","number":"1.18.1.1","description":"All durable state lives in the server's D1 database. The scheduler reads all state from the server on every tick and does not cache task state locally between ticks. The server's response is the ground truth.","rationale":"Multiple schedulers may run on different machines. If any scheduler cached state, they'd diverge. The server provides a consistent view.","source":"draft-059","implemented":true,"tested":false,"test":null,"category":"functionality","section":"18-server-is-source-of-truth","leaf":"invariants"},{"id":"server-enforces-state-machine","number":"1.18.1.2","description":"The server validates state transitions and rejects invalid ones. You cannot move a task directly from incoming to done — it must follow the defined transitions.","rationale":"Client-side validation is insufficient because multiple clients exist. Server-side enforcement is the only way to guarantee the state machine is respected.","source":"core-architecture","implemented":true,"tested":false,"test":null,"category":"functionality","section":"18-server-is-source-of-truth","leaf":"invariants"},{"id":"lease-based-locking","number":"1.18.1.3","description":"Task claims use leases with expiry times. If an agent crashes, its lease expires and the task becomes available for another agent to claim. No manual intervention needed for crashed agents.","rationale":"Without leases, a crashed agent's task would be stuck in claimed forever.","source":"core-architecture","implemented":true,"tested":false,"test":null,"category":"functionality","section":"18-server-is-source-of-truth","leaf":"invariants"},{"id":"all-access-through-sdk","number":"1.18.1.4","description":"All programmatic server access goes through the octopoid_sdk Python package. No raw HTTP calls in production code.","rationale":"A single SDK client ensures consistent error handling, auth, and API versioning.","source":"CLAUDE.md","implemented":true,"tested":false,"test":null,"category":"functionality","section":"18-server-is-source-of-truth","leaf":"invariants"}]}]},{"id":"functionality/19-work-in-git-worktrees","number":"1.19","title":"Work is done in git worktrees, created by the scheduler","principle":"Each task gets an isolated git worktree so agents cannot interfere with each other or the main checkout.","description":"The scheduler creates a dedicated git worktree for each task under .octopoid/runtime/tasks/<id>/worktree. Worktrees are always on detached HEAD to avoid git branch conflicts, with named branches created only at push time. When a task is requeued after rejection, its worktree is preserved so the next agent builds on previous work rather than starting from scratch. This isolation model means multiple agents can work concurrently without filesystem conflicts.","category":"functionality","leaves":[{"id":"functionality/19-work-in-git-worktrees/invariants","number":"1.19.1","title":"Invariants","description":"Rules governing how git worktrees are created, managed, and preserved for task isolation.","invariants":[{"id":"one-worktree-per-task","number":"1.19.1.1","description":"Each task gets its own git worktree under .octopoid/runtime/tasks/<id>/worktree. No two agents share a worktree.","rationale":"Shared worktrees would create git conflicts between agents. Isolation means agents can't interfere with each other.","source":"core-architecture","implemented":true,"tested":false,"test":null,"category":"functionality","section":"19-work-in-git-worktrees","leaf":"invariants"},{"id":"detached-head-always","number":"1.19.1.2","description":"Worktrees are always on detached HEAD. Named branches are created only when the scheduler runs push_branch, just before PR creation.","rationale":"Git refuses to checkout a branch that's already checked out in another worktree. Detached HEAD avoids this entirely.","source":"CLAUDE.md","implemented":true,"tested":false,"test":null,"category":"functionality","section":"19-work-in-git-worktrees","leaf":"invariants"},{"id":"preserve-worktrees-on-requeue","number":"1.19.1.3","description":"When a task is requeued (rejection or retry), its worktree is preserved so the next agent picks up where the previous one left off rather than re-implementing from scratch.","rationale":"Deleting the worktree on rejection would throw away the agent's work. Preserving it means fixes are incremental.","source":"core-architecture","implemented":true,"tested":false,"test":null,"category":"functionality","section":"19-work-in-git-worktrees","leaf":"invariants"}]}]},{"id":"functionality/20-rebasing-in-task-flow","number":"1.20","title":"Rebasing happens multiple times in the task flow as a defined step","principle":"Rebasing is a mechanical flow step executed by the scheduler at defined points, not by agents during implementation.","description":"Rebasing onto the latest base branch is deferred until just before merge to give agents a stable base during implementation. It is defined as a flow step (rebase_on_base) that the scheduler executes at specific points in the transition — typically before PR creation and before merge. When a rebase fails due to conflicts, the task is rejected back to incoming with conflict details so the next agent can resolve it in the preserved worktree.","category":"functionality","leaves":[{"id":"functionality/20-rebasing-in-task-flow/invariants","number":"1.20.1","title":"Invariants","description":"Rules governing when and how rebasing occurs within the task flow.","invariants":[{"id":"late-rebase","number":"1.20.1.1","description":"Rebasing onto the latest base branch happens just before merge, not during agent work. This minimises conflicts during implementation.","rationale":"Rebasing during implementation creates moving targets. Late rebase means agents work against a stable base.","source":"core-architecture","implemented":true,"tested":false,"test":null,"category":"functionality","section":"20-rebasing-in-task-flow","leaf":"invariants"},{"id":"rebase-is-flow-step","number":"1.20.1.2","description":"Rebasing is a mechanical flow step (rebase_on_base) executed by the scheduler, not by agents. It runs at defined points in the flow — typically before PR creation and before merge.","rationale":"Making rebase a flow step ensures it happens consistently and is visible in the flow definition. Agent-driven rebasing would be inconsistent and error-prone.","source":"flow-definition","implemented":true,"tested":false,"test":null,"category":"functionality","section":"20-rebasing-in-task-flow","leaf":"invariants"},{"id":"rebase-failure-is-recoverable","number":"1.20.1.3","description":"When a rebase fails due to conflicts, the task is rejected back to incoming with the conflict details. The next agent resolves the conflict in the preserved worktree.","rationale":"Rebase conflicts are expected in a multi-agent system. Making them recoverable rather than terminal ensures work is not lost.","source":"result_handler.py","implemented":true,"tested":false,"test":null,"category":"functionality","section":"20-rebasing-in-task-flow","leaf":"invariants"}]}]},{"id":"functionality/21-merging-after-checks","number":"1.21","title":"Merging is handled by the scheduler after checks such as CI","principle":"The scheduler performs merges via the GitHub API only after all required checks pass, preserving the PR audit trail.","description":"Merging is an auto-injected terminal step (merge_pr) that runs after all other steps in any transition targeting done. CI checks are evaluated as conditions before the merge transition fires, so a failing check blocks the merge. The scheduler merges via the GitHub API rather than pushing to main directly, preserving the full PR audit trail of reviews, comments, and check results.","category":"functionality","leaves":[{"id":"functionality/21-merging-after-checks/invariants","number":"1.21.1","title":"Invariants","description":"Rules governing how and when the scheduler merges PRs.","invariants":[{"id":"merge-is-terminal-step","number":"1.21.1.1","description":"merge_pr is an auto-injected terminal step that runs after all other steps in a transition targeting done. The scheduler performs the merge via the GitHub API.","rationale":"Auto-injection ensures merge is never accidentally omitted from a flow definition. Making it terminal guarantees all preceding steps (rebase, CI, gatekeeper) complete first.","source":"flow.py","implemented":true,"tested":false,"test":null,"category":"functionality","section":"21-merging-after-checks","leaf":"invariants"},{"id":"ci-gates-merge","number":"1.21.1.2","description":"CI checks are evaluated as conditions before the merge transition fires. A failing CI check blocks the gatekeeper dispatch and therefore the merge.","rationale":"Merging code that fails CI would break main. Gating on CI ensures only passing code reaches the main branch.","source":"draft-condition-system","implemented":false,"tested":false,"test":null,"category":"functionality","section":"21-merging-after-checks","leaf":"invariants"},{"id":"merge-uses-github-api","number":"1.21.1.3","description":"The scheduler merges PRs via the GitHub API (gh pr merge), not by pushing to main directly. This preserves the PR audit trail.","rationale":"Direct pushes to main bypass the PR record — reviews, comments, and check results would be disconnected from the merge. API-based merges keep everything linked.","source":"core-architecture","implemented":true,"tested":false,"test":null,"category":"functionality","section":"21-merging-after-checks","leaf":"invariants"}]}]},{"id":"functionality/22-pull-based-guards-limit-volume","number":"1.22","title":"Work is pull-based — guards stop agents creating too much","principle":"Guards and concurrency limits ensure agents only produce work when there is capacity to absorb it.","description":"The system is pull-based: agents check for existing pending work before producing more, and the scheduler limits concurrent agents per pool. Analyst agents check for pending drafts before running and exit immediately if one already exists, preventing suggestion pileup. Short scheduling intervals ensure responsiveness without flooding — the guard controls volume while the interval controls latency. The scheduler only claims new tasks when there is capacity, preventing resource exhaustion.","category":"functionality","leaves":[{"id":"functionality/22-pull-based-guards-limit-volume/invariants","number":"1.22.1","title":"Invariants","description":"Rules ensuring work production is demand-driven and bounded by capacity.","invariants":[{"id":"analyst-guard-prevents-pileup","number":"1.22.1.1","description":"Each analyst agent checks for existing pending drafts (same author, status=idea) before running. If one already exists, the agent exits immediately without producing a new suggestion.","rationale":"Without the guard, analysts produce suggestions faster than humans review them. The pending draft count grows unbounded, creating noise.","source":"draft-087","implemented":true,"tested":false,"test":null,"category":"functionality","section":"22-pull-based-guards-limit-volume","leaf":"invariants"},{"id":"short-intervals-for-responsiveness","number":"1.22.1.2","description":"Analyst intervals are short enough (hours, not days) so new suggestions appear promptly after one is acted on. The guard ensures frequency doesn't create volume.","rationale":"Long intervals mean long waits after acting on a suggestion. Short intervals + guard = responsive without flooding.","source":"draft-087","implemented":false,"tested":false,"test":null,"category":"functionality","section":"22-pull-based-guards-limit-volume","leaf":"invariants"},{"id":"scheduler-respects-concurrency","number":"1.22.1.3","description":"The scheduler limits the number of concurrently running agents per pool. It only claims new tasks when there is capacity, preventing resource exhaustion.","rationale":"Without concurrency limits, a burst of incoming tasks would spawn unbounded agents, exhausting CPU, memory, and API rate limits.","source":"core-architecture","implemented":true,"tested":false,"test":null,"category":"functionality","section":"22-pull-based-guards-limit-volume","leaf":"invariants"}]}]}]},{"id":"architecture","number":"2","title":"Architecture","sections":[{"id":"architecture/actor-model","number":"2.1","title":"Actor model — message-based communication","principle":"Components communicate via messages, not shared state. The server's messages table is the communication channel. Agents, the scheduler, the dashboard, and the human are all actors with inboxes.","description":"The actor model means no component reaches into another's internals. The scheduler doesn't read agent memory. Agents don't call the server. The dashboard doesn't modify task state directly. Everyone communicates via messages stored in the server's messages table. This gives a complete audit trail and makes the system's communication visible and queryable.","category":"architecture","leaves":[{"id":"architecture/actor-model/messages-as-audit-trail","number":"2.1.1","title":"All communication is persisted and queryable","description":"Every message between actors (instructions, results, rejections, feedback) is stored in the server's messages table. The complete history of a task is queryable from one source.","invariants":[{"id":"messages-as-audit-trail","number":"2.1.1.1","description":"All agent-orchestrator communication for a task is persisted as messages in the server's messages table. The complete history (instructions given, results returned, rejections, test feedback) is queryable from one source of truth.","rationale":"Before messages, communication was scattered across result.json files (ephemeral), PR comments (GitHub), task file rewrites (lossy), and stderr logs. Five places to look, none complete.","source":"draft-034","implemented":false,"tested":false,"test":null,"category":"architecture","section":"actor-model","leaf":"messages-as-audit-trail"},{"id":"actors-communicate-via-messages","number":"2.1.1.2","description":"Agents communicate their completion state to the orchestrator via messages (or stdout-captured result), not by writing files to disk. The scheduler does not need to poll the filesystem to detect agent results.","rationale":"File-based communication is fragile — stale files cause bugs, deleted files lose data, and there's no ordering guarantee.","source":"draft-034, draft-171","implemented":false,"tested":false,"test":null,"category":"architecture","section":"actor-model","leaf":"messages-as-audit-trail"}]}]},{"id":"architecture/agents-are-pure-functions","number":"2.2","title":"Agents are pure functions","principle":"An agent receives a task and a worktree. It does its work. It writes a result. It does nothing else. No API calls, no state transitions, no side effects. The orchestrator handles everything mechanical.","description":"This is the architectural decision everything else follows from. An agent's only job is the creative work — writing code, reviewing a diff, analysing a codebase. Everything mechanical (creating PRs, pushing branches, merging, rebasing, transitioning state) happens in the orchestrator as deterministic steps. This eliminates an entire class of bugs where agents silently fail at lifecycle management.","category":"architecture","leaves":[{"id":"architecture/agents-are-pure-functions/input-output-contract","number":"2.2.1","title":"Input → work → result.json, nothing else","description":"Each agent type has a fixed input/output contract. The agent receives a rendered prompt and a worktree. It does work. It writes result.json with an outcome and optional data. It never touches the server.","invariants":[{"id":"agents-write-result-json","number":"2.2.1.1","description":"Every agent writes a result.json file with at minimum an outcome field (done, failure). The scheduler reads this file to determine what happened. This is the only communication channel from agent to orchestrator.","rationale":"A single output file is easy to check, easy to parse, and impossible for the agent to partially complete. Either the file exists with a valid outcome, or it doesn't.","source":"draft-031","implemented":true,"tested":false,"test":null,"category":"architecture","section":"agents-are-pure-functions","leaf":"input-output-contract"},{"id":"agents-never-call-server","number":"2.2.1.2","description":"Agents do not import the SDK, call the server API, move tasks between queues, create PRs, or perform any action that modifies system state. They operate only within their worktree.","rationale":"When agents drove their own lifecycle, the gatekeeper had 102 consecutive failures. Removing server access from agents eliminates the entire class of bugs where agents fail at lifecycle management rather than at their actual job.","source":"draft-031, draft-029","implemented":true,"tested":false,"test":null,"category":"architecture","section":"agents-are-pure-functions","leaf":"input-output-contract"},{"id":"orchestrator-handles-mechanics","number":"2.2.1.3","description":"All mechanical operations (push branch, create PR, rebase, merge, state transitions) are performed by the scheduler after reading the agent's result. The agent's success means \"I did my creative work\" — the scheduler then runs the mechanical pipeline.","rationale":"Mechanical steps are deterministic and testable. Running them in the scheduler means they can be retried, logged, and debugged without re-running the agent.","source":"draft-031","implemented":true,"tested":false,"test":null,"category":"architecture","section":"agents-are-pure-functions","leaf":"input-output-contract"}]}]},{"id":"architecture/complexity-reduction","number":"2.3","title":"Reducing code complexity at every opportunity","principle":"Complexity is the enemy. Delete dead code. Extract large functions. Prefer simple patterns over clever abstractions. If something can be declarative instead of programmatic, make it declarative. If something can be a pure function, make it pure.","description":"The system actively fights complexity. Background analyst agents scan for oversized functions, duplicated code, and unnecessary abstractions. The architecture prefers flat structures over deep hierarchies, pure functions over stateful objects, and YAML config over hardcoded logic. When code grows too complex, it's a signal to split, simplify, or delete.","category":"architecture","leaves":[{"id":"architecture/complexity-reduction/principles","number":"2.3.1","title":"Simplicity principles","description":"Concrete rules that keep complexity in check. These are actively enforced through analyst agents, code review, and architectural decisions.","invariants":[{"id":"delete-dead-code","number":"2.3.1.1","description":"Dead code is deleted, not commented out. If code is unreachable, unused, or from a deprecated system, it is removed. Old systems (proposal utils, hook
