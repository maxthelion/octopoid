<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Spec — Octopoid</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar-w: 280px;
  --sidebar-bg: #1a1d2e;
  --sidebar-hover: #252840;
  --sidebar-active: #2e3354;
  --sidebar-border: #2a2d42;
  --sidebar-text: #c9cdd6;
  --sidebar-muted: #6b7280;
  --sidebar-accent: #818cf8;
  --main-bg: #f9fafb;
  --main-text: #111827;
  --main-muted: #6b7280;
  --main-border: #e5e7eb;
  --badge-enforced-bg: #dcfce7;
  --badge-enforced-text: #166534;
  --badge-aspirational-bg: #fef3c7;
  --badge-aspirational-text: #92400e;
  --inv-bg: #ffffff;
  --inv-border: #e5e7eb;
  --inv-hover: #f0f4ff;
  --highlight-bg: #fef9c3;
  --toolbar-bg: #ffffff;
  --toolbar-border: #e5e7eb;
  --btn-active-bg: #4f46e5;
  --btn-active-text: #ffffff;
  --btn-bg: #f3f4f6;
  --btn-text: #374151;
  --btn-hover: #e5e7eb;
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 14px;
  color: var(--main-text);
  background: var(--main-bg);
}

#app {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── Sidebar ─────────────────────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid var(--sidebar-border);
}

#sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--sidebar-border);
  flex-shrink: 0;
}

#sidebar-header h1 {
  font-size: 15px;
  font-weight: 700;
  color: #e2e8f0;
  letter-spacing: 0.02em;
  margin-bottom: 10px;
}

#sidebar-header .subtitle {
  font-size: 11px;
  color: var(--sidebar-muted);
  margin-bottom: 10px;
}

.stats-pills {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.stats-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 99px;
  font-weight: 600;
}
.stats-pill.enforced { background: #14532d; color: #bbf7d0; }
.stats-pill.aspirational { background: #78350f; color: #fde68a; }
.stats-pill.total { background: #1e3a5f; color: #bfdbfe; }

#tree {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

#tree::-webkit-scrollbar { width: 4px; }
#tree::-webkit-scrollbar-track { background: transparent; }
#tree::-webkit-scrollbar-thumb { background: var(--sidebar-border); border-radius: 2px; }

.tree-section { }

.tree-section-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  cursor: pointer;
  color: var(--sidebar-text);
  font-size: 13px;
  font-weight: 600;
  user-select: none;
  border-radius: 0;
  transition: background 0.1s;
}
.tree-section-header:hover { background: var(--sidebar-hover); }
.tree-section-header.active { background: var(--sidebar-active); color: #fff; }

.tree-toggle {
  display: inline-block;
  width: 14px;
  text-align: center;
  font-size: 9px;
  color: var(--sidebar-muted);
  transition: transform 0.15s;
  flex-shrink: 0;
}
.tree-section.open > .tree-section-header > .tree-toggle {
  transform: rotate(90deg);
}

.tree-section-title { flex: 1; }

.tree-count {
  font-size: 11px;
  color: var(--sidebar-muted);
  font-weight: 400;
  flex-shrink: 0;
}

.tree-leaves {
  display: none;
  padding-left: 8px;
}
.tree-section.open > .tree-leaves { display: block; }

.tree-leaf {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 16px 5px 26px;
  cursor: pointer;
  color: var(--sidebar-muted);
  font-size: 12px;
  transition: background 0.1s, color 0.1s;
  border-radius: 0;
}
.tree-leaf:hover { background: var(--sidebar-hover); color: var(--sidebar-text); }
.tree-leaf.active { background: var(--sidebar-active); color: var(--sidebar-accent); }

/* ── Main panel ──────────────────────────────────────────────────────── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  background: var(--toolbar-bg);
  border-bottom: 1px solid var(--toolbar-border);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.filter-group {
  display: flex;
  gap: 4px;
}

.filter-btn {
  padding: 5px 12px;
  border: 1px solid var(--main-border);
  background: var(--btn-bg);
  color: var(--btn-text);
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
}
.filter-btn:hover { background: var(--btn-hover); }
.filter-btn.active {
  background: var(--btn-active-bg);
  color: var(--btn-active-text);
  border-color: var(--btn-active-bg);
}

#search {
  flex: 1;
  min-width: 160px;
  max-width: 320px;
  padding: 5px 10px;
  border: 1px solid var(--main-border);
  border-radius: 6px;
  font-size: 13px;
  color: var(--main-text);
  outline: none;
  background: #fff;
}
#search:focus { border-color: #818cf8; box-shadow: 0 0 0 2px rgba(129,140,248,0.2); }

.result-count {
  margin-left: auto;
  font-size: 12px;
  color: var(--main-muted);
  white-space: nowrap;
}

#content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

#content::-webkit-scrollbar { width: 6px; }
#content::-webkit-scrollbar-track { background: transparent; }
#content::-webkit-scrollbar-thumb { background: var(--main-border); border-radius: 3px; }

/* ── Section/leaf heading ────────────────────────────────────────────── */
.content-header {
  margin-bottom: 20px;
}

.content-header h2 {
  font-size: 20px;
  font-weight: 700;
  color: var(--main-text);
  margin-bottom: 6px;
}

.content-principle {
  font-size: 14px;
  font-weight: 600;
  color: #4f46e5;
  margin-bottom: 8px;
  font-style: italic;
}

.content-desc {
  font-size: 13px;
  color: var(--main-muted);
  line-height: 1.6;
  max-width: 680px;
}

/* ── Invariant cards ─────────────────────────────────────────────────── */
.invariants-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-width: 820px;
}

.invariant-card {
  background: var(--inv-bg);
  border: 1px solid var(--inv-border);
  border-radius: 8px;
  padding: 14px 16px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.invariant-card:hover {
  border-color: #c7d2fe;
  box-shadow: 0 1px 6px rgba(79,70,229,0.08);
}

.inv-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}

.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.03em;
  text-transform: lowercase;
  flex-shrink: 0;
}
.badge.enforced { background: var(--badge-enforced-bg); color: var(--badge-enforced-text); }
.badge.aspirational { background: var(--badge-aspirational-bg); color: var(--badge-aspirational-text); }

.inv-id {
  font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  font-size: 12px;
  font-weight: 600;
  color: #374151;
}

.breadcrumb {
  font-size: 11px;
  color: var(--main-muted);
  margin-left: auto;
}

.inv-desc {
  font-size: 13px;
  color: var(--main-text);
  line-height: 1.65;
  margin-bottom: 8px;
}

.inv-rationale {
  font-size: 12px;
  color: #4b5563;
  line-height: 1.6;
  padding: 8px 10px;
  background: #f9fafb;
  border-left: 3px solid #e5e7eb;
  border-radius: 0 4px 4px 0;
  margin-bottom: 8px;
}

.inv-meta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  font-size: 11px;
  color: var(--main-muted);
}

.inv-meta a { color: #4f46e5; text-decoration: none; }
.inv-meta a:hover { text-decoration: underline; }

.inv-test {
  font-family: "SFMono-Regular", Consolas, monospace;
  font-size: 10.5px;
  background: #f3f4f6;
  padding: 1px 5px;
  border-radius: 3px;
}

mark {
  background: var(--highlight-bg);
  padding: 0 1px;
  border-radius: 2px;
}

/* ── Empty / welcome state ───────────────────────────────────────────── */
.empty-state {
  padding: 40px 0;
  color: var(--main-muted);
  text-align: center;
  font-size: 13px;
}

.welcome-state {
  padding: 20px 0;
  max-width: 680px;
}

.welcome-state h2 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 8px;
}

.welcome-state p {
  color: var(--main-muted);
  line-height: 1.6;
  margin-bottom: 16px;
  font-size: 13px;
}

.section-overview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
  margin-top: 20px;
}

.section-card {
  background: #fff;
  border: 1px solid var(--main-border);
  border-radius: 8px;
  padding: 14px;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.section-card:hover {
  border-color: #818cf8;
  box-shadow: 0 2px 8px rgba(79,70,229,0.1);
}
.section-card h3 {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 4px;
  color: var(--main-text);
}
.section-card .principle {
  font-size: 12px;
  color: #6366f1;
  font-style: italic;
  margin-bottom: 8px;
  line-height: 1.5;
}
.section-card .section-counts {
  display: flex;
  gap: 6px;
}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>&#9670; System Spec</h1>
      <div class="subtitle">Octopoid behavioural invariants</div>
      <div class="stats-pills" id="stats-pills">
        <!-- filled by JS -->
      </div>
    </div>
    <div id="tree">
      <!-- filled by JS -->
    </div>
  </div>

  <div id="main">
    <div id="toolbar">
      <div class="filter-group">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="enforced">Enforced</button>
        <button class="filter-btn" data-filter="aspirational">Aspirational</button>
      </div>
      <input id="search" type="search" placeholder="Search invariants..." autocomplete="off">
      <span class="result-count" id="result-count"></span>
    </div>
    <div id="content">
      <!-- filled by JS -->
    </div>
  </div>
</div>

<!-- SPEC_DATA_START -->
<script>const SPEC_DATA = {"meta":{"format_version":1,"last_updated":"2026-03-01","description":"Behavioural invariants for the octopoid orchestrator. Each entry describes what the system is supposed to do — not how the code works, but what guarantees it provides. Tests are derived from these invariants. Invariants enter this spec when a draft's invariant has been verified as met in the code. See draft #182 for the lifecycle.
"},"sections":[{"id":"tasks","title":"Tasks","principle":"Tasks are the unit of work","description":"A task is an atomic piece of work with a clear lifecycle. Tasks flow through declarative state machines (flows), are worked on by agents, reviewed by gatekeepers, and either completed or surfaced for human attention. Everything the system does is organised around tasks.","leaves":[{"id":"tasks/flows","title":"Flows and Steps","description":"Declarative flow transitions govern all task state changes. Steps within flows follow a pre_check/execute/verify protocol and are idempotent.","invariants":[{"id":"step-verification","description":"Flow steps are only marked as completed in step_progress.json after verification that the action durably took effect (e.g. branch exists on remote after push, PR exists after create_pr).","rationale":"Without verification, steps can ghost-complete — the function returns without exception but the action didn't happen. This causes tasks to be marked done when their work never landed.","source":"draft-180","status":"aspirational","test":null,"section":"tasks","leaf":"flows"},{"id":"step-idempotency","description":"Flow steps can be safely retried. Each step checks whether its work is already done before executing, and skips if so.","rationale":"When the fixer resumes a failed flow, it re-runs from the failed step. If the step partially succeeded (e.g. branch pushed), the retry must not fail because the work already exists.","source":"draft-180","status":"aspirational","test":null,"section":"tasks","leaf":"flows"},{"id":"step-error-classification","description":"Step failures are classified by exception type — RetryableStepError (transient, retry), StepVerificationError (execute ran but verify failed), PermanentStepError (intervention needed). Routing is determined by exception type, not by message parsing.","rationale":"Without typed exceptions, all step failures hit the same catch-all. Transient errors are treated the same as permanent errors. Typed classification enables correct routing.","source":"draft-180","status":"aspirational","test":null,"section":"tasks","leaf":"flows"},{"id":"flow-sync-preserves-steps","description":"When the scheduler syncs flow definitions to the server, it includes the full transition data (runs, conditions, checks, agent) — not just from/to states. Steps like create_pr are never silently dropped.","rationale":"Stripped transitions cause steps to be skipped silently, leading to ghost completions (tasks in done with no PR), missing PR numbers, and unmerged work. This was the root cause of a multi-hour outage.","source":"postmortem-2026-02-28-ghost-completion","status":"enforced","test":null,"section":"tasks","leaf":"flows"}]},{"id":"tasks/lifecycle","title":"Task Lifecycle","description":"Task states, transitions, and terminal conditions. A task moves through a defined sequence of states driven by the declarative flow system.","invariants":[{"id":"expired-lease-cleared","description":"Tasks with expired leases are detected and their lease state is cleared by the scheduler's housekeeping job within one cycle. A task cannot remain indefinitely blocked by a stale lease_expires_at value.","rationale":"Stale leases block tasks from being reclaimed. If lease recovery misses a task, that task is stuck forever with no agent working on it and no way to reclaim it.","source":"draft-145","status":"aspirational","test":null,"section":"tasks","leaf":"lifecycle"}]},{"id":"tasks/resilience","title":"Task Resilience","description":"How the system handles task failures, intervention, and recovery paths. The system is self-correcting: failures trigger automated intervention before requiring human attention.","invariants":[{"id":"self-correcting-failure","description":"Every task failure goes through intervention before reaching the failed queue. A task only reaches failed after at least one intervention attempt. Direct routing to failed without intervention is a bug.","rationale":"The fixer agent can handle many failures autonomously (retry with more turns, identify missing prerequisites, fix git conflicts, simplify scope). failed should mean \"the system tried to self-correct and couldn't\", not \"the first attempt didn't work\".","source":"draft-181","status":"enforced","test":"tests/test_requires_intervention.py::TestHandleFailOutcomeRouting::test_agent_failure_routes_to_requires_intervention","section":"tasks","leaf":"resilience"},{"id":"fail-task-single-path","description":"All code paths that move a task to the failed queue must go through fail_task(). No code should call sdk.tasks.update(queue='failed') directly except fail_task() itself.","rationale":"fail_task() implements the intervention-first logic. Bypassing it creates paths where tasks skip intervention, violating self-correcting-failure.","source":"draft-181","status":"enforced","test":"tests/test_requires_intervention.py::TestNoDirectFailedCalls","section":"tasks","leaf":"resilience"},{"id":"fixer-agent-handles-failures","description":"When a task has needs_intervention set, the scheduler spawns a fixer agent. The fixer diagnoses the problem, applies a fix, and resumes the task flow from where it failed. Direct human intervention is not the first resort.","rationale":"Most task failures are mundane (git conflicts, stale state, transient errors) and can be resolved automatically. The fixer agent handles these, reserving human attention for genuinely stuck tasks.","source":"draft-170","status":"aspirational","test":null,"section":"tasks","leaf":"resilience"},{"id":"fixer-circuit-breaker","description":"The fixer is limited to a maximum number of attempts per task (currently 3). After exhausting attempts, the task moves to terminal failed and a message is posted to the human inbox. The fixer never loops indefinitely.","rationale":"Without a circuit breaker, a fixer that reports \"fixed\" but whose resume always fails will cycle indefinitely, wasting agent resources. A cap ensures stuck tasks reach human attention in bounded time.","source":"postmortem-2026-02-28-fixer-loop","status":"enforced","test":null,"section":"tasks","leaf":"resilience"},{"id":"requires-intervention-not-terminal","description":"The requires-intervention state is not a graveyard. Tasks in it have an associated fixer agent attempt. Only if the fixer also fails does the task move to failed and need human attention.","rationale":"Without this guarantee, requires-intervention becomes a second failed queue. The point is that intervention is active and time-bounded, not passive accumulation.","source":"draft-170","status":"aspirational","test":null,"section":"tasks","leaf":"resilience"},{"id":"unknown-outcome-routes-to-intervention","description":"When a task's outcome cannot be determined (inference failure, empty stdout, unrecognized response), the task routes to intervention for review — not automatically to failed. An unknown outcome is ambiguous, not an automatic failure.","rationale":"A task with unknown outcome may be perfectly fine (e.g. agent completed work but inference failed). Routing to failed discards potentially completed work. Routing to intervention preserves it for review.","source":"draft-174","status":"aspirational","test":null,"section":"tasks","leaf":"resilience"},{"id":"failure-reason-always-recorded","description":"Every path that moves a task to failed records the reason in execution_notes and appends a FAILED entry to the task log. It is always possible to answer \"why did this task fail?\" without forensic investigation.","rationale":"Without recorded reasons, diagnosing failures requires reading scheduler logs, agent stdout, and git state. A recorded reason makes triage instant.","source":"draft-164","status":"aspirational","test":null,"section":"tasks","leaf":"resilience"},{"id":"failed-task-has-recovery-path","description":"Every task in the failed queue can be moved to an actionable state (e.g. incoming for retry) without bypassing the state machine. There is a defined flow transition or API action that handles recovery.","rationale":"Without a recovery path, tasks in failed require manual hacks to recover. This is fragile, error-prone, and undocumented.","source":"draft-169","status":"aspirational","test":null,"section":"tasks","leaf":"resilience"},{"id":"intervention-no-queue-transition","description":"Requesting intervention for a task never requires a queue transition. The task stays in its current queue. Intervention is a flag plus a message, not a state change.","rationale":"Queue transitions for intervention get blocked by the server's state machine validation. A task can need intervention from any queue. Making intervention a flag avoids whack-a-mole transition additions.","source":"draft-176","status":"aspirational","test":null,"section":"tasks","leaf":"resilience"},{"id":"intervention-context-in-messages","description":"All intervention context (error source, failed step, error message) is communicated via task messages with to_actor=fixer, not via local files. The fixer reads messages, not intervention_context.json.","rationale":"Messages are the existing communication channel. Using a separate file creates a parallel system that must be kept in sync.","source":"draft-176","status":"aspirational","test":null,"section":"tasks","leaf":"resilience"},{"id":"intervention-resolution-via-reply","description":"Intervention is resolved when the fixer posts a reply message (via parent_message_id). The scheduler processes the reply and clears the flag. No separate resolved column or status field.","rationale":"Using message replies for resolution reuses existing infrastructure and creates a clear audit trail. The message thread shows the full intervention lifecycle.","source":"draft-176","status":"aspirational","test":null,"section":"tasks","leaf":"resilience"}]}]},{"id":"git","title":"Git","principle":"Git isolates agent work and delivers it via PRs","description":"Git worktrees give each task an isolated working directory. Agents commit their changes, push to a named branch, and open a PR. The system has strong opinions about git hygiene: detached HEAD in worktrees, never stash, worktree preservation on requeue, and retention policies for failed tasks.","leaves":[{"id":"git/worktrees","title":"Worktrees","description":"Worktrees provide task isolation. Each task gets its own git worktree, always on detached HEAD. Worktrees are preserved across retries.","invariants":[{"id":"worktree-preservation","description":"When a task is requeued after an agent has worked on it, the existing worktree and commits are preserved. The agent resumes from existing work, not from scratch.","rationale":"Destroying completed work wastes agent turns and creates loops where agents redo work that was already done.","source":"draft-175","status":"aspirational","test":null,"section":"git","leaf":"worktrees"},{"id":"worktree-reuse-over-recreate","description":"A fresh worktree is only created when no previous worktree exists for the task. Infrastructure failures, gatekeeper rejection, and manual requeue must all attempt to reuse the existing worktree.","rationale":"Creating a fresh worktree when one already exists destroys completed work. Agents then redo work that was already committed, wasting turns and resources.","source":"draft-175","status":"aspirational","test":null,"section":"git","leaf":"worktrees"},{"id":"failed-worktree-retention","description":"Failed task worktrees are retained for at least 24 hours after the task enters the failed queue, giving humans time to investigate before cleanup. Done task worktrees may be cleaned up after 1 hour.","rationale":"Premature cleanup of failed worktrees destroys evidence needed for debugging. A grace period ensures humans can inspect git state, logs, and partial work before the worktree is swept.","source":"draft-134","status":"aspirational","test":null,"section":"git","leaf":"worktrees"}]}]},{"id":"scheduler","title":"Scheduler","principle":"The scheduler is the only component that spawns agents","description":"The scheduler runs a tick loop, claims tasks from the server, and spawns agents to work on them. It owns all agent lifecycle mechanics — claiming, spawning, lease management, and housekeeping. No other component spawns agents.","leaves":[{"id":"scheduler/claiming","title":"Task Claiming","description":"The scheduler claims tasks from the server atomically. The server is the source of truth for task state. Claims are lease-based.","invariants":[{"id":"claim-limit","description":"The scheduler never claims more tasks than max_claimed allows for any agent blueprint.","rationale":"Overclaiming wastes resources and can cause contention. Each blueprint defines its capacity and the scheduler respects it.","source":"bootstrap","status":"aspirational","test":null,"section":"scheduler","leaf":"claiming"},{"id":"claim-returns-typed-result","description":"tasks.claim() returns an explicit typed result that distinguishes between: task claimed successfully, queue empty, and at-capacity. Callers can determine the specific reason without interpreting None.","rationale":"The current claim() returns None for both \"no tasks\" and \"at capacity\", making it impossible to distinguish. This causes the scheduler to silently stop claiming with no log entry explaining why.","source":"draft-156","status":"aspirational","test":null,"section":"scheduler","leaf":"claiming"}]}]},{"id":"agents","title":"Agents","principle":"Agents are stateless workers spawned by the scheduler","description":"Agents are pure functions: they receive a task, do work, and signal completion via stdout. They have no persistent state. The scheduler owns all agent lifecycle mechanics. Agent roles (implementer, gatekeeper, fixer) are defined by flow configuration, not hardcoded logic.","leaves":[]},{"id":"communication","title":"Communication","principle":"Components communicate through messages, not files","description":"Agents, scheduler, and humans communicate via task messages stored on the server. Result inference uses stdout, not result.json files. Completion announcements carry enough context for follow-up agents to act without re-fetching.","leaves":[{"id":"communication/announcements","title":"Completion Announcements","description":"When tasks complete, the scheduler posts a completion announcement message with enough context for follow-up agents to act without re-fetching.","invariants":[{"id":"completion-announced","description":"Every task that transitions to done has a corresponding task_completed message posted by the scheduler.","rationale":"Without completion announcements, follow-up work relies on a human noticing and running commands manually. Announcements enable automated post-completion workflows.","source":"draft-192","status":"aspirational","test":null,"section":"communication","leaf":"announcements"},{"id":"announcement-has-context","description":"The completion announcement message includes the task ID, title, linked draft ID (if any), and PR number (if any) — enough for follow-up agents to act without re-fetching.","rationale":"Follow-up agents that receive an announcement should not need additional API calls to determine basic task metadata. The announcement should be self-contained.","source":"draft-192","status":"aspirational","test":null,"section":"communication","leaf":"announcements"}]},{"id":"communication/messages","title":"Messages","description":"Task messages are the primary communication channel between agents, scheduler, and humans. They are append-only and auditable.","invariants":[{"id":"agents-communicate-via-messages","description":"Agents communicate their completion state to the orchestrator via messages or stdout, not by writing files to disk. The scheduler does not need to poll the filesystem to detect agent results.","rationale":"File-based result passing (result.json) is fragile — stale files can be misread, there is no acknowledgement, and it couples the scheduler to the agent's filesystem. Messages are timestamped and auditable.","source":"draft-171","status":"aspirational","test":null,"section":"communication","leaf":"messages"}]},{"id":"communication/result-inference","title":"Result Inference","description":"The scheduler infers agent outcomes from stdout rather than requiring structured file output. This works with the natural language outputs of LLM agents.","invariants":[{"id":"results-inferred-from-stdout","description":"The scheduler infers the agent's outcome from its stdout rather than requiring the agent to write a result.json file. Agents that complete work but omit mechanical file-writing are not erroneously failed.","rationale":"LLMs communicate through natural language. Requiring structured file output after a long creative session is fighting what they're good at. The system should interpret natural language output.","source":"draft-172","status":"aspirational","test":null,"section":"communication","leaf":"result-inference"},{"id":"result-inference-uses-cli-auth","description":"The result handler infers outcomes using claude -p subprocess invocation, using the same auth mechanism as spawned agents. It does not require a separate ANTHROPIC_API_KEY environment variable.","rationale":"The scheduler runs via launchd which does not have ANTHROPIC_API_KEY. Using the anthropic Python SDK causes auth failures. The claude CLI uses its own OAuth/session auth which is always available.","source":"draft-174","status":"aspirational","test":null,"section":"communication","leaf":"result-inference"},{"id":"result-json-references-removed","description":"Agent prompts do not instruct agents to write result.json. Agents signal completion via stdout only; the orchestrator infers the outcome from stdout content.","rationale":"Leftover result.json instructions cause confusion — agents may write a file nothing reads, or stale files cause incorrect processing.","source":"draft-174","status":"aspirational","test":null,"section":"communication","leaf":"result-inference"}]}]},{"id":"github","title":"GitHub","principle":"GitHub PRs are the delivery mechanism for completed work","description":"PRs are how agent work lands on main. The system creates PRs automatically, runs CI before gatekeeper review, and merges only after approval. PR metadata is stored on the task for traceability.","leaves":[{"id":"github/ci","title":"CI Pipeline","description":"CI runs before gatekeeper review. CI failures route directly back to the implementer without LLM gatekeeper involvement.","invariants":[{"id":"ci-before-gatekeeper","description":"The gatekeeper never reviews a task whose CI has not passed. CI is a prerequisite for gatekeeper review, not a parallel or post-review check.","rationale":"Running CI after gatekeeper approval wastes gatekeeper turns on code that may not even build. CI failures should bounce back to the implementer directly, without LLM involvement.","source":"draft-185","status":"aspirational","test":null,"section":"github","leaf":"ci"},{"id":"ci-failure-is-programmatic","description":"When CI fails, the task is returned to the implementer without LLM gatekeeper involvement. The failure context (which tests failed, output) is included in the requeued task.","rationale":"CI failures are mechanical — the code doesn't compile or tests fail. The implementer can fix these without gatekeeper review. Involving the gatekeeper wastes an expensive LLM call on a binary signal.","source":"draft-185","status":"aspirational","test":null,"section":"github","leaf":"ci"}]}]},{"id":"observability","title":"Observability","principle":"The system surfaces problems proactively","description":"All scheduler, agent, and hook activity is logged. Background agents produce visible run records. Health scores provide longitudinal signals. Queue health checks detect stuck tasks. The system should be inspectable without deep forensic investigation.","leaves":[{"id":"observability/agent-visibility","title":"Agent Visibility","description":"Background agent runs produce visible log entries. Manual triggers allow immediate forcing of a background agent run.","invariants":[{"id":"background-agent-run-visibility","description":"Every background agent run produces a log entry visible in the dashboard agents tab, including what was processed and the outcome.","rationale":"Background agents are currently opaque — you cannot tell from the dashboard what they did or whether they are silently failing. Visibility enables monitoring and debugging.","source":"draft-183","status":"aspirational","test":null,"section":"observability","leaf":"agent-visibility"},{"id":"manual-trigger-bypasses-guard","description":"A manual trigger command can force a background agent to run immediately, regardless of its interval timer or pending work.","rationale":"During development and debugging, waiting for the next scheduled interval is too slow. A manual trigger enables rapid iteration.","source":"draft-183","status":"aspirational","test":null,"section":"observability","leaf":"agent-visibility"}]},{"id":"observability/health-scores","title":"Health Scores","description":"Background analysts produce numeric health scores for their domain. Scores are logged append-only with justification text for trend analysis.","invariants":[{"id":"analyst-uses-quantitative-tools","description":"The codebase analyst runs code quality measurement tools (pytest-cov, vulture, wily) before proposing drafts. Proposals include quantitative data supporting the recommendation.","rationale":"Without quantitative data, analyst recommendations are subjective and hard to prioritise. Tools provide objective signals that make the case for each recommendation.","source":"draft-178","status":"aspirational","test":null,"section":"observability","leaf":"health-scores"},{"id":"health-score-logged","description":"Every analyst draft includes a numeric health score (1-10) for the analyst's domain.","rationale":"A single numeric score provides a longitudinal signal — is the codebase getting better or worse over time?","source":"draft-191","status":"aspirational","test":null,"section":"observability","leaf":"health-scores"},{"id":"health-log-append-only","description":"Each analyst has a persistent log file that grows monotonically. Entries are never deleted or modified.","rationale":"Append-only ensures the historical trend is preserved. If entries could be modified, the trend becomes unreliable.","source":"draft-191","status":"aspirational","test":null,"section":"observability","leaf":"health-scores"},{"id":"score-has-justification","description":"Every health score entry includes a brief text summary explaining the rating.","rationale":"A bare number without context is useless. The justification explains what changed since the last score and why the rating went up or down.","source":"draft-191","status":"aspirational","test":null,"section":"observability","leaf":"health-scores"}]},{"id":"observability/logging","title":"Logging","description":"All activity is written to a unified log file. Diagnosing any issue requires checking only one place.","invariants":[{"id":"unified-log-file","description":"All scheduler, agent, and hook activity is written to a single log file at .octopoid/runtime/logs/octopoid.log. Diagnosing any issue requires checking only one file.","rationale":"Scattered log files make diagnosis slow. A single log file with structured entries enables grep-based investigation without knowing which component logged what where.","source":"draft-168","status":"aspirational","test":null,"section":"observability","leaf":"logging"}]}]},{"id":"configuration","title":"Configuration","principle":"Configuration is declarative and lives in .octopoid/","description":"All component configuration derives from a single source of truth. Agent definitions, flow definitions, and system config live in .octopoid/ and are never duplicated across files.","leaves":[{"id":"configuration/single-source","title":"Single Source of Truth","description":"Agent configuration exists in exactly one place. No config is duplicated across files.","invariants":[{"id":"single-agent-config","description":"An agent's configuration exists in exactly one place. All tools, dashboards, and scheduler logic that need agent information read from that single source.","rationale":"Agent config currently exists in multiple places (per-agent dirs, agents.yaml, jobs.yaml). Duplicated config leads to contradictions and makes it impossible to know which source is authoritative.","source":"draft-184","status":"aspirational","test":null,"section":"configuration","leaf":"single-source"}]}]},{"id":"drafts","title":"Drafts","principle":"Drafts are the starting point for change","description":"A draft captures an idea or proposed change. Drafts become tasks, tasks become PRs, and PRs land on main. Drafts that propose behavioural changes must include invariants. Those invariants are verified before the draft is archived.","leaves":[{"id":"drafts/invariants","title":"Draft Invariants","description":"How invariants move from drafts into the system spec and how their satisfaction is verified.","invariants":[{"id":"system-spec-exists","description":"A project-management/system-spec/ directory exists and documents the system's behavioural invariants in a hierarchical tree. Agents read this spec before making changes, so they know what guarantees to preserve.","rationale":"Without a centralised store, invariants live scattered across drafts. When a draft is archived, its invariants are archived with it. No agent can answer \"what does this system guarantee?\"","source":"draft-181","status":"enforced","test":null,"section":"drafts","leaf":"invariants"},{"id":"drafts-have-invariants","description":"Every draft that proposes a change to system behaviour has an Invariants section stating what should be true after the work is complete. If a draft has no invariants, that is surfaced for discussion rather than silently skipped.","rationale":"Without explicit invariants, intent evaporates during the draft-to-task translation. The implementer follows mechanical acceptance criteria and the broader intent is lost.","source":"draft-182","status":"aspirational","test":null,"section":"drafts","leaf":"invariants"},{"id":"process-draft-checks-invariants","description":"A draft cannot be archived until its invariants are verified as met in the code and added to the system spec. process-draft checks invariant satisfaction, not just task completion.","rationale":"Without this check, drafts get archived when their tasks are done, even if the invariant they described isn't actually met. The accountability loop is broken.","source":"draft-182","status":"aspirational","test":null,"section":"drafts","leaf":"invariants"}]}]}]};</script>
<!-- SPEC_DATA_END -->

<script>
(function () {
  "use strict";

  // ── State ────────────────────────────────────────────────────────────
  let currentFilter = "all";
  let currentSearch = "";
  let selectedSection = null; // section id or null
  let selectedLeaf = null;    // leaf id or null

  // ── Data helpers ─────────────────────────────────────────────────────
  function allInvariants() {
    return SPEC_DATA.sections.flatMap(s => s.leaves.flatMap(l => l.invariants));
  }

  function findSection(id) {
    return SPEC_DATA.sections.find(s => s.id === id);
  }

  function findLeaf(id) {
    for (const s of SPEC_DATA.sections) {
      const l = s.leaves.find(l => l.id === id);
      if (l) return { section: s, leaf: l };
    }
    return null;
  }

  function getContextInvariants() {
    if (selectedLeaf) {
      const found = findLeaf(selectedLeaf);
      return found ? found.leaf.invariants : [];
    }
    if (selectedSection) {
      const s = findSection(selectedSection);
      return s ? s.leaves.flatMap(l => l.invariants) : [];
    }
    return allInvariants();
  }

  function applyFilters(invariants) {
    let result = invariants;
    if (currentFilter !== "all") {
      result = result.filter(i => i.status === currentFilter);
    }
    if (currentSearch.trim()) {
      const q = currentSearch.toLowerCase();
      result = result.filter(i =>
        i.description.toLowerCase().includes(q) ||
        i.id.toLowerCase().includes(q) ||
        (i.rationale && i.rationale.toLowerCase().includes(q)) ||
        (i.source && i.source.toLowerCase().includes(q))
      );
    }
    return result;
  }

  // ── Stats ────────────────────────────────────────────────────────────
  function renderStats() {
    const all = allInvariants();
    const enforced = all.filter(i => i.status === "enforced").length;
    const aspirational = all.filter(i => i.status === "aspirational").length;
    const pills = document.getElementById("stats-pills");
    pills.innerHTML =
      `<span class="stats-pill enforced">${enforced} enforced</span>` +
      `<span class="stats-pill aspirational">${aspirational} aspirational</span>` +
      `<span class="stats-pill total">${all.length} total</span>`;
  }

  // ── Tree sidebar ─────────────────────────────────────────────────────
  function renderTree() {
    const tree = document.getElementById("tree");
    tree.innerHTML = SPEC_DATA.sections.map(section => {
      const total = section.leaves.reduce((n, l) => n + l.invariants.length, 0);
      const leaves = section.leaves.map(leaf => {
        const count = leaf.invariants.length;
        return `<div class="tree-leaf" data-leaf="${leaf.id}" title="${esc(leaf.title)}">
          <span style="flex:1">${esc(leaf.title)}</span>
          <span class="tree-count">${count}</span>
        </div>`;
      }).join("");

      return `<div class="tree-section" data-section="${section.id}">
        <div class="tree-section-header">
          <span class="tree-toggle">&#9654;</span>
          <span class="tree-section-title">${esc(section.title)}</span>
          <span class="tree-count">${total}</span>
        </div>
        <div class="tree-leaves">${leaves}</div>
      </div>`;
    }).join("");

    // Section header clicks: toggle + select section
    tree.querySelectorAll(".tree-section-header").forEach(el => {
      el.addEventListener("click", () => {
        const sectionEl = el.closest(".tree-section");
        const sectionId = sectionEl.dataset.section;
        // Toggle open/close
        sectionEl.classList.toggle("open");
        selectSection(sectionId, el);
      });
    });

    // Leaf clicks
    tree.querySelectorAll(".tree-leaf").forEach(el => {
      el.addEventListener("click", e => {
        e.stopPropagation();
        selectLeaf(el.dataset.leaf);
      });
    });
  }

  function selectSection(sectionId, headerEl) {
    selectedSection = sectionId;
    selectedLeaf = null;
    // Update active states
    document.querySelectorAll(".tree-section-header").forEach(h => h.classList.remove("active"));
    document.querySelectorAll(".tree-leaf").forEach(l => l.classList.remove("active"));
    if (headerEl) headerEl.classList.add("active");
    else {
      const h = document.querySelector(`[data-section="${sectionId}"] .tree-section-header`);
      if (h) h.classList.add("active");
    }
    renderContent();
  }

  function selectLeaf(leafId) {
    selectedLeaf = leafId;
    // Determine section for tree highlighting
    const found = findLeaf(leafId);
    selectedSection = found ? found.section.id : null;
    // Update active states
    document.querySelectorAll(".tree-section-header").forEach(h => h.classList.remove("active"));
    document.querySelectorAll(".tree-leaf").forEach(l => {
      l.classList.toggle("active", l.dataset.leaf === leafId);
    });
    // Ensure section is open
    if (found) {
      const sectionEl = document.querySelector(`[data-section="${found.section.id}"]`);
      if (sectionEl) sectionEl.classList.add("open");
    }
    renderContent();
  }

  // ── Content area ─────────────────────────────────────────────────────
  function renderContent() {
    const content = document.getElementById("content");
    const contextInvs = getContextInvariants();
    const filtered = applyFilters(contextInvs);

    // Update result count
    const showingSearch = currentSearch.trim() || currentFilter !== "all";
    const rc = document.getElementById("result-count");
    if (showingSearch) {
      rc.textContent = `${filtered.length} of ${contextInvs.length} shown`;
    } else {
      rc.textContent = `${filtered.length} invariant${filtered.length !== 1 ? "s" : ""}`;
    }

    // Build header
    let headerHTML = "";
    if (selectedLeaf) {
      const found = findLeaf(selectedLeaf);
      if (found) {
        const { section, leaf } = found;
        headerHTML = `<div class="content-header">
          <div style="font-size:12px;color:var(--main-muted);margin-bottom:4px">${esc(section.title)}</div>
          <h2>${esc(leaf.title)}</h2>
          ${leaf.description ? `<p class="content-desc">${esc(leaf.description)}</p>` : ""}
        </div>`;
      }
    } else if (selectedSection) {
      const section = findSection(selectedSection);
      if (section) {
        headerHTML = `<div class="content-header">
          <h2>${esc(section.title)}</h2>
          ${section.principle ? `<div class="content-principle">&ldquo;${esc(section.principle)}&rdquo;</div>` : ""}
          ${section.description ? `<p class="content-desc">${esc(section.description)}</p>` : ""}
        </div>`;
      }
    } else {
      // Welcome / overview
      const totalInvs = allInvariants().length;
      const enforced = allInvariants().filter(i => i.status === "enforced").length;
      headerHTML = `<div class="welcome-state">
        <h2>System Spec</h2>
        <p>Behavioural invariants for the Octopoid orchestrator. Select a section in the sidebar
        to explore, or browse all ${totalInvs} invariants (${enforced} enforced) below.</p>
      </div>`;
    }

    // Build invariant list
    let listHTML = "";
    if (filtered.length === 0) {
      listHTML = `<div class="empty-state">No invariants match the current filter.</div>`;
    } else {
      const q = currentSearch.toLowerCase().trim();
      listHTML = `<div class="invariants-list">` +
        filtered.map(inv => renderInvariantCard(inv, q, !!selectedLeaf)).join("") +
        `</div>`;
    }

    content.innerHTML = headerHTML + listHTML;
  }

  function renderInvariantCard(inv, highlightQuery, isLeafView) {
    const statusClass = inv.status === "enforced" ? "enforced" : "aspirational";
    const descHTML = highlightQuery
      ? highlight(esc(inv.description), highlightQuery)
      : esc(inv.description);
    const ratHTML = inv.rationale
      ? (highlightQuery ? highlight(esc(inv.rationale), highlightQuery) : esc(inv.rationale))
      : "";

    const breadcrumb = !isLeafView
      ? `<span class="breadcrumb">${esc(inv.section)} / ${esc(inv.leaf)}</span>`
      : "";

    const testBadge = inv.test
      ? `<span class="inv-test" title="${esc(inv.test)}">${esc(shortTest(inv.test))}</span>`
      : `<span style="color:var(--main-muted)">no test</span>`;

    return `<div class="invariant-card" data-status="${statusClass}">
      <div class="inv-header">
        <span class="badge ${statusClass}">${statusClass}</span>
        <span class="inv-id">${esc(inv.id)}</span>
        ${breadcrumb}
      </div>
      <p class="inv-desc">${descHTML}</p>
      ${ratHTML ? `<div class="inv-rationale">${ratHTML}</div>` : ""}
      <div class="inv-meta">
        <span>Source: <strong>${esc(inv.source)}</strong></span>
        <span>Test: ${testBadge}</span>
      </div>
    </div>`;
  }

  // ── Section overview grid ─────────────────────────────────────────────
  function renderOverview() {
    const content = document.getElementById("content");
    const totalInvs = allInvariants().length;
    const enforced = allInvariants().filter(i => i.status === "enforced").length;

    const cards = SPEC_DATA.sections.map(s => {
      const sTotal = s.leaves.reduce((n, l) => n + l.invariants.length, 0);
      const sEnforced = s.leaves.reduce((n, l) =>
        n + l.invariants.filter(i => i.status === "enforced").length, 0);
      return `<div class="section-card" data-action="select-section" data-section="${s.id}">
        <h3>${esc(s.title)}</h3>
        ${s.principle ? `<div class="principle">&ldquo;${esc(s.principle)}&rdquo;</div>` : ""}
        <div class="section-counts">
          <span class="stats-pill enforced">${sEnforced} enf</span>
          <span class="stats-pill aspirational">${sTotal - sEnforced} asp</span>
        </div>
      </div>`;
    }).join("");

    content.innerHTML = `<div class="welcome-state">
      <h2>System Spec</h2>
      <p>Behavioural invariants for the Octopoid orchestrator. ${totalInvs} invariants across
      ${SPEC_DATA.sections.length} sections (${enforced} enforced, ${totalInvs - enforced} aspirational).
      Select a section from the sidebar or click a card below.</p>
    </div>
    <div class="section-overview-grid">${cards}</div>`;

    document.getElementById("result-count").textContent =
      `${totalInvs} invariants`;

    content.querySelectorAll("[data-action=select-section]").forEach(el => {
      el.addEventListener("click", () => {
        const sectionEl = document.querySelector(`[data-section="${el.dataset.section}"]`);
        if (sectionEl) sectionEl.classList.add("open");
        selectSection(el.dataset.section, null);
      });
    });
  }

  // ── Utilities ─────────────────────────────────────────────────────────
  function esc(str) {
    if (!str) return "";
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function highlight(html, query) {
    if (!query) return html;
    // Escape query for regex use
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    return html.replace(new RegExp(`(${escaped})`, "gi"), "<mark>$1</mark>");
  }

  function shortTest(test) {
    if (!test) return "";
    // Show just the filename::TestName part
    const parts = test.split("/");
    return parts[parts.length - 1];
  }

  // ── Event wiring ──────────────────────────────────────────────────────
  function init() {
    if (!SPEC_DATA || !SPEC_DATA.sections) {
      document.getElementById("content").innerHTML =
        `<div class="empty-state">No spec data loaded. Run <code>python build.py</code> to generate.</div>`;
      return;
    }

    renderStats();
    renderTree();

    // Filter buttons
    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentFilter = btn.dataset.filter;
        if (selectedSection || selectedLeaf) renderContent();
        else renderOverviewOrContent();
      });
    });

    // Search
    let searchTimer;
    document.getElementById("search").addEventListener("input", e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        currentSearch = e.target.value;
        if (currentSearch.trim()) {
          // When searching, show all matching invariants regardless of selection
          selectedSection = null;
          selectedLeaf = null;
          document.querySelectorAll(".tree-section-header").forEach(h => h.classList.remove("active"));
          document.querySelectorAll(".tree-leaf").forEach(l => l.classList.remove("active"));
        }
        if (selectedSection || selectedLeaf) renderContent();
        else renderOverviewOrContent();
      }, 150);
    });

    renderOverview();
  }

  function renderOverviewOrContent() {
    if (currentSearch.trim() || currentFilter !== "all") {
      // Show filtered global view
      renderContent();
    } else {
      renderOverview();
    }
  }

  document.addEventListener("DOMContentLoaded", init);
})();
</script>
