 manager, file-based queue) are deleted entirely, not left as fallbacks.","rationale":"Dead code misleads readers and agents. The proposer/curator system (964 lines) persisted long after it was replaced by drafts. It confused agents into trying to use it.","source":"draft-016, draft-036","implemented":true,"tested":false,"test":null,"category":"architecture","section":"complexity-reduction","leaf":"principles"},{"id":"no-premature-abstraction","number":"2.3.1.2","description":"Abstractions are introduced only when they simplify existing code, not to accommodate hypothetical future use. Three similar lines of code are better than a premature utility function.","rationale":"Premature abstractions add indirection that makes the system harder to understand. The system should be readable by agents, which means preferring obvious code over clever code.","source":"draft-089, CLAUDE.md","implemented":true,"tested":false,"test":null,"category":"architecture","section":"complexity-reduction","leaf":"principles"},{"id":"single-path-for-each-concern","number":"2.3.1.3","description":"Each concern (task transitions, agent communication, PR management) has exactly one code path. There are no parallel systems, no fallbacks to a different mechanism, no \"old way\" that still works alongside the \"new way.\"","rationale":"Dual paths cause bugs where one path is maintained and the other silently rots. The hook manager running alongside flows was the canonical example.","source":"draft-041, draft-036","implemented":true,"tested":false,"test":null,"category":"architecture","section":"complexity-reduction","leaf":"principles"}]}]},{"id":"architecture/components-and-boundaries","number":"2.4","title":"Four components with clear boundaries","principle":"The system has four components: server, scheduler, agents, and dashboard. Each has a clear responsibility and communicates with others through defined interfaces. No component reaches into another's internals.","description":"Server (Cloudflare Workers + D1): source of truth. Atomic claims, lease-based locking, state machine validation. Scheduler (Python daemon): single supervisor. Reads results, drives transitions, spawns agents, runs housekeeping. Agents (Claude Code processes): stateless pure functions. Receive task, do work, write result. Dashboard (Textual TUI): real-time monitoring and lightweight actions. Polls server, displays state, sends messages.","category":"architecture","leaves":[{"id":"architecture/components-and-boundaries/server-owns-state","number":"2.4.1","title":"The server owns all state","description":"The server is the single source of truth for tasks, projects, drafts, messages, and orchestrator registrations. No other component persists state authoritatively. The scheduler reads from the server on every tick and writes back through the API.","invariants":[{"id":"server-is-source-of-truth","number":"2.4.1.1","description":"All durable state (task queues, project membership, draft status, agent registrations) lives in the server's D1 database. The scheduler does not maintain its own copy of task state between ticks. The server's response is always authoritative.","rationale":"Multiple schedulers on different machines need a consistent view. The server provides it. Local state caches diverge.","source":"draft-059","implemented":true,"tested":false,"test":null,"category":"architecture","section":"components-and-boundaries","leaf":"server-owns-state"},{"id":"server-enforces-state-machine","number":"2.4.1.2","description":"The server validates state transitions. A task cannot move from incoming to done without going through the intermediate states. The server rejects invalid transitions.","rationale":"Without server-side validation, a buggy scheduler could corrupt task state by skipping transitions.","source":"draft-059","implemented":true,"tested":false,"test":null,"category":"architecture","section":"components-and-boundaries","leaf":"server-owns-state"},{"id":"lease-based-locking","number":"2.4.1.3","description":"Task claims use leases with expiry times. If a scheduler crashes or an agent hangs, the lease expires and the task becomes available again. The server's cron trigger monitors lease expiry.","rationale":"Without lease expiry, crashed agents leave tasks permanently stuck in claimed with no recovery path.","source":"draft-059","implemented":true,"tested":false,"test":null,"category":"architecture","section":"components-and-boundaries","leaf":"server-owns-state"}]}]},{"id":"architecture/declarative-everything","number":"2.5","title":"Declarative configuration over hardcoded logic","principle":"Behaviour is defined in YAML, not buried in code. Flows, jobs, agent definitions, and conditions are all declared, not programmed. Adding a new flow transition or a new background job means adding a YAML entry, not modifying a 2000-line Python file.","description":"The system has three declarative registries: flows (task lifecycle state machines), jobs (periodic housekeeping), and agents (who does the work). Each follows the same pattern: YAML declares intent, a registry maps names to callables, and a dispatcher executes them. This makes the system's behaviour visible and auditable in config files rather than scattered across code.","category":"architecture","leaves":[{"id":"architecture/declarative-everything/three-registries","number":"2.5.1","title":"Three declarative registries — flows, jobs, agents","description":"The system's behaviour is defined in three YAML registries that share the same pattern: declare in config, register a callable, dispatch generically.","invariants":[{"id":"flows-are-yaml","number":"2.5.1.1","description":"Task lifecycle transitions are defined in flow YAML files under .octopoid/flows/. Each flow declares states, transitions, conditions, and steps. The flow engine reads these at runtime. No lifecycle logic is hardcoded.","rationale":"A YAML file can be read, audited, and modified by anyone (including agents). Hardcoded transitions require code changes and can't be inspected without reading Python.","source":"draft-010, draft-020","implemented":true,"tested":false,"test":null,"category":"architecture","section":"declarative-everything","leaf":"three-registries"},{"id":"jobs-are-yaml","number":"2.5.1.2","description":"Periodic housekeeping jobs are defined in .octopoid/jobs.yaml with interval, type, and run target. Adding a new job is a config change. The generic run_due_jobs() loop dispatches them.","rationale":"Hardcoded job blocks in the scheduler required touching 4 places to add a single new job.","source":"draft-060, draft-061","implemented":true,"tested":false,"test":null,"category":"architecture","section":"declarative-everything","leaf":"three-registries"},{"id":"agents-are-yaml","number":"2.5.1.3","description":"Agent definitions live in agent directories under .octopoid/agents/ with an agent.yaml file declaring the agent's role, pool, interval, and scripts. The scheduler discovers agents from these directories.","rationale":"Agent config in a single discoverable place means the scheduler doesn't need hardcoded knowledge of which agents exist.","source":"draft-184","implemented":true,"tested":false,"test":null,"category":"architecture","section":"declarative-everything","leaf":"three-registries"}]}]},{"id":"architecture/git-strategy","number":"2.6","title":"Worktrees for isolation, late rebase for safety","principle":"Every agent works in its own git worktree. Worktrees stay on detached HEAD. Named branches are created only at push time. Rebasing happens late — just before merge — to minimise conflict windows.","description":"Git is how agents deliver work. Each task gets a worktree at .octopoid/runtime/tasks/<id>/worktree/. The worktree is created on detached HEAD from the base branch. The agent makes commits. When the scheduler runs the push_branch step, it creates a named branch and pushes. Rebasing onto the latest base happens in the merge step, not during agent work.","category":"architecture","leaves":[{"id":"architecture/git-strategy/worktree-isolation","number":"2.6.1","title":"Worktrees isolate agents from each other","description":"Every task gets its own worktree. Agents cannot see or interfere with each other's work. The worktree is the agent's sandbox.","invariants":[{"id":"one-worktree-per-task","number":"2.6.1.1","description":"Each task gets its own git worktree at .octopoid/runtime/tasks/<id>/worktree/. The agent operates exclusively within this worktree. No two agents share a worktree.","rationale":"Shared working directories cause agents to overwrite each other's changes. Worktrees provide filesystem-level isolation.","source":"draft-059","implemented":true,"tested":false,"test":null,"category":"architecture","section":"git-strategy","leaf":"worktree-isolation"},{"id":"detached-head-always","number":"2.6.1.2","description":"Worktrees are always on detached HEAD. Named branches are created only when the scheduler runs push_branch. Agents never call git checkout <branch> in a worktree.","rationale":"Git refuses to checkout a branch that's already checked out in another worktree. Detached HEAD avoids this entirely.","source":"draft-059, CLAUDE.md","implemented":true,"tested":false,"test":null,"category":"architecture","section":"git-strategy","leaf":"worktree-isolation"},{"id":"late-rebase","number":"2.6.1.3","description":"Rebasing onto the latest base branch happens just before merge, not during agent work. This minimises the window where conflicts can occur and means agents don't need to deal with rebase conflicts.","rationale":"Early rebasing means the agent spends time resolving conflicts instead of doing its actual work. Late rebasing means the mechanical merge step handles it, and if it fails, the task goes back for the fixer agent.","source":"draft-093","implemented":true,"tested":false,"test":null,"category":"architecture","section":"git-strategy","leaf":"worktree-isolation"},{"id":"preserve-worktrees-on-requeue","number":"2.6.1.4","description":"When a task is requeued (sent back to incoming), its worktree is preserved. The next agent picks up where the previous one left off rather than starting from scratch.","rationale":"Destroying a worktree on requeue means losing completed work. Many requeues are due to post-processing failures, not bad agent work.","source":"draft-175","implemented":true,"tested":false,"test":null,"category":"architecture","section":"git-strategy","leaf":"worktree-isolation"}]}]}]},{"id":"testing","number":"3","title":"Testing","sections":[{"id":"testing/infrastructure","number":"3.1","title":"Test infrastructure — local server, fixtures, isolation","principle":"The test infrastructure makes it easy to write real integration tests. A local server starts with one script. Fixtures handle scope isolation. The barrier to writing a test against the real server is as low as writing a mocked unit test.","description":"Test server on port 9787, started by start-test-server.sh with automatic migrations. scoped_sdk fixture for per-test isolation. mock-agent.sh for replacing Claude processes. fake gh for GitHub API calls. The infrastructure is designed so that \"just mock it\" is never the path of least resistance.","category":"testing","leaves":[{"id":"testing/infrastructure/test-server-and-fixtures","number":"3.1.1","title":"Test server and fixtures","description":"The pieces that make integration testing practical.","invariants":[{"id":"test-server-is-real-server","number":"3.1.1.1","description":"The test server is the same Cloudflare Workers server running locally via wrangler, with a separate D1 database. It runs all the same code, migrations, and validation as production. Tests against it are testing real behaviour.","rationale":"A fake server that approximates the API hides bugs in the API itself. The test server IS the server.","source":"draft-032","implemented":true,"tested":false,"test":null,"category":"testing","section":"infrastructure","leaf":"test-server-and-fixtures"},{"id":"one-script-startup","number":"3.1.1.2","description":"The test server starts with a single script (tests/integration/bin/start-test-server.sh) that handles migrations and configuration. No manual setup steps.","rationale":"If starting the test server requires 5 manual steps, people write mocked unit tests instead.","source":"draft-054","implemented":true,"tested":false,"test":null,"category":"testing","section":"infrastructure","leaf":"test-server-and-fixtures"}]}]},{"id":"testing/outside-in-philosophy","number":"3.2","title":"Outside-in — real server preferred over mocks","principle":"Test the real thing. Prefer end-to-end tests with a real local server over mocked unit tests. Only mock what you absolutely must (the LLM, GitHub API). Everything else — scheduler, flow engine, steps, SDK, server — runs for real.","description":"The testing philosophy is outside-in: the highest-value tests are the ones that exercise real code paths against a real server. Mocks hide bugs by replacing the thing you're trying to test. The system uses a local test server (port 9787) with scoped isolation so each test gets a clean slate without touching production.","category":"testing","leaves":[{"id":"testing/outside-in-philosophy/test-pyramid","number":"3.2.1","title":"The test pyramid favours integration over unit tests","description":"The priority order is: end-to-end (scheduler + real server + real SDK), then integration (real server, mocked spawn), then unit (mocked dependencies, only for pure logic).","invariants":[{"id":"integration-tests-use-local-server","number":"3.2.1.1","description":"Integration tests always run against the local test server (port 9787), never against production. The conftest.py fixture enforces this — tests that would hit production fail fast.","rationale":"Tests against production corrupt real data and are non-deterministic. A local server gives full control.","source":"draft-002, draft-028","implemented":true,"tested":false,"test":null,"category":"testing","section":"outside-in-philosophy","leaf":"test-pyramid"},{"id":"mock-agents-not-infrastructure","number":"3.2.1.2","description":"Tests mock the LLM agent (using mock-agent.sh) and the GitHub API (using fake gh). Everything else — scheduler, flow engine, steps, SDK, server — runs for real. This catches integration bugs that unit tests with mocked SDKs miss.","rationale":"A unit test that mocks get_sdk() doesn't test whether the scheduler actually talks to the server correctly. The mock hides the exact bug you need to catch.","source":"draft-028, draft-054","implemented":true,"tested":false,"test":null,"category":"testing","section":"outside-in-philosophy","leaf":"test-pyramid"},{"id":"scoped-sdk-for-isolation","number":"3.2.1.3","description":"Each test gets a scoped_sdk fixture that creates an isolated scope on the test server. Tests cannot see or interfere with each other's data. Cleanup happens automatically.","rationale":"Shared test state causes flaky tests. Scoped isolation means tests run in parallel without conflicts.","source":"draft-032","implemented":true,"tested":false,"test":null,"category":"testing","section":"outside-in-philosophy","leaf":"test-pyramid"}]}]},{"id":"testing/spec-drives-tests","number":"3.3","title":"The spec drives the test backlog","principle":"Invariants in the spec define what should be tested. The gap between spec and tests IS the work to do. Tests don't exist in isolation — they verify specific invariants.","description":"Each invariant in the spec has a status: enforced (has a passing test) or aspirational (no test). The coverage audit walks the spec and checks which invariants are verified. The gap — aspirational invariants that are testable — becomes the test-writing backlog. This is how the spec, tests, and tasks connect: spec defines expectations, tests verify them, gaps become tasks.","category":"testing","leaves":[{"id":"testing/spec-drives-tests/coverage-mapping","number":"3.3.1","title":"Every invariant maps to a test status","description":"The spec is the source of truth about what the system should do. The test suite is the verification that it actually does it. The mapping between them is explicit.","invariants":[{"id":"invariant-has-status","number":"3.3.1.1","description":"Every invariant in the spec has a status field set to either enforced (verified by a passing test) or aspirational (not yet tested). There is no ambiguity about which invariants are covered.","rationale":"Without status tracking, you don't know which parts of the system are verified and which are just hopes.","source":"draft-204","implemented":false,"tested":false,"test":null,"category":"testing","section":"spec-drives-tests","leaf":"coverage-mapping"},{"id":"enforced-has-test","number":"3.3.1.2","description":"Every invariant with status:enforced has a non-null test field pointing to a passing test. The status is not set optimistically — it means a specific test exists and passes.","rationale":"Marking an invariant as enforced without a test is lying. The test field creates accountability.","source":"draft-204","implemented":false,"tested":false,"test":null,"category":"testing","section":"spec-drives-tests","leaf":"coverage-mapping"},{"id":"coverage-gaps-become-tasks","number":"3.3.1.3","description":"The coverage audit identifies aspirational invariants that are testable. These gaps become tasks for the test-writing backlog. The analyst agents can also identify gaps and propose tests as drafts.","rationale":"Without a systematic way to find untested invariants, test coverage grows haphazardly rather than toward full spec coverage.","source":"draft-204, draft-087","implemented":false,"tested":false,"test":null,"category":"testing","section":"spec-drives-tests","leaf":"coverage-mapping"}]}]}]},{"id":"observability","number":"4","title":"Observability","sections":[{"id":"observability/human-as-last-resort","number":"4.1","title":"Human intervention is the last resort, not the first","principle":"Problems are triaged by severity automatically. Only genuinely stuck tasks reach the human. The human spends time on decisions, not babysitting.","description":"The system escalates through levels: automatic retry → fixer agent → ops agent → human. Each level handles a broader class of problems. By the time something reaches the human inbox, it comes with full context (diagnosis, what was tried, why it failed) so the human can make a decision quickly rather than investigating from scratch.","category":"observability","leaves":[{"id":"observability/human-as-last-resort/escalation-levels","number":"4.1.1","title":"Escalation levels — retry, fixer, ops, human","description":"Problems move through escalation levels. Each level handles a broader class of issues. The human only sees what genuinely needs a human decision.","invariants":[{"id":"escalation-chain-exists","number":"4.1.1.1","description":"Task failures follow an escalation chain: automatic retry (for transient errors), fixer agent (for diagnosable failures), ops agent (for systemic issues), human (for genuinely stuck tasks requiring judgement). Each level can resolve the issue or escalate to the next.","rationale":"Without escalation levels, every failure reaches the human immediately. Most can be handled automatically.","source":"draft-170, draft-205","implemented":false,"tested":false,"test":null,"category":"observability","section":"human-as-last-resort","leaf":"escalation-levels"},{"id":"escalations-carry-context","number":"4.1.1.2","description":"When a problem escalates to the human, it arrives with the full diagnosis: what error occurred, what step failed, what the fixer tried, why it couldn't be resolved. The human makes a decision, not an investigation.","rationale":"A notification that says \"task failed\" is useless. A notification that says \"task failed at merge_pr because of conflict in scheduler.py, fixer attempted rebase but the conflict is semantic not textual\" is actionable.","source":"draft-053, draft-170","implemented":false,"tested":false,"test":null,"category":"observability","section":"human-as-last-resort","leaf":"escalation-levels"}]}]},{"id":"observability/operational-history","number":"4.2","title":"Operational history is preserved","principle":"The system remembers what happened. Unified logs, issues recorded, postmortems written. The same problem is never investigated from scratch twice.","description":"Every error, every fix, every escalation is recorded. The issues log captures symptoms and fixes so the next person (or agent) who sees the same symptom finds the answer immediately. Postmortems are written for significant incidents. The fixer agent writes to the issues log as part of its fix workflow.","category":"observability","leaves":[{"id":"observability/operational-history/institutional-memory","number":"4.2.1","title":"Issues log and postmortems build institutional memory","description":"The system accumulates knowledge about what goes wrong and how to fix it. This knowledge is accessible to both humans and agents.","invariants":[{"id":"issues-log-captures-fixes","number":"4.2.1.1","description":"The issues log (project-management/issues-log.md) records symptoms, root causes, and fixes for recurring problems. When investigating a new problem, the issues log is checked first.","rationale":"Without an issues log, the same problem gets investigated from scratch every time. The fix for \"tasks stuck in claimed with no-pid\" should be findable in seconds, not require 30 minutes of log archaeology.","source":"CLAUDE.md, draft-170","implemented":true,"tested":false,"test":null,"category":"observability","section":"operational-history","leaf":"institutional-memory"},{"id":"postmortems-for-significant-incidents","number":"4.2.1.2","description":"Non-trivial incidents (data loss, stuck tasks, multi-hour outages) get postmortems in project-management/postmortems/. The postmortem records timeline, root cause, fix, and prevention measures.","rationale":"Postmortems prevent the same incident from recurring. They also surface systemic issues that individual bug fixes don't address.","source":"CLAUDE.md","implemented":true,"tested":false,"test":null,"category":"observability","section":"operational-history","leaf":"institutional-memory"},{"id":"unified-activity-log","number":"4.2.1.3","description":"All system activity (scheduler ticks, agent spawns, task transitions, job executions) is logged to a unified log file. The log is the forensic record for debugging and postmortems.","rationale":"Scattered logging across scheduler stderr, agent stdout, and server logs makes it impossible to reconstruct what happened. A single chronological log is essential.","source":"draft-053","implemented":true,"tested":false,"test":null,"category":"observability","section":"operational-history","leaf":"institutional-memory"}]}]},{"id":"observability/problems-surfaced-proactively","number":"4.3","title":"Problems are surfaced proactively, not discovered by humans","principle":"The system tells you what's wrong. Stuck tasks, failing agents, looping retries — these are detected automatically and surfaced to the dashboard and human inbox. The human doesn't discover problems by running /queue-status and noticing something looks off.","description":"The core issue is not that errors happen — it's that without a feedback loop between errors and human attention, the system quietly retries forever and the only signal is \"that task has been running a long time.\" Task health annotations, circuit breakers, and queue diagnostics close this loop.","category":"observability","leaves":[{"id":"observability/problems-surfaced-proactively/detection","number":"4.3.1","title":"Automatic detection of stuck, failing, and looping tasks","description":"The scheduler detects problems mechanically — no human needs to notice. Tasks carry their own error history so problems are visible everywhere.","invariants":[{"id":"task-health-annotations","number":"4.3.1.1","description":"Tasks carry health metadata: last_error, error_count, requeue_count, last_flow_step. The scheduler writes these on every error or requeue. The dashboard, /queue-status, and any alert mechanism can read them without parsing logs.","rationale":"Without task-level health data, the only way to know why a task is stuck is to dig through scheduler logs. Task health annotations make the diagnostic self-contained.","source":"draft-053","implemented":false,"tested":false,"test":null,"category":"observability","section":"problems-surfaced-proactively","leaf":"detection"},{"id":"circuit-breaker-stops-loops","number":"4.3.1.2","description":"A circuit breaker detects tasks caught in retry loops (same step failing repeatedly) and stops them from cycling indefinitely. The task is escalated to requires-intervention instead of being silently requeued forever.","rationale":"Three tasks were stuck in infinite requeue loops — each failing at the same step, being requeued, reclaimed, and failing again. Nobody noticed for hours.","source":"draft-053, draft-170","implemented":true,"tested":false,"test":null,"category":"observability","section":"problems-surfaced-proactively","leaf":"detection"},{"id":"orphaned-tasks-detected","number":"4.3.1.3","description":"The lease monitor detects tasks in claimed with no running agent process (expired lease). These are automatically requeued or escalated, not left stuck.","rationale":"Agent crashes leave tasks permanently in claimed without lease recovery. The server's cron trigger handles this.","source":"draft-041","implemented":true,"tested":false,"test":null,"category":"observability","section":"problems-surfaced-proactively","leaf":"detection"}]}]},{"id":"observability/self-healing","number":"4.4","title":"The system is self-healing where possible","principle":"When something breaks, the system tries to fix it before asking a human. The fixer agent handles routine failures. Expired leases are reclaimed. The goal is anti-fragility — the system gets stronger from errors by recording what went wrong and how it was fixed.","description":"Self-healing means: detect the problem, diagnose it, apply a fix, resume the task's flow from where it left off, and record what happened. The fixer agent is the primary mechanism. For issues the fixer can't resolve, a dedicated ops agent can see problems as they occur and take proactive action — triaging severity, identifying recurring patterns, and escalating with full context.","category":"observability","leaves":[{"id":"observability/self-healing/fixer-and-ops-agents","number":"4.4.1","title":"Fixer agent for task recovery, ops agent for system health","description":"Two agents handle different scopes of problems. The fixer agent handles individual task failures. The ops agent handles system-level health — queue throughput, recurring failure patterns, resource exhaustion.","invariants":[{"id":"fixer-handles-routine-failures","number":"4.4.1.1","description":"When a task enters requires-intervention, the scheduler spawns a fixer agent. The fixer diagnoses the problem (reads error context, checks logs, inspects git state), applies a fix, and writes result.json so the task can resume its flow from where it failed.","rationale":"Most task failures are mundane — git conflicts, stale state, transient errors. A human fixing these in the terminal is wasted time that an agent can handle.","source":"draft-170","implemented":false,"tested":false,"test":null,"category":"observability","section":"self-healing","leaf":"fixer-and-ops-agents"},{"id":"fixer-records-issues","number":"4.4.1.2","description":"The fixer agent records every issue it encounters in the issues log (symptoms, root cause, fix applied). If it identifies a recurring pattern, it writes a draft proposing a permanent fix.","rationale":"Recording issues builds institutional memory. The same problem is never investigated twice from scratch.","source":"draft-170","implemented":false,"tested":false,"test":null,"category":"observability","section":"self-healing","leaf":"fixer-and-ops-agents"},{"id":"ops-agent-sees-system-health","number":"4.4.1.3","description":"A dedicated operations agent monitors system-level health: queue throughput, agent success rates, recurring failure patterns, resource utilisation. It takes proactive action — not waiting for a human to notice a stuck queue, but detecting it and either fixing it or escalating with full context.","rationale":"The fixer agent handles individual task failures. But nobody monitors whether the system as a whole is healthy — whether tasks are flowing, whether agents are succeeding, whether the same issue keeps recurring.","source":"draft-205","implemented":false,"tested":false,"test":null,"category":"observability","section":"self-healing","leaf":"fixer-and-ops-agents"}]}]}]}]};</script>

<script>
(function () {
  "use strict";

  // ── State ────────────────────────────────────────────────────────────
  let currentFilter = "all";
  let currentSearch = "";
  let selectedSection = null;
  let selectedLeaf = null;

  // ── Derived status from booleans ─────────────────────────────────────
  function invStatus(inv) {
    if (inv.tested) return "tested";
    if (inv.implemented) return "implemented";
    return "aspirational";
  }

  // ── Data helpers (v2: categories → sections → leaves) ────────────────
  function allSections() {
    return SPEC_DATA.categories.flatMap(c => c.sections);
  }

  function allInvariants() {
    return allSections().flatMap(s => s.leaves.flatMap(l => l.invariants));
  }

  function findSection(id) {
    return allSections().find(s => s.id === id);
  }

  function findLeaf(id) {
    for (const s of allSections()) {
      const l = s.leaves.find(l => l.id === id);
      if (l) return { section: s, leaf: l };
    }
    return null;
  }

  function findCategory(sectionId) {
    for (const c of SPEC_DATA.categories) {
      if (c.sections.find(s => s.id === sectionId)) return c;
    }
    return null;
  }

  function getContextInvariants() {
    if (selectedLeaf) {
      const found = findLeaf(selectedLeaf);
      return found ? found.leaf.invariants : [];
    }
    if (selectedSection) {
      const s = findSection(selectedSection);
      return s ? s.leaves.flatMap(l => l.invariants) : [];
    }
    return allInvariants();
  }

  function applyFilters(invariants) {
    let result = invariants;
    if (currentFilter !== "all") {
      result = result.filter(i => invStatus(i) === currentFilter);
    }
    if (currentSearch.trim()) {
      const q = currentSearch.toLowerCase();
      result = result.filter(i =>
        i.description.toLowerCase().includes(q) ||
        i.id.toLowerCase().includes(q) ||
        (i.number && i.number.includes(q)) ||
        (i.rationale && i.rationale.toLowerCase().includes(q)) ||
        (i.source && i.source.toLowerCase().includes(q))
      );
    }
    return result;
  }

  // ── Stats ────────────────────────────────────────────────────────────
  function renderStats() {
    const all = allInvariants();
    const tested = all.filter(i => invStatus(i) === "tested").length;
    const implemented = all.filter(i => invStatus(i) === "implemented").length;
    const aspirational = all.filter(i => invStatus(i) === "aspirational").length;
    const pills = document.getElementById("stats-pills");
    pills.innerHTML =
      `<span class="stats-pill tested">${tested} tested</span>` +
      `<span class="stats-pill implemented">${implemented} implemented</span>` +
      `<span class="stats-pill aspirational">${aspirational} aspirational</span>` +
      `<span class="stats-pill total">${all.length} total</span>`;
  }

  // ── Tree sidebar (three levels: category → section → leaf) ──────────
  function renderTree() {
    const tree = document.getElementById("tree");
    tree.innerHTML = SPEC_DATA.categories.map(cat => {
      const catTotal = cat.sections.reduce((n, s) =>
        n + s.leaves.reduce((m, l) => m + l.invariants.length, 0), 0);

      const sectionsHTML = cat.sections.map(section => {
        const total = section.leaves.reduce((n, l) => n + l.invariants.length, 0);
        const leaves = section.leaves.map(leaf => {
          const count = leaf.invariants.length;
          return `<div class="tree-leaf" data-leaf="${leaf.id}" title="${esc(leaf.title)}">
            <span style="color:var(--sidebar-muted);font-size:11px;margin-right:2px">${esc(leaf.number)}</span>
            <span style="flex:1">${esc(leaf.title)}</span>
            <span class="tree-count">${count}</span>
          </div>`;
        }).join("");

        return `<div class="tree-section" data-section="${section.id}">
          <div class="tree-section-header">
            <span class="tree-toggle">&#9654;</span>
            <span style="color:var(--sidebar-muted);font-size:11px;margin-right:2px">${esc(section.number)}</span>
            <span class="tree-section-title">${esc(section.title)}</span>
            <span class="tree-count">${total}</span>
          </div>
          <div class="tree-leaves">${leaves}</div>
        </div>`;
      }).join("");

      return `<div class="tree-category open" data-category="${cat.id}">
        <div class="tree-category-header">
          <span class="tree-toggle">&#9654;</span>
          <span style="flex:1">${esc(cat.number)}. ${esc(cat.title)}</span>
          <span class="tree-count">${catTotal}</span>
        </div>
        <div class="tree-category-sections">${sectionsHTML}</div>
      </div>`;
    }).join("");

    tree.querySelectorAll(".tree-category-header").forEach(el => {
      el.addEventListener("click", () => {
        el.closest(".tree-category").classList.toggle("open");
      });
    });

    tree.querySelectorAll(".tree-section-header").forEach(el => {
      el.addEventListener("click", () => {
        const sectionEl = el.closest(".tree-section");
        const sectionId = sectionEl.dataset.section;
        sectionEl.classList.toggle("open");
        selectSection(sectionId, el);
      });
    });

    tree.querySelectorAll(".tree-leaf").forEach(el => {
      el.addEventListener("click", e => {
        e.stopPropagation();
        selectLeaf(el.dataset.leaf);
      });
    });
  }

  function selectSection(sectionId, headerEl) {
    selectedSection = sectionId;
    selectedLeaf = null;
    document.querySelectorAll(".tree-section-header").forEach(h => h.classList.remove("active"));
    document.querySelectorAll(".tree-leaf").forEach(l => l.classList.remove("active"));
    if (headerEl) headerEl.classList.add("active");
    else {
      const h = document.querySelector(`[data-section="${sectionId}"] .tree-section-header`);
      if (h) h.classList.add("active");
    }
    renderContent();
  }

  function selectLeaf(leafId) {
    selectedLeaf = leafId;
    const found = findLeaf(leafId);
    selectedSection = found ? found.section.id : null;
    document.querySelectorAll(".tree-section-header").forEach(h => h.classList.remove("active"));
    document.querySelectorAll(".tree-leaf").forEach(l => {
      l.classList.toggle("active", l.dataset.leaf === leafId);
    });
    if (found) {
      const sectionEl = document.querySelector(`[data-section="${found.section.id}"]`);
      if (sectionEl) sectionEl.classList.add("open");
      const cat = findCategory(found.section.id);
      if (cat) {
        const catEl = document.querySelector(`[data-category="${cat.id}"]`);
        if (catEl) catEl.classList.add("open");
      }
    }
    renderContent();
  }

  // ── Content area ─────────────────────────────────────────────────────
  function renderContent() {
    const content = document.getElementById("content");
    const contextInvs = getContextInvariants();
    const filtered = applyFilters(contextInvs);

    const showingSearch = currentSearch.trim() || currentFilter !== "all";
    const rc = document.getElementById("result-count");
    if (showingSearch) {
      rc.textContent = `${filtered.length} of ${contextInvs.length} shown`;
    } else {
      rc.textContent = `${filtered.length} invariant${filtered.length !== 1 ? "s" : ""}`;
    }

    let headerHTML = "";
    if (selectedLeaf) {
      const found = findLeaf(selectedLeaf);
      if (found) {
        const { section, leaf } = found;
        const cat = findCategory(section.id);
        const catLabel = cat ? `${cat.number}. ${cat.title}` : "";
        headerHTML = `<div class="content-header">
          <div style="font-size:11px;color:var(--main-muted);margin-bottom:2px;text-transform:uppercase;letter-spacing:0.05em">${esc(catLabel)}</div>
          <div style="font-size:12px;color:var(--main-muted);margin-bottom:4px">${esc(section.number)} ${esc(section.title)}</div>
          <h2>${esc(leaf.number)} ${esc(leaf.title)}</h2>
          ${leaf.description ? `<p class="content-desc">${esc(leaf.description)}</p>` : ""}
        </div>`;
      }
    } else if (selectedSection) {
      const section = findSection(selectedSection);
      if (section) {
        const cat = findCategory(section.id);
        const catLabel = cat ? `${cat.number}. ${cat.title}` : "";
        headerHTML = `<div class="content-header">
          <div style="font-size:11px;color:var(--main-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em">${esc(catLabel)}</div>
          <h2>${esc(section.number)} ${esc(section.title)}</h2>
          ${section.principle ? `<div class="content-principle">&ldquo;${esc(section.principle)}&rdquo;</div>` : ""}
          ${section.description ? `<p class="content-desc">${esc(section.description)}</p>` : ""}
        </div>`;
      }
    } else {
      const totalInvs = allInvariants().length;
      const tested = allInvariants().filter(i => invStatus(i) === "tested").length;
      const implemented = allInvariants().filter(i => invStatus(i) === "implemented").length;
      headerHTML = `<div class="welcome-state">
        <h2>System Spec</h2>
        <p>Behavioural invariants for the Octopoid orchestrator. Select a section in the sidebar
        to explore, or browse all ${totalInvs} invariants (${tested} tested, ${implemented} implemented) below.</p>
      </div>`;
    }

    let listHTML = "";
    if (filtered.length === 0) {
      listHTML = `<div class="empty-state">No invariants match the current filter.</div>`;
    } else if (selectedSection && !selectedLeaf) {
      // Group by leaf when viewing a section
      const section = findSection(selectedSection);
      const q = currentSearch.toLowerCase().trim();
      if (section) {
        listHTML = section.leaves.map(leaf => {
          const leafInvs = filtered.filter(inv => inv.leaf === leaf.id.split("/").pop());
          if (leafInvs.length === 0) return "";
          return `<div style="margin-bottom:24px">
            <h3 style="font-size:15px;font-weight:600;color:var(--main-text);margin-bottom:4px;cursor:pointer" onclick="document.querySelectorAll('.tree-leaf').forEach(l=>{if(l.dataset.leaf==='${leaf.id}'){l.click()}})">${esc(leaf.number)} ${esc(leaf.title)}</h3>
            ${leaf.description ? `<p style="font-size:12px;color:var(--main-muted);line-height:1.5;margin-bottom:10px;max-width:680px">${esc(leaf.description)}</p>` : ""}
            <div class="invariants-list">
              ${leafInvs.map(inv => renderInvariantCard(inv, q, true)).join("")}
            </div>
          </div>`;
        }).join("");
      }
    } else {
      const q = currentSearch.toLowerCase().trim();
      listHTML = `<div class="invariants-list">` +
        filtered.map(inv => renderInvariantCard(inv, q, !!selectedLeaf)).join("") +
        `</div>`;
    }

    content.innerHTML = headerHTML + listHTML;
  }

  function renderInvariantCard(inv, highlightQuery, isLeafView) {
    const status = invStatus(inv);
    const implClass = inv.implemented ? "implemented" : "not-implemented";
    const implLabel = inv.implemented ? "implemented" : "not implemented";
    const testClass = inv.tested ? "tested" : "not-tested";
    const testLabel = inv.tested ? "tested" : "not tested";
    const descHTML = highlightQuery
      ? highlight(esc(inv.description), highlightQuery)
      : esc(inv.description);
    const ratHTML = inv.rationale
      ? (highlightQuery ? highlight(esc(inv.rationale), highlightQuery) : esc(inv.rationale))
      : "";

    const breadcrumb = !isLeafView
      ? `<span class="breadcrumb">${esc(inv.category)} / ${esc(inv.section)} / ${esc(inv.leaf)}</span>`
      : "";

    const testFile = inv.test
      ? ` <span class="inv-test" title="${esc(inv.test)}">${esc(shortTest(inv.test))}</span>`
      : "";

    const numLabel = inv.number ? `<span style="color:var(--main-muted);font-size:11px;font-family:monospace">${esc(inv.number)}</span>` : "";

    return `<div class="invariant-card" data-status="${status}">
      <div class="inv-header">
        <span class="badge ${implClass}">${implLabel}</span>
        <span class="badge ${testClass}">${testLabel}</span>
        ${numLabel}
        <span class="inv-id">${esc(inv.id)}</span>
        ${breadcrumb}
      </div>
      <p class="inv-desc">${descHTML}</p>
      ${ratHTML ? `<div class="inv-rationale">${ratHTML}</div>` : ""}
      <div class="inv-meta">
        <span>Source: <strong>${esc(inv.source)}</strong></span>
        ${testFile}
      </div>
    </div>`;
  }

  // ── Overview grid (grouped by category) ──────────────────────────────
  function renderOverview() {
    const content = document.getElementById("content");
    const totalInvs = allInvariants().length;
    const tested = allInvariants().filter(i => invStatus(i) === "tested").length;
    const implemented = allInvariants().filter(i => invStatus(i) === "implemented").length;
    const aspirational = totalInvs - tested - implemented;
    const totalSections = allSections().length;

    const categoryBlocks = SPEC_DATA.categories.map(cat => {
      const cards = cat.sections.map(s => {
        const sTotal = s.leaves.reduce((n, l) => n + l.invariants.length, 0);
        const sTested = s.leaves.reduce((n, l) =>
          n + l.invariants.filter(i => invStatus(i) === "tested").length, 0);
        const sImpl = s.leaves.reduce((n, l) =>
          n + l.invariants.filter(i => invStatus(i) === "implemented").length, 0);
        const sAsp = sTotal - sTested - sImpl;
        return `<div class="section-card" data-action="select-section" data-section="${s.id}">
          <h3>${esc(s.number)} ${esc(s.title)}</h3>
          ${s.principle ? `<div class="principle">&ldquo;${esc(s.principle)}&rdquo;</div>` : ""}
          <div class="section-counts">
            ${sTested ? `<span class="stats-pill tested">${sTested} tested</span>` : ""}
            ${sImpl ? `<span class="stats-pill implemented">${sImpl} impl</span>` : ""}
            ${sAsp ? `<span class="stats-pill aspirational">${sAsp} asp</span>` : ""}
          </div>
        </div>`;
      }).join("");

      return `<div style="margin-bottom:24px">
        <h3 style="font-size:13px;text-transform:uppercase;letter-spacing:0.06em;color:var(--main-muted);margin-bottom:10px">${esc(cat.number)}. ${esc(cat.title)}</h3>
        <div class="section-overview-grid">${cards}</div>
      </div>`;
    }).join("");

    content.innerHTML = `<div class="welcome-state">
      <h2>System Spec</h2>
      <p>Behavioural invariants for the Octopoid orchestrator. ${totalInvs} invariants across
      ${SPEC_DATA.categories.length} categories, ${totalSections} sections
      (${tested} tested, ${implemented} implemented, ${aspirational} aspirational).
      Select a section from the sidebar or click a card below.</p>
    </div>
    ${categoryBlocks}`;

    document.getElementById("result-count").textContent =
      `${totalInvs} invariants`;

    content.querySelectorAll("[data-action=select-section]").forEach(el => {
      el.addEventListener("click", () => {
        const sectionEl = document.querySelector(`[data-section="${el.dataset.section}"]`);
        if (sectionEl) {
          sectionEl.classList.add("open");
          const catEl = sectionEl.closest(".tree-category");
          if (catEl) catEl.classList.add("open");
        }
        selectSection(el.dataset.section, null);
      });
    });
  }

  // ── Utilities ─────────────────────────────────────────────────────────
  function esc(str) {
    if (!str) return "";
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function highlight(html, query) {
    if (!query) return html;
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    return html.replace(new RegExp(`(${escaped})`, "gi"), "<mark>$1</mark>");
  }

  function shortTest(test) {
    if (!test) return "";
    const parts = test.split("/");
    return parts[parts.length - 1];
  }

  // ── Event wiring ──────────────────────────────────────────────────────
  function init() {
    if (!SPEC_DATA || !SPEC_DATA.categories) {
      document.getElementById("content").innerHTML =
        `<div class="empty-state">No spec data loaded. Run <code>python build.py</code> to generate.</div>`;
      return;
    }

    renderStats();
    renderTree();

    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentFilter = btn.dataset.filter;
        if (selectedSection || selectedLeaf) renderContent();
        else renderOverviewOrContent();
      });
    });

    let searchTimer;
    document.getElementById("search").addEventListener("input", e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        currentSearch = e.target.value;
        if (currentSearch.trim()) {
          selectedSection = null;
          selectedLeaf = null;
          document.querySelectorAll(".tree-section-header").forEach(h => h.classList.remove("active"));
          document.querySelectorAll(".tree-leaf").forEach(l => l.classList.remove("active"));
        }
        if (selectedSection || selectedLeaf) renderContent();
        else renderOverviewOrContent();
      }, 150);
    });

    renderOverview();
  }

  function renderOverviewOrContent() {
    if (currentSearch.trim() || currentFilter !== "all") {
      renderContent();
    } else {
      renderOverview();
    }
  }

  document.addEventListener("DOMContentLoaded", init);
})();
</script>
</body>
</html>
