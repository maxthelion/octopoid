title: System Visibility
description: 'The dashboard shows tasks in every queue, agent activity (active runs,
  recent completions), and problems requiring attention (stuck tasks, repeated failures).

  '
invariants:
- id: all-queues-visible
  description: The dashboard shows tasks in every queue (incoming, claimed, submitted,
    done, failed) with enough context to understand what's happening without clicking
    into each task.
  rationale: If any queue is hidden or hard to access, problems accumulate invisibly.
    The dashboard is the human's window into the system — it must show the full
    picture.
  source: bootstrap
  status: aspirational
  test: null
