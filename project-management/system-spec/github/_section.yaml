title: GitHub
principle: "GitHub PRs are the delivery mechanism for completed work"
description: >
  Pull requests are how agent work lands on main. The system creates
  PRs automatically as part of the task flow, runs CI before gatekeeper
  review, and merges via the orchestrator (never manually). PRs carry
  metadata (pr_number, pr_url) stored on the task. Branches are never
  deleted on merge.
